<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão Técnica — Ameripan</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #003366; --primary-light: #004080; --accent: #cc0000;
      --green: #0f9d58; --warn: #b26a00; --light: #f4f6f8;
      --sidebar-w: 240px; --topbar-h: 65px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: var(--light); display: flex; height: 100vh; overflow: hidden; color: #333; }
    #sidebar { width: var(--sidebar-w); background: var(--primary); color: #fff; display: flex; flex-direction: column; position: fixed; height: 100%; z-index: 200; transition: transform .3s; }
    @media(max-width:768px){ #sidebar{transform:translateX(-100%);} #sidebar.open{transform:translateX(0);} }
    .brand { padding: 18px 16px; font-weight: 700; font-size: 1rem; letter-spacing: .5px; border-bottom: 1px solid rgba(255,255,255,.1); display: flex; align-items: center; justify-content: space-between; }
    .brand-logo { display: flex; align-items: center; gap: 8px; }
    .brand-logo i { color: var(--accent); font-size: 1.2rem; }
    .close-sb { cursor: pointer; display: none; }
    @media(max-width:768px){ .close-sb{display:block;} }
    .nav-section { padding: 10px 0; flex: 1; overflow-y: auto; }
    .nav-label { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.4); padding: 14px 16px 6px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; transition: .2s; border-left: 3px solid transparent; font-size: .9rem; color: rgba(255,255,255,.85); }
    .nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-item.active { background: rgba(255,255,255,.12); border-left-color: var(--accent); color: #fff; font-weight: 600; }
    .nav-item i { width: 18px; text-align: center; }
    .sidebar-footer { padding: 12px 16px; font-size: .75rem; color: rgba(255,255,255,.4); border-top: 1px solid rgba(255,255,255,.1); }
    #main { flex: 1; margin-left: var(--sidebar-w); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    @media(max-width:768px){ #main{margin-left:0;} }
    .topbar { height: var(--topbar-h); background: #fff; padding: 0 20px; box-shadow: 0 1px 4px rgba(0,0,0,.08); display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .hamburger { font-size: 1.3rem; cursor: pointer; color: var(--primary); display: none; }
    @media(max-width:768px){ .hamburger{display:block;} }
    .page-title { font-size: 1rem; font-weight: 700; color: var(--primary); }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .filter-select { padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: .82rem; color: #444; background: #fff; cursor: pointer; }
    .filter-select:focus { outline: none; border-color: var(--primary); }
    .search-box { display: flex; align-items: center; gap: 6px; border: 1px solid #ddd; border-radius: 6px; padding: 0 10px; background: #fff; }
    .search-box i { color: #aaa; font-size: .85rem; }
    .search-box input { border: none; outline: none; font-size: .82rem; width: 140px; padding: 7px 0; }
    .btn-icon { width: 34px; height: 34px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: .9rem; transition: .2s; }
    .btn-icon:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-export { padding: 7px 12px; border-radius: 6px; border: none; background: var(--green); color: #fff; font-size: .82rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .btn-export:hover { opacity: .9; }
    #content { flex: 1; overflow-y: auto; padding: 20px; }
    .banner { padding: 10px 14px; border-radius: 8px; font-size: .85rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .banner.info    { background: #e8f0fe; border: 1px solid #b3c8f5; color: #1a56c4; }
    .banner.success { background: #e6f4ea; border: 1px solid #9dd4a8; color: #137333; }
    .banner.warn    { background: #fff8e1; border: 1px solid #f0d060; color: #7a5a00; }
    .banner.error   { background: #fce8e6; border: 1px solid #f5b8b2; color: #c5221f; }
    .view { display: none; }
    .view.active { display: block; animation: fadeIn .25s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; margin-bottom: 20px; }
    .kpi { background: #fff; border-radius: 10px; padding: 18px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); border-left: 4px solid var(--primary); display: flex; flex-direction: column; gap: 6px; }
    .kpi.red { border-left-color: var(--accent); }
    .kpi.green { border-left-color: var(--green); }
    .kpi.warn { border-left-color: #f9a825; }
    .kpi label { font-size: .72rem; text-transform: uppercase; letter-spacing: .6px; color: #888; font-weight: 600; }
    .kpi .val { font-size: 1.9rem; font-weight: 800; color: var(--primary); line-height: 1; }
    .kpi.red .val { color: var(--accent); }
    .kpi.green .val { color: var(--green); }
    .kpi.warn .val { color: #f9a825; }
    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media(max-width:640px){ .dash-grid{grid-template-columns:1fr;} }
    .dash-card { background: #fff; border-radius: 10px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .dash-card h3 { font-size: .88rem; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 12px; display: flex; align-items: center; gap: 7px; }
    .dash-card h3 i { color: var(--accent); }
    table.dt { width: 100%; border-collapse: collapse; font-size: .85rem; }
    table.dt th { background: #f4f6f8; color: #555; font-weight: 700; padding: 9px 10px; text-align: left; }
    table.dt td { padding: 9px 10px; border-bottom: 1px solid #f0f0f0; }
    table.dt tr:last-child td { border-bottom: none; }
    table.dt tr:hover td { background: #fafafa; }
    .rank { display: inline-block; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); color: #fff; font-size: .7rem; font-weight: 700; text-align: center; line-height: 20px; margin-right: 4px; }
    .rank.r1 { background: #f9a825; } .rank.r2 { background: #9e9e9e; } .rank.r3 { background: #8d6e63; }
    .mural-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 18px; }
    .vcard { background: #fff; border-radius: 10px; box-shadow: 0 1px 5px rgba(0,0,0,.08); border-top: 4px solid var(--primary); display: flex; flex-direction: column; transition: box-shadow .2s; }
    .vcard:hover { box-shadow: 0 4px 12px rgba(0,0,0,.12); }
    .vcard-head { padding: 14px 14px 10px; }
    .vcard-head h4 { font-size: .95rem; color: var(--primary); margin-bottom: 4px; }
    .vcard-date { font-size: .75rem; color: #888; display: flex; align-items: center; gap: 4px; }
    .vcard-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .68rem; font-weight: 700; }
    .badge-tec { background: #e3f2fd; color: #1a56c4; }
    .badge-vend { background: #fce4ec; color: #b71c1c; }
    .badge-motivo { background: #f3e5f5; color: #6a1b9a; }
    .vcard-body { padding: 10px 14px; flex: 1; font-size: .84rem; color: #555; line-height: 1.5; }
    .vcard-body .lbl { font-weight: 700; color: #333; }
    .vcard-footer { padding: 10px 14px; border-top: 1px solid #f0f0f0; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; justify-content: space-between; }
    .btn-details { background: none; border: none; color: var(--primary); font-size: .8rem; font-weight: 600; cursor: pointer; text-decoration: underline; padding: 0; }
    .media-links { display: flex; flex-wrap: wrap; gap: 5px; }
    .btn-media { display: inline-flex; align-items: center; gap: 4px; padding: 4px 9px; background: var(--light); border: 1px solid #ddd; border-radius: 5px; text-decoration: none; color: #444; font-size: .75rem; transition: .2s; }
    .btn-media:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-media i { color: var(--accent); font-size: .8rem; }
    .btn-media:hover i { color: #fff; }
    .no-files { font-size: .75rem; color: #bbb; }
    .list-wrap { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; }
    table.lt { width: 100%; border-collapse: collapse; font-size: .85rem; }
    table.lt th { background: #f4f6f8; color: #555; font-weight: 700; padding: 11px 14px; text-align: left; white-space: nowrap; }
    table.lt td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; }
    table.lt tr:last-child td { border-bottom: none; }
    table.lt tr:hover td { background: #fafbfc; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: .72rem; font-weight: 700; }
    .pill-sim { background: #e6f4ea; color: #137333; }
    .pill-nao { background: #f5f5f5; color: #888; }
    .btn-ver { background: var(--primary); color: #fff; border: none; border-radius: 5px; padding: 4px 10px; font-size: .78rem; cursor: pointer; }
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 999; justify-content: center; align-items: center; }
    .modal-bg.open { display: flex; }
    .modal-box { background: #fff; border-radius: 12px; width: 95%; max-width: 580px; max-height: 90vh; overflow-y: auto; position: relative; padding: 24px; }
    .modal-close { position: absolute; top: 14px; right: 16px; font-size: 1.4rem; cursor: pointer; color: #aaa; background: none; border: none; }
    .modal-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 16px; }
    .drow { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; }
    .drow:last-child { border-bottom: none; }
    .dlabel { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--primary); margin-bottom: 3px; }
    .dval { font-size: .88rem; color: #444; white-space: pre-wrap; background: #f9f9f9; padding: 7px 9px; border-radius: 6px; }
    .dval.inline { background: none; padding: 0; }
    .modal-files { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .empty { text-align: center; color: #aaa; padding: 60px 20px; }
    .empty i { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .spin { animation: rot 1s linear infinite; }
    @keyframes rot { to{transform:rotate(360deg);} }
  </style>
</head>
<body>
<nav id="sidebar">
  <div class="brand">
    <div class="brand-logo"><i class="fas fa-flask"></i><span>AMERIPAN</span></div>
    <i class="fas fa-times close-sb" onclick="toggleSidebar()"></i>
  </div>
  <div class="nav-section">
    <div class="nav-label">Menu</div>
    <div class="nav-item active" onclick="showView('dashboard')"><i class="fas fa-chart-bar"></i> Dashboard</div>
    <div class="nav-item" onclick="showView('mural')"><i class="fas fa-images"></i> Mural de Trabalhos</div>
    <div class="nav-item" onclick="showView('lista')"><i class="fas fa-table"></i> Relatório em Lista</div>
  </div>
  <div class="sidebar-footer">Gestão Técnica v3.1</div>
</nav>

<main id="main">
  <div class="topbar">
    <div class="topbar-left">
      <i class="fas fa-bars hamburger" onclick="toggleSidebar()"></i>
      <span class="page-title" id="pageTitle">Dashboard</span>
    </div>
    <div class="topbar-right">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Buscar cliente..." oninput="aplicarFiltros()">
      </div>
      <select class="filter-select" id="filterMonth"    onchange="aplicarFiltros()"><option value="ALL">Todos os Meses</option></select>
      <select class="filter-select" id="filterTecnico"  onchange="aplicarFiltros()"><option value="ALL">Todos os Técnicos</option></select>
      <select class="filter-select" id="filterVendedor" onchange="aplicarFiltros()"><option value="ALL">Todos os Vendedores</option></select>
      <select class="filter-select" id="filterMotivo"   onchange="aplicarFiltros()"><option value="ALL">Todos os Motivos</option></select>
      <button class="btn-icon" onclick="carregarDados()" title="Atualizar"><i class="fas fa-sync-alt" id="syncIcon"></i></button>
      <button class="btn-export" onclick="exportarCSV()"><i class="fas fa-file-csv"></i> CSV</button>
    </div>
  </div>

  <div id="content">
    <div class="banner info" id="banner"><i class="fas fa-circle-notch spin"></i> <span>Conectando...</span></div>

    <div class="view active" id="view-dashboard">
      <div class="kpi-row">
        <div class="kpi">       <label>Total de Visitas</label> <div class="val" id="kpiTotal">—</div></div>
        <div class="kpi red">   <label>Clientes Únicos</label>  <div class="val" id="kpiClientes">—</div></div>
        <div class="kpi green"> <label>Pedidos Tirados</label>  <div class="val" id="kpiPedidos">—</div></div>
        <div class="kpi warn">  <label>Com Arquivos</label>     <div class="val" id="kpiArquivos">—</div></div>
      </div>
      <div class="dash-grid">
        <div class="dash-card"><h3><i class="fas fa-user-cog"></i> Por Técnico</h3><table class="dt"><thead><tr><th>#</th><th>Técnico</th><th>Qtd.</th></tr></thead><tbody id="tbTecnico"></tbody></table></div>
        <div class="dash-card"><h3><i class="fas fa-user-tie"></i> Por Vendedor</h3><table class="dt"><thead><tr><th>#</th><th>Vendedor</th><th>Qtd.</th></tr></thead><tbody id="tbVendedor"></tbody></table></div>
        <div class="dash-card"><h3><i class="fas fa-tags"></i> Por Motivo</h3><table class="dt"><thead><tr><th>#</th><th>Motivo</th><th>Qtd.</th></tr></thead><tbody id="tbMotivo"></tbody></table></div>
        <div class="dash-card"><h3><i class="fas fa-calendar-alt"></i> Por Mês</h3><table class="dt"><thead><tr><th>Mês / Ano</th><th>Qtd.</th></tr></thead><tbody id="tbMes"></tbody></table></div>
      </div>
    </div>

    <div class="view" id="view-mural">
      <div class="mural-grid" id="muralGrid"></div>
    </div>

    <div class="view" id="view-lista">
      <div class="list-wrap"><div style="overflow-x:auto;">
        <table class="lt"><thead><tr><th>Data</th><th>Cód.</th><th>Cliente</th><th>Técnico</th><th>Vendedor</th><th>Motivo</th><th>Pedido</th><th></th></tr></thead>
        <tbody id="listaTbody"></tbody></table>
      </div></div>
    </div>
  </div>
</main>

<div class="modal-bg" id="modal" onclick="fecharModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="fecharModalBtn()">&times;</button>
    <div class="modal-title">Detalhes da Visita</div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFQqvYINQi-uZNOrwdZZYfA8jAOzfNNy3UcJSByWzL0gaELe_YQiZEqQSLP7jwnA3U0A/exec";
  const C = { TIMESTAMP:0,COD:1,CLIENTE:2,TELEFONE:3,PESSOAS:4,MOTIVO:5,PRODUTOS:6,OPOR:7,LINKS:8,DATA:9,FEEDBACK:10,PEDIDO:11,TECNICO:12,VENDEDOR:13 };
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  let rawData=[], filteredData=[];

  window.onload = () => { preencherMeses(); carregarDados(); };

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('view-'+id).classList.add('active');
    document.getElementById('pageTitle').innerText = {dashboard:'Dashboard',mural:'Mural de Trabalhos',lista:'Relatório em Lista'}[id]||id;
    document.querySelectorAll('.nav-item')[{dashboard:0,mural:1,lista:2}[id]].classList.add('active');
    if(window.innerWidth<768) document.getElementById('sidebar').classList.remove('open');
  }

  function setBanner(type,html){ const b=document.getElementById('banner'); b.className='banner '+type; b.innerHTML=html; }

  async function carregarDados() {
    const icon=document.getElementById('syncIcon');
    icon.className='fas fa-sync-alt spin';
    setBanner('info','<i class="fas fa-circle-notch spin"></i> <span>Carregando dados...</span>');
    try {
      const ping = await (await fetch(SCRIPT_URL+'?action=ping')).json();
      const json = await (await fetch(SCRIPT_URL)).json();
      if(json.ok===false) throw new Error(json.error||'Falha ao carregar.');
      rawData = Array.isArray(json) ? json.filter(r=>Array.isArray(r)&&r[0]&&String(r[0])!=='Carimbo de data/hora') : [];
      popularFiltros(); aplicarFiltros();
      const pastaOk = ping.ok && ping.pasta && ping.pasta.ok;
      setBanner('success', `<i class="fas fa-check-circle"></i> <span>Aba <b>${ping.aba||'NOVOS-TRABALHOS'}</b> — <b>${rawData.length}</b> registros. Pasta Drive: ${pastaOk?'<b>'+ping.pasta.nome+'</b>':'<span style="color:var(--warn)">⚠️ sem acesso</span>'}</span>`);
    } catch(err) {
      setBanner('error',`<i class="fas fa-exclamation-circle"></i> <span>Erro: <b>${err.message}</b></span>`);
    } finally { icon.className='fas fa-sync-alt'; }
  }

  function preencherMeses() {
    const sel=document.getElementById('filterMonth'), hoje=new Date();
    for(let i=0;i<18;i++){
      const d=new Date(hoje.getFullYear(),hoje.getMonth()-i,1);
      sel.innerHTML+=`<option value="${d.toISOString().slice(0,7)}">${MESES[d.getMonth()]} ${d.getFullYear()}</option>`;
    }
  }

  function popularFiltros() {
    const tecs=[...new Set(rawData.map(r=>r[C.TECNICO]).filter(Boolean))].sort();
    const vends=[...new Set(rawData.map(r=>r[C.VENDEDOR]).filter(Boolean))].sort();
    const mots=[...new Set(rawData.map(r=>r[C.MOTIVO]).filter(Boolean))].sort();
    const sT=document.getElementById('filterTecnico'), sV=document.getElementById('filterVendedor'), sM=document.getElementById('filterMotivo');
    sT.innerHTML='<option value="ALL">Todos os Técnicos</option>';
    sV.innerHTML='<option value="ALL">Todos os Vendedores</option>';
    sM.innerHTML='<option value="ALL">Todos os Motivos</option>';
    tecs.forEach(t=>sT.innerHTML+=`<option value="${t}">${t}</option>`);
    vends.forEach(v=>sV.innerHTML+=`<option value="${v}">${v}</option>`);
    mots.forEach(m=>sM.innerHTML+=`<option value="${m}">${m}</option>`);
  }

  function parseDateSafe(v){ const d=new Date(v); return isNaN(d.getTime())?null:d; }

  function aplicarFiltros() {
    const mes=document.getElementById('filterMonth').value;
    const tec=document.getElementById('filterTecnico').value;
    const vend=document.getElementById('filterVendedor').value;
    const mot=document.getElementById('filterMotivo').value;
    const busca=(document.getElementById('searchInput').value||'').toLowerCase().trim();
    filteredData=rawData.filter(row=>{
      if(mes!=='ALL'){ const d=parseDateSafe(row[C.DATA]); if(!d||d.toISOString().slice(0,7)!==mes) return false; }
      if(tec!=='ALL'&&row[C.TECNICO]!==tec) return false;
      if(vend!=='ALL'&&row[C.VENDEDOR]!==vend) return false;
      if(mot!=='ALL'&&row[C.MOTIVO]!==mot) return false;
      if(busca){ const h=[row[C.CLIENTE],row[C.COD],row[C.MOTIVO],row[C.FEEDBACK]].join(' ').toLowerCase(); if(!h.includes(busca)) return false; }
      return true;
    });
    filteredData.sort((a,b)=>{ const da=parseDateSafe(a[C.DATA]),db=parseDateSafe(b[C.DATA]); return (db?db.getTime():0)-(da?da.getTime():0); });
    renderDashboard(); renderMural(); renderLista();
  }

  function renderTabela(id,entries){
    const tb=document.getElementById(id);
    if(!entries.length){ tb.innerHTML='<tr><td colspan="3" style="color:#bbb;text-align:center;padding:20px;">Sem dados</td></tr>'; return; }
    tb.innerHTML=entries.map(([n,q],i)=>`<tr><td><span class="rank ${i===0?'r1':i===1?'r2':i===2?'r3':''}">${i+1}</span></td><td>${n}</td><td><b>${q}</b></td></tr>`).join('');
  }

  function renderDashboard(){
    document.getElementById('kpiTotal').innerText=filteredData.length;
    document.getElementById('kpiClientes').innerText=new Set(filteredData.map(r=>r[C.CLIENTE])).size;
    document.getElementById('kpiPedidos').innerText=filteredData.filter(r=>(r[C.PEDIDO]||'').toString().toUpperCase().includes('SIM')).length;
    document.getElementById('kpiArquivos').innerText=filteredData.filter(r=>r[C.LINKS]&&r[C.LINKS].toString().trim().length>5).length;
    const count=f=>{ const m={}; filteredData.forEach(r=>{const k=r[f]||'Não informado'; m[k]=(m[k]||0)+1;}); return Object.entries(m).sort((a,b)=>b[1]-a[1]); };
    renderTabela('tbTecnico',count(C.TECNICO)); renderTabela('tbVendedor',count(C.VENDEDOR)); renderTabela('tbMotivo',count(C.MOTIVO));
    const mMap={}; filteredData.forEach(r=>{ const d=parseDateSafe(r[C.DATA]); if(!d) return; const k=MESES[d.getMonth()]+' '+d.getFullYear(); mMap[k]=(mMap[k]||0)+1; });
    const tbMes=document.getElementById('tbMes');
    const em=Object.entries(mMap).sort((a,b)=>b[1]-a[1]);
    tbMes.innerHTML=em.length?em.map(([k,v])=>`<tr><td>${k}</td><td><b>${v}</b></td></tr>`).join(''):'<tr><td colspan="2" style="color:#bbb;text-align:center;padding:20px;">Sem dados</td></tr>';
  }

  function renderMural(){
    const grid=document.getElementById('muralGrid');
    if(!filteredData.length){ grid.innerHTML='<div class="empty" style="grid-column:1/-1"><i class="fas fa-inbox"></i>Nenhum registro encontrado.</div>'; return; }
    grid.innerHTML='';
    filteredData.forEach(row=>{
      const d=parseDateSafe(row[C.DATA]), dataFmt=d?d.toLocaleDateString('pt-BR'):(row[C.DATA]||'—');
      const feedback=(row[C.FEEDBACK]||'').toString();
      const preview=feedback.length>100?feedback.slice(0,100)+'...':feedback;
      const links=row[C.LINKS]?row[C.LINKS].toString().split(',').map(s=>s.trim()).filter(Boolean):[];
      const mediaHTML=links.length?links.map((l,i)=>`<a href="${l}" target="_blank" rel="noopener" class="btn-media"><i class="fas fa-external-link-alt"></i> Arquivo ${i+1}</a>`).join(''):'<span class="no-files">Sem arquivos</span>';
      const card=document.createElement('div'); card.className='vcard';
      card.innerHTML=`
        <div class="vcard-head">
          <h4>${row[C.CLIENTE]||'—'}</h4>
          <div class="vcard-date"><i class="far fa-calendar-alt"></i> ${dataFmt}</div>
          <div class="vcard-badges">
            ${row[C.TECNICO]?`<span class="badge badge-tec">${row[C.TECNICO].split(' ')[0]}</span>`:''}
            ${row[C.VENDEDOR]?`<span class="badge badge-vend">${row[C.VENDEDOR].split(' ')[0]}</span>`:''}
            ${row[C.MOTIVO]?`<span class="badge badge-motivo">${row[C.MOTIVO]}</span>`:''}
          </div>
        </div>
        <div class="vcard-body"><span class="lbl">Feedback:</span> ${preview||'—'}</div>
        <div class="vcard-footer">
          <button class="btn-details" onclick='abrirModal(${JSON.stringify(row).replace(/'/g,"&#39;")})'>Ver detalhes</button>
          <div class="media-links">${mediaHTML}</div>
        </div>`;
      grid.appendChild(card);
    });
  }

  function renderLista(){
    const tbody=document.getElementById('listaTbody');
    if(!filteredData.length){ tbody.innerHTML='<tr><td colspan="8"><div class="empty"><i class="fas fa-inbox"></i>Nenhum registro.</div></td></tr>'; return; }
    tbody.innerHTML='';
    filteredData.slice(0,150).forEach(row=>{
      const d=parseDateSafe(row[C.DATA]), dataFmt=d?d.toLocaleDateString('pt-BR'):(row[C.DATA]||'—');
      const pedido=(row[C.PEDIDO]||'').toString().toUpperCase().includes('SIM');
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="white-space:nowrap">${dataFmt}</td><td>${row[C.COD]||'—'}</td><td><b>${row[C.CLIENTE]||'—'}</b></td><td>${row[C.TECNICO]||'—'}</td><td>${row[C.VENDEDOR]||'—'}</td><td>${row[C.MOTIVO]||'—'}</td><td><span class="pill ${pedido?'pill-sim':'pill-nao'}">${pedido?'SIM':'NÃO'}</span></td><td><button class="btn-ver" onclick='abrirModal(${JSON.stringify(row).replace(/'/g,"&#39;")})'>Ver</button></td>`;
      tbody.appendChild(tr);
    });
  }

  function abrirModal(row){
    const d=parseDateSafe(row[C.DATA]), dataFmt=d?d.toLocaleDateString('pt-BR'):(row[C.DATA]||'—');
    const links=row[C.LINKS]?row[C.LINKS].toString().split(',').map(s=>s.trim()).filter(Boolean):[];
    const filesHtml=links.length?links.map((l,i)=>`<a href="${l}" target="_blank" rel="noopener" class="btn-media"><i class="fas fa-eye"></i> Arquivo ${i+1}</a>`).join(''):'<span class="no-files">Nenhum arquivo anexado</span>';
    document.getElementById('modalBody').innerHTML=`
      <div class="drow"><div class="dlabel">Cliente</div><div class="dval inline"><b>${row[C.CLIENTE]||'—'}</b> &nbsp;|&nbsp; Cód: ${row[C.COD]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Data da Visita</div><div class="dval inline">${dataFmt}</div></div>
      <div class="drow"><div class="dlabel">Técnico Responsável</div><div class="dval inline">${row[C.TECNICO]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Vendedor Responsável</div><div class="dval inline">${row[C.VENDEDOR]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Motivo</div><div class="dval inline">${row[C.MOTIVO]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Telefone</div><div class="dval inline">${row[C.TELEFONE]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Pessoas Contatadas</div><div class="dval">${row[C.PESSOAS]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Produtos Utilizados</div><div class="dval">${row[C.PRODUTOS]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Oportunidades</div><div class="dval">${row[C.OPOR]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Feedback Completo</div><div class="dval">${row[C.FEEDBACK]||'—'}</div></div>
      <div class="drow"><div class="dlabel">Pedido Gerado?</div><div class="dval inline">${row[C.PEDIDO]||'NÃO'}</div></div>
      <div class="drow"><div class="dlabel">Arquivos Anexados</div><div class="modal-files">${filesHtml}</div></div>`;
    document.getElementById('modal').classList.add('open');
  }

  function fecharModalBtn(){ document.getElementById('modal').classList.remove('open'); }
  function fecharModal(e){ if(e.target===document.getElementById('modal')) fecharModalBtn(); }

  function exportarCSV(){
    if(!filteredData.length){ alert('Nenhum dado para exportar.'); return; }
    const headers=['Data','Cód','Cliente','Telefone','Pessoas','Motivo','Produtos','Oportunidades','Links','DataVisita','Feedback','Pedido','Tecnico','Vendedor'];
    const esc=v=>'"'+String(v||'').replace(/"/g,'""')+'"';
    const rows=[headers.join(',')].concat(filteredData.map(r=>r.map(esc).join(',')));
    const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='trabalhos_tecnicos_'+new Date().toISOString().slice(0,10)+'.csv';
    a.click();
  }
</script>
</body>
</html>
