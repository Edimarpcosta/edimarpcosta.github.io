<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação DISC Profissional</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
<style>
:root{--d:#e63946;--i:#f4a261;--s:#2a9d8f;--c:#264653;--bg:#0f1117;--bg2:#1a1d27;--bg3:#252836;--card:#1e2130;--card2:#282b3d;--text:#e8e8f0;--text2:#9a9bb0;--accent:#6c63ff;--accent2:#00d4aa;--radius:16px;--shadow:0 8px 32px rgba(0,0,0,.3);--glass:rgba(30,33,48,.7)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.container{max-width:1100px;margin:0 auto;padding:1.5rem}
h1,h2,h3,h4{letter-spacing:-.02em}

/* Mode Selection */
#mode-select{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,#1a1d35 0%,var(--bg) 70%)}
#mode-select h1{font-size:clamp(2rem,5vw,3rem);margin-bottom:.5rem;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#mode-select p.subtitle{color:var(--text2);font-size:1.1rem;margin-bottom:3rem}
.mode-cards{display:flex;gap:2rem;flex-wrap:wrap;justify-content:center}
.mode-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:3rem 3.5rem;cursor:pointer;transition:all .4s cubic-bezier(.4,0,.2,1);text-align:center;min-width:240px}
.mode-card:hover{transform:translateY(-8px);border-color:rgba(255,255,255,.2);box-shadow:var(--shadow)}
.mode-card .icon-circle{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:1.8rem;transition:transform .3s}
.mode-card:hover .icon-circle{transform:scale(1.1)}
.mode-card.recruit .icon-circle{background:rgba(42,157,143,.15);color:var(--s)}
.mode-card.company .icon-circle{background:rgba(108,99,255,.15);color:var(--accent)}
.mode-card h3{font-size:1.3rem;margin-bottom:.4rem;font-weight:700}
.mode-card p{color:var(--text2);font-size:.9rem}

/* Header */
.app-header{background:linear-gradient(135deg,#1a1d35 0%,var(--bg2) 100%);padding:2rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
.app-header .container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.app-header h2{font-size:1.5rem;display:flex;align-items:center;gap:.8rem}
.app-header h2 .badge{background:var(--accent);color:#fff;font-size:.7rem;padding:.3rem .7rem;border-radius:20px;font-weight:600}
.btn-back{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text2);padding:.6rem 1.2rem;border-radius:10px;cursor:pointer;font-size:.9rem;transition:all .3s;display:flex;align-items:center;gap:.5rem}
.btn-back:hover{background:rgba(255,255,255,.12);color:var(--text)}

/* Form */
.form-card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:2rem;margin:2rem 0}
.form-card h3{margin-bottom:1.5rem;font-size:1.2rem;display:flex;align-items:center;gap:.6rem;color:var(--accent)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.form-group{display:flex;flex-direction:column;gap:.4rem}
.form-group label{font-size:.85rem;color:var(--text2);font-weight:500}
.form-group input,.form-group select{background:var(--bg3);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:.8rem 1rem;color:var(--text);font-size:.95rem;font-family:'Inter',sans-serif;transition:border-color .3s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group select option{background:var(--bg2)}

.disc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.disc-input{background:var(--bg3);border-radius:12px;padding:1.2rem;text-align:center;border:2px solid transparent;transition:all .3s}
.disc-input.d-inp{border-color:rgba(230,57,70,.3)}
.disc-input.i-inp{border-color:rgba(244,162,97,.3)}
.disc-input.s-inp{border-color:rgba(42,157,143,.3)}
.disc-input.c-inp{border-color:rgba(38,70,83,.5)}
.disc-input label{display:block;font-weight:700;font-size:1.1rem;margin-bottom:.3rem}
.disc-input .disc-name{font-size:.75rem;color:var(--text2);margin-bottom:.8rem}
.disc-input input{width:100%;background:var(--card);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.6rem;color:var(--text);font-size:1.1rem;text-align:center;font-weight:600}
.disc-input input:focus{outline:none;border-color:var(--accent)}
.d-inp label{color:var(--d)}
.i-inp label{color:var(--i)}
.s-inp label{color:var(--s)}
.c-inp label{color:var(--c)}

.sum-row{display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
#sum-display{font-weight:700;font-size:1rem;padding:.4rem .9rem;border-radius:8px;background:var(--bg3);color:var(--text2);transition:all .3s}
#sum-display.valid{background:rgba(42,157,143,.15);color:var(--s)}
#sum-display.invalid{background:rgba(230,57,70,.15);color:var(--d)}
.err-msg{color:var(--d);font-size:.9rem;padding:.6rem 1rem;background:rgba(230,57,70,.1);border-radius:8px;border:1px solid rgba(230,57,70,.3)}
.hidden{display:none!important}

.btn-analyze{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;padding:.9rem 2.5rem;border-radius:12px;cursor:pointer;font-size:1rem;font-weight:600;font-family:'Inter',sans-serif;transition:all .3s;display:flex;align-items:center;gap:.6rem}
.btn-analyze:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,99,255,.4)}
.btn-pdf{background:linear-gradient(135deg,#e63946,#c1121f);margin-top:1.5rem}
.btn-pdf:hover{box-shadow:0 8px 24px rgba(230,57,70,.4)}

/* TABS — STICKY */
.tabs-wrapper{position:sticky;top:0;z-index:100;background:var(--bg2);padding:.8rem 0;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:1.5rem}
.tabs{display:flex;gap:.6rem;flex-wrap:wrap;padding:0 1.5rem;max-width:1100px;margin:0 auto}
.tab-btn{padding:.7rem 1.5rem;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:var(--text2);cursor:pointer;font-size:.9rem;font-weight:500;transition:all .3s;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:.5rem}
.tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab-btn:hover:not(.active){background:var(--card2);color:var(--text)}
.tab-content{display:none;animation:fadeIn .3s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Results */
#results{margin-top:2rem}
.results-inner{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);overflow:hidden}
.tab-content-body{padding:2rem}

/* Chart */
.chart-container{display:flex;align-items:flex-end;justify-content:center;gap:2rem;height:220px;padding:2rem 1rem 0;background:var(--bg3);border-radius:12px;margin:1.5rem 0}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:.5rem}
.chart-bar{width:60px;border-radius:8px 8px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:.4rem;transition:height .8s cubic-bezier(.4,0,.2,1);position:relative}
.chart-bar .val{color:#fff;font-weight:700;font-size:.9rem}
.bar-d{background:linear-gradient(to top,var(--d),rgba(230,57,70,.6))}
.bar-i{background:linear-gradient(to top,var(--i),rgba(244,162,97,.6))}
.bar-s{background:linear-gradient(to top,var(--s),rgba(42,157,143,.6))}
.bar-c{background:linear-gradient(to top,var(--c),rgba(38,70,83,.9))}
.chart-label{font-size:.8rem;font-weight:600;text-align:center}

/* Cards */
.p-card{background:var(--bg3);border-radius:12px;padding:1.5rem;margin-bottom:1.2rem}
.p-card h4{margin-bottom:1rem;font-size:1rem;display:flex;align-items:center;gap:.6rem}
.d-card{border-left:3px solid var(--d)}
.i-card{border-left:3px solid var(--i)}
.s-card{border-left:3px solid var(--s)}
.c-card{border-left:3px solid var(--c)}
.g-card{border-left:3px solid var(--accent)}
.section-title{font-size:1.1rem;font-weight:700;margin:1.8rem 0 1rem;display:flex;align-items:center;gap:.6rem;color:var(--accent2)}
.dominant-badge{padding:.8rem 1.2rem;border-radius:10px;font-size:.95rem;margin:1rem 0;display:flex;align-items:center;gap:.5rem}
ul{padding-left:1.4rem;display:flex;flex-direction:column;gap:.4rem}
li{font-size:.92rem;line-height:1.6;color:var(--text2)}
li::marker{color:var(--accent)}

/* Lidar grid */
.lidar-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
.postura-list{display:flex;flex-wrap:wrap;gap:.5rem;margin:0}
.postura-list li{list-style:none;padding:0;background:var(--card2);padding:.3rem .8rem;border-radius:20px;font-size:.82rem;color:var(--text)}

/* Ref cards */
.ref-card{background:var(--bg3);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.famous-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1rem;margin:1rem 0}
.famous-item{background:var(--card);border-radius:10px;padding:1rem;border-left:3px solid transparent}
.famous-item h5{font-size:.95rem;margin-bottom:.4rem;color:var(--text)}
.famous-item p{font-size:.82rem;color:var(--text2);margin-bottom:.3rem}

/* PDF hidden area */
#pdf-content{display:none;background:#fff;color:#000;padding:0;margin:0}

/* Responsive */
@media(max-width:700px){
  .form-row{grid-template-columns:1fr}
  .disc-grid{grid-template-columns:repeat(2,1fr)}
  .lidar-grid{grid-template-columns:1fr}
  .tabs{gap:.4rem}
  .tab-btn{padding:.5rem .9rem;font-size:.82rem}
  .chart-bar{width:44px}
}
</style>
</head>
<body>

<!-- MODE SELECT -->
<div id="mode-select">
  <h1><i class="fas fa-brain"></i> Avaliação DISC</h1>
  <p class="subtitle">Ferramenta profissional de análise comportamental</p>
  <div class="mode-cards">
    <div class="mode-card recruit" onclick="selectMode('candidato')">
      <div class="icon-circle"><i class="fas fa-user-plus"></i></div>
      <h3>Recrutamento</h3>
      <p>Processo seletivo</p>
    </div>
    <div class="mode-card company" onclick="selectMode('colaborador')">
      <div class="icon-circle"><i class="fas fa-briefcase"></i></div>
      <h3>Empresa</h3>
      <p>Pedido do RH / Gestor</p>
    </div>
  </div>
</div>

<!-- APP MAIN -->
<div id="app-main" class="hidden">
  <div class="app-header">
    <div class="container">
      <h2><i class="fas fa-brain"></i> DISC Profissional <span class="badge" id="mode-badge">MODO</span></h2>
      <button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-left"></i> Voltar</button>
    </div>
  </div>

  <div class="container">
    <!-- Dados -->
    <div class="form-card">
      <h3><i class="fas fa-user-circle"></i> Dados do Avaliado</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Nome completo</label>
          <input type="text" id="inp-name" placeholder="Nome do avaliado">
        </div>
        <div class="form-group" id="grp-code">
          <label>Código do colaborador</label>
          <input type="text" id="inp-code" placeholder="Ex: COL-001">
        </div>
        <div class="form-group hidden" id="grp-cargo">
          <label>Cargo pretendido</label>
          <input type="text" id="inp-cargo" placeholder="Ex: Vendedor Externo">
        </div>
        <div class="form-group hidden" id="grp-vaga">
          <label>Tipo de vaga</label>
          <select id="inp-vaga">
            <option value="vendas">Vendas / Campo</option>
            <option value="supervisao">Supervisão / Liderança</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Empresa / Segmento</label>
          <input type="text" id="inp-segment" placeholder="Ex: Ameripan Distribuidora">
        </div>
        <div class="form-group">
          <label>Data de avaliação</label>
          <input type="date" id="inp-date">
        </div>
      </div>
    </div>

    <!-- Pontuações DISC -->
    <div class="form-card">
      <h3><i class="fas fa-sliders-h"></i> Pontuações DISC <small style="color:var(--text2);font-weight:400">(soma deve ser 100)</small></h3>
      <div class="disc-grid">
        <div class="disc-input d-inp">
          <label>D</label>
          <div class="disc-name">Executor</div>
          <input type="number" id="sc-d" min="0" max="100" placeholder="0" oninput="updateSum()">
        </div>
        <div class="disc-input i-inp">
          <label>I</label>
          <div class="disc-name">Comunicador</div>
          <input type="number" id="sc-i" min="0" max="100" placeholder="0" oninput="updateSum()">
        </div>
        <div class="disc-input s-inp">
          <label>S</label>
          <div class="disc-name">Planejador</div>
          <input type="number" id="sc-s" min="0" max="100" placeholder="0" oninput="updateSum()">
        </div>
        <div class="disc-input c-inp">
          <label>C</label>
          <div class="disc-name">Analista</div>
          <input type="number" id="sc-c" min="0" max="100" placeholder="0" oninput="updateSum()">
        </div>
      </div>
      <div class="sum-row">
        <span id="sum-display">Soma: 0</span>
        <span id="err-msg" class="err-msg hidden"></span>
        <button class="btn-analyze" onclick="analyze()"><i class="fas fa-search"></i> Analisar Perfil</button>
      </div>
    </div>

    <!-- Results -->
    <div id="results" class="hidden">
      <div class="results-inner">
        <div class="tabs-wrapper">
          <div class="tabs" id="tab-bar"></div>
        </div>
        <div class="tab-content-body">
          <div id="tab-contents"></div>
          <button class="btn-analyze btn-pdf" onclick="generatePDF()"><i class="fas fa-file-pdf"></i> Gerar PDF</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- PDF RENDER (fora do viewport) -->
<div id="pdf-content"></div>

<script>
// ===== STATE =====
let currentMode = null;
let scores = {D:0,I:0,S:0,C:0};

// ===== DISC DATA =====
const DISC = {

pontosFortes:["Focado em resultados e metas","Toma iniciativa e decisões rápidas","Resolve problemas com agilidade e determinação","Liderança direta e inspiradora pelo exemplo","Alta produtividade e energia constante","Competitivo e movido por desafios","Excelente em situações de crise e pressão","Capacidade de assumir riscos calculados"],

},

// ===== NAVIGATION =====
function selectMode(mode){
  currentMode = mode;
  document.getElementById('mode-select').classList.add('hidden');
  document.getElementById('app-main').classList.remove('hidden');
  const badge = document.getElementById('mode-badge');
  if(mode === 'colaborador'){
    badge.textContent = 'COLABORADOR'; badge.style.background = 'var(--accent)';
    document.getElementById('grp-code').classList.remove('hidden');
    document.getElementById('grp-cargo').classList.add('hidden');
    document.getElementById('grp-vaga').classList.add('hidden');
  } else {
    badge.textContent = 'CANDIDATO'; badge.style.background = 'var(--s)';
    document.getElementById('grp-code').classList.add('hidden');
    document.getElementById('grp-cargo').classList.remove('hidden');
    document.getElementById('grp-vaga').classList.remove('hidden');
  }
  document.getElementById('results').classList.add('hidden');
  // Set today's date
  document.getElementById('inp-date').valueAsDate = new Date();
}

function goBack(){
  document.getElementById('app-main').classList.add('hidden');
  document.getElementById('mode-select').classList.remove('hidden');
  document.getElementById('results').classList.add('hidden');
  currentMode = null;
}

function getSum(){
  return ['sc-d','sc-i','sc-s','sc-c'].reduce((s,id)=>s+(parseInt(document.getElementById(id).value)||0),0);
}

function updateSum(){
  const s = getSum();
  const el = document.getElementById('sum-display');
  el.textContent = 'Soma: ' + s;
  el.className = s===100 ? 'valid' : (s>100 ? 'invalid' : '');
}

function getDominant(sc){
  const sorted = Object.entries(sc).filter(([,v])=>v>0).sort(([,a],[,b])=>b-a);
  if(!sorted.length) return [];
  let dom = [sorted[0]];
  if(sorted.length>1 && sorted[1][1] >= sorted[0][1]*0.7) dom.push(sorted[1]);
  return dom.map(([k])=>k);
}

function analyze(){
  const d = parseInt(document.getElementById('sc-d').value)||0;
  const i = parseInt(document.getElementById('sc-i').value)||0;
  const s = parseInt(document.getElementById('sc-s').value)||0;
  const c = parseInt(document.getElementById('sc-c').value)||0;
  scores = {D:d, I:i, S:s, C:c};
  const sum = d+i+s+c;
  const errEl = document.getElementById('err-msg');
  if(sum !== 100){
    errEl.textContent = 'A soma das pontuações deve ser exatamente 100. Atual: ' + sum;
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');
  const dom = getDominant(scores);
  const res = document.getElementById('results');
  res.classList.remove('hidden');
  buildTabs(dom);
  setTimeout(()=>res.scrollIntoView({behavior:'smooth'}), 100);
}

// ===== TAB BUILDING =====
function buildTabs(dom){
  const tabBar = document.getElementById('tab-bar');
  const tabContents = document.getElementById('tab-contents');
  tabBar.innerHTML = '';
  tabContents.innerHTML = '';

  const tabs = currentMode === 'colaborador'
    ? [{id:'visao',label:'Visão Geral',icon:'fa-chart-bar'},
       {id:'fortes',label:'Pontos Fortes/Fracos',icon:'fa-balance-scale'},
       {id:'perf',label:'Performance',icon:'fa-rocket'},
       {id:'lidar',label:'Como Lidar',icon:'fa-handshake'},
       {id:'conflitos',label:'Conflitos',icon:'fa-bolt'},
       {id:'ref',label:'Referência',icon:'fa-trophy'}]
    : [{id:'visao',label:'Visão Geral',icon:'fa-chart-bar'},
       {id:'contratar',label:'Contratar?',icon:'fa-user-check'},
       {id:'campo',label:'Performance Campo',icon:'fa-road'},
       {id:'fortes',label:'Pontos Fortes/Fracos',icon:'fa-balance-scale'},
       {id:'lidar',label:'Como Lidar',icon:'fa-handshake'},
       {id:'conflitos',label:'Conflitos',icon:'fa-bolt'},
       {id:'ref',label:'Referência',icon:'fa-trophy'}];

  // Create tab divs first
  tabs.forEach((t, idx) => {
    const div = document.createElement('div');
    div.id = 'tc-' + t.id;
    div.className = 'tab-content' + (idx===0 ? ' active' : '');
    tabContents.appendChild(div);
  });

  // Then create buttons (after divs exist in DOM)
  tabs.forEach((t, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx===0 ? ' active' : '');
    btn.innerHTML = '<i class="fas ' + t.icon + '"></i> ' + t.label;
    const tabId = 'tc-' + t.id;
    btn.addEventListener('click', function(){
      tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      tabContents.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      document.getElementById(tabId).classList.add('active');
    });
    tabBar.appendChild(btn);
  });

  // Render content
  renderVisao(dom);
  renderFortes(dom);
  if(currentMode === 'colaborador'){
    renderPerformance(dom);
  } else {
    renderContratar(dom);
    renderCampo(dom);
  }
  renderLidar(dom);
  renderConflitos(dom);
  renderRef();
}

function ul(items){ return '<ul>' + items.map(i=>'<li>'+i+'</li>').join('') + '</ul>'; }
function card(cls,title,icon,content){ return '<div class="p-card '+cls+'-card"><h4><i class="fas '+icon+'" style="color:var(--'+cls+')"></i> '+title+'</h4>'+content+'</div>'; }
function sec(icon,title){ return '<h3 class="section-title"><i class="fas '+icon+'"></i> '+title+'</h3>'; }

// ===== RENDER: VISÃO GERAL =====
function renderVisao(dom){
  const el = document.getElementById('tc-visao');
  let h = '<div class="chart-container">';
  ['D','I','S','C'].forEach(k => {
    const p = DISC[k]; const v = scores[k];
    h += '<div class="chart-col"><div class="chart-bar bar-'+p.cls+'" style="height:'+Math.max(v*1.6,4)+'px"><span class="val">'+v+'</span></div><div class="chart-label" style="color:'+p.colorHex+'">'+k+' - '+p.name+'</div></div>';
  });
  h += '</div>';
  const domNames = dom.map(k=>'<span style="color:'+DISC[k].colorHex+';font-weight:700">'+DISC[k].name+' ('+k+')</span>').join(' + ');
  h += '<div class="dominant-badge" style="background:var(--bg3);border:1px solid rgba(255,255,255,.1)"><i class="fas fa-crown" style="color:gold"></i> Perfil Dominante: '+domNames+'</div>';

  // Per dominant profile summary
  dom.forEach(k => {
    const p = DISC[k];
    h += sec(p.icon, 'Perfil ' + p.name + ' (' + k + ')');
    h += '<div class="p-card '+p.cls+'-card"><p style="color:var(--text2);line-height:1.7">'+getProfileDesc(k)+'</p></div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">';
    h += card(p.cls,'Como Liderar','fa-star', ul(p.liderar));
    h += card(p.cls,'Como Motivar','fa-fire', ul(p.motivar));
    h += '</div>';
    h += card(p.cls,'Como Dar Feedback','fa-comment-dots', ul(p.feedback));
  });
  el.innerHTML = h;
}

  let h = '';
  dom.forEach(k => {
    const p = DISC[k];
    h += sec(p.icon, 'Como Lidar com o Perfil ' + p.name);
    h += '<div class="p-card '+p.cls+'-card"><h4><i class="fas fa-eye" style="color:var(--'+p.cls+')"></i> Postura Típica</h4><ul class="postura-list">'+p.comoLidar.postura.map(i=>'<li>'+i+'</li>').join('')+'</ul></div>';
    h += '<div class="lidar-grid">';
    h += card(p.cls,'✅ O que FAZER','fa-check', ul(p.comoLidar.fazer));
    h += card(p.cls,'❌ O que NÃO FAZER','fa-ban', ul(p.comoLidar.naoFazer));
    h += '</div>';
  });
  el.innerHTML = h;
}

// ===== RENDER: CONFLITOS =====
function renderConflitos(dom){
  const el = document.getElementById('tc-conflitos');
  let h = '';
  dom.forEach(k => {
    const p = DISC[k];
    h += sec('fa-bolt', 'Gestão de Conflitos – ' + p.name);
    h += card(p.cls,'⚡ O que Gera Ruído','fa-exclamation', ul(p.conflitos.ruido));
    h += card(p.cls,'🛡️ Como Evitar Atritos','fa-shield-alt', ul(p.conflitos.evitar));

  });
  el.innerHTML = h;
}

// ===== RENDER: REFERÊNCIA =====

  let h = sec('fa-trophy','Perfis de Vendedores de Sucesso');
  h += '<div class="ref-card"><p style="color:var(--text2);margin-bottom:1rem">'+REF_VENDAS.intro+'</p>';
  h += '<div class="dominant-badge" style="background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.2);color:var(--accent);font-size:.9rem"><i class="fas fa-info-circle"></i> '+REF_VENDAS.composicao.ideal+'</div>';
  h += '<div class="famous-grid">';
  ['hunter','networker','farmer','consultor'].forEach(t => {
    const d = REF_VENDAS.composicao[t];
    const colors = {hunter:'var(--d)',networker:'var(--i)',farmer:'var(--s)',consultor:'var(--c)'};
    h += '<div class="famous-item" style="border-left-color:'+colors[t]+'"><h5>'+d.nome+'</h5><p><em>'+d.desc+'</em></p><p style="font-size:.8rem;color:var(--accent)">'+d.disc+'</p><p style="margin-top:.5rem"><strong>Exemplos:</strong> '+d.famosos.join(', ')+'</p></div>';
  });
  h += '</div><h5 style="color:var(--text2);margin:1.5rem 0 .5rem;font-size:.85rem;text-transform:uppercase">Dicas para Vendas de Campo</h5>'+ul(REF_VENDAS.dicasCampo)+'</div>';

  h += sec('fa-crown','Perfis de Líderes de Sucesso');
  h += '<div class="ref-card"><p style="color:var(--text2);margin-bottom:1rem">'+REF_LIDERANCA.intro+'</p>';
  h += '<div class="famous-grid">';
  ['comandante','inspirador','servidor','estrategista'].forEach(t => {
    const d = REF_LIDERANCA.estilos[t];
    const colors = {comandante:'var(--d)',inspirador:'var(--i)',servidor:'var(--s)',estrategista:'var(--c)'};
    h += '<div class="famous-item" style="border-left-color:'+colors[t]+'"><h5>'+d.nome+'</h5><p><em>'+d.desc+'</em></p>'+ul(d.pontos)+'<p style="margin-top:.5rem"><strong>Exemplos:</strong> '+d.famosos.join(', ')+'</p></div>';
  });
  h += '</div><div class="dominant-badge" style="background:rgba(0,212,170,.1);border:1px solid rgba(0,212,170,.2);color:var(--accent2);font-size:.9rem;margin:1rem 0"><i class="fas fa-lightbulb"></i> '+REF_LIDERANCA.composicaoIdeal+'</div>';
  h += '<h5 style="color:var(--text2);margin:1rem 0 .5rem;font-size:.85rem;text-transform:uppercase">Dicas Gerais de Liderança</h5>'+ul(REF_LIDERANCA.dicasGerais)+'</div>';
  el.innerHTML = h;
}

// ===== PDF GENERATION =====
function generatePDF(){
  const btn = document.querySelector('.btn-pdf');
  const originalBtn = btn ? btn.innerHTML : '';

  try {
    if(typeof jspdf === 'undefined' && typeof window.jspdf === 'undefined'){
      alert('A biblioteca jsPDF não carregou. Verifique sua conexão com a internet.');
      return;
    }

    const { jsPDF } = window.jspdf || jspdf;

    const name = (document.getElementById('inp-name').value || 'Sem nome').trim();
    const segment = (document.getElementById('inp-segment').value || '').trim();
    const dateVal = document.getElementById('inp-date').value;
    const dom = getDominant(scores);

    if(!currentMode){
      alert('Selecione o modo e gere a análise antes de exportar o PDF.');
      return;
    }

    if(!dom.length){
      alert('Faça a análise do perfil antes de gerar o PDF.');
      return;
    }

    const now = dateVal ? new Date(dateVal+'T12:00:00').toLocaleDateString('pt-BR') : new Date().toLocaleDateString('pt-BR');
    const modeLabel = currentMode === 'colaborador' ? 'Colaborador' : 'Candidato';
    const code = currentMode === 'colaborador' ? ((document.getElementById('inp-code')||{}).value || '').trim() : '';
    const cargo = currentMode === 'candidato' ? ((document.getElementById('inp-cargo')||{}).value || '').trim() : '';
    const vaga = currentMode === 'candidato' ? ((document.getElementById('inp-vaga')||{}).value || '') : '';
    const vagaLabel = vaga === 'vendas' ? 'Vendas / Campo' : 'Supervisão / Liderança';
    const domNames = dom.map(k => DISC[k].name + ' (' + k + ')').join(' + ');

    if(btn){
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando PDF...';
      btn.style.opacity = '.7';
      btn.style.cursor = 'wait';
    }

    setTimeout(() => {
      try {
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageW = 210;
        const pageH = 297;
        const margin = 14;
        const contentW = pageW - 2 * margin;
        let y = margin;

        // Helper functions
        function addText(text, size, color, weight, maxWidth, x, align){
          doc.setFontSize(size);
          doc.setTextColor(color);
          if(weight === 'bold') doc.setFont(undefined, 'bold');
          else doc.setFont(undefined, 'normal');
          const width = maxWidth || contentW;
          const posX = x || margin;
          const lines = doc.splitTextToSize(text, width);
          const lineHeight = Math.max(4.2, size * 0.42);
          lines.forEach(line => {
            if(y + lineHeight > pageH - margin){
              doc.addPage();
              y = margin;
            }
            doc.text(line, posX, y, align ? { align: align, maxWidth: width } : undefined);
            y += lineHeight;
          });
        }

        function addSpace(h){ y += h; }

        function checkPage(needed){
          if(y + needed > pageH - margin){
            doc.addPage();
            y = margin;
            return true;
          }
          return false;
        }

        function addList(items, indent){
          const lineH = 5;
          const ind = indent || 3;
          items.forEach(item => {
            doc.setFontSize(10);
            doc.setFont(undefined, 'normal');
            const lines = doc.splitTextToSize(item, contentW - ind - 4);
            const blockH = lines.length * lineH + 2;
            checkPage(blockH + 4);
            doc.setFontSize(10);
            doc.setTextColor('#333333');
            doc.setFont(undefined, 'normal');
            doc.setFillColor('#555555');
            doc.circle(margin + ind, y - 1.2, 0.8, 'F');
            lines.forEach((line, idx) => {
              if(idx > 0){ checkPage(lineH + 2); }
              doc.text(line, margin + ind + 2, y);
              y += lineH;
            });
            y += 1;
          });
        }

        function addBar(label, value, color){
          checkPage(10);
          doc.setFontSize(10);
          doc.setTextColor(color);
          doc.setFont(undefined, 'bold');
          doc.text(label, margin, y);

          const barX = margin + 35;
          const barW = contentW - 45;
          const barH = 5;

          doc.setFillColor('#edf0f7');
          doc.rect(barX, y - 3, barW, barH, 'F');

          doc.setFillColor(color);
          doc.rect(barX, y - 3, (barW * value / 100), barH, 'F');

          doc.setTextColor('#111111');
          doc.setFont(undefined, 'bold');
          doc.text(String(value), barX + barW + 2, y);

          y += 8;
        }

        function addSubHeader(label, bgColor, textColor, neededBefore){
          // Garante que header + pelo menos 2 linhas de conteudo cabem na pagina
          checkPage(neededBefore || 28);
          const hH = 8;  // altura do rect do cabeçalho
          doc.setFillColor(bgColor);
          doc.rect(margin, y, contentW, hH, 'F');
          doc.setFontSize(9);
          doc.setTextColor(textColor || '#ffffff');
          doc.setFont(undefined, 'bold');
          doc.text(label, margin + 3, y + 5.5);
          y += hH + 3;  // altura do rect + respiro antes da lista
        }

        function addSection(title, bgColor, items, indent){
          addSubHeader(title.toUpperCase(), bgColor, '#ffffff', 28);
          addList(items, indent || 3);
          addSpace(4);
        }

        // Header gradient effect (simplified)
        doc.setFillColor('#6c63ff');
        doc.rect(0, 0, pageW, 45, 'F');

        doc.setFontSize(9);
        doc.setTextColor('#ffffff');
        doc.setFont(undefined, 'normal');
        doc.text('RELATÓRIO COMPORTAMENTAL', pageW / 2, 12, { align: 'center' });

        doc.setFontSize(22);
        doc.setFont(undefined, 'bold');
        doc.text('Avaliação DISC Profissional', pageW / 2, 22, { align: 'center' });

        doc.setFontSize(11);
        doc.setFont(undefined, 'normal');
        doc.text('Resumo executivo + análise detalhada', pageW / 2, 30, { align: 'center' });

        y = 50;

        // Info box
        doc.setFillColor('#f6f8fc');
        doc.setDrawColor('#e6eaf2');
        doc.rect(margin, y, contentW, 22, 'FD');

        doc.setFontSize(10);
        doc.setTextColor('#334155');
        doc.setFont(undefined, 'bold');
        doc.text('Nome:', margin + 2, y + 6);
        doc.setFont(undefined, 'normal');
        doc.text(name, margin + 16, y + 6);

        doc.setFont(undefined, 'bold');
        doc.text('Modo:', margin + 2, y + 12);
        doc.setFont(undefined, 'normal');
        doc.text(modeLabel, margin + 16, y + 12);

        doc.setFont(undefined, 'bold');
        doc.text('Data:', margin + 2, y + 18);
        doc.setFont(undefined, 'normal');
        doc.text(now, margin + 16, y + 18);

        if(code){
          doc.setFont(undefined, 'bold');
          doc.text('Código:', margin + 70, y + 6);
          doc.setFont(undefined, 'normal');
          doc.text(code, margin + 88, y + 6);
        }

        if(cargo){
          doc.setFont(undefined, 'bold');
          doc.text('Cargo:', margin + 70, y + 6);
          doc.setFont(undefined, 'normal');
          doc.text(cargo, margin + 86, y + 6);
        }

        if(segment){
          doc.setFont(undefined, 'bold');
          doc.text('Empresa:', margin + 70, y + 12);
          doc.setFont(undefined, 'normal');
          doc.text(segment, margin + 88, y + 12);
        }

        if(vaga){
          doc.setFont(undefined, 'bold');
          doc.text('Vaga:', margin + 70, y + 18);
          doc.setFont(undefined, 'normal');
          doc.text(vagaLabel, margin + 82, y + 18);
        }

        y += 28;

        // Executive summary
        addText('Resumo executivo', 14, '#6c63ff', 'bold', contentW, pageW / 2, 'center');
        addSpace(2);

        doc.setFillColor('#f3f0ff');
        doc.setDrawColor('#ddd6fe');
        doc.rect(margin, y, contentW, 14, 'FD');

        doc.setFontSize(9);
        doc.setTextColor('#6b7280');
        doc.setFont(undefined, 'normal');
        doc.text('PERFIL DOMINANTE', margin + 2, y + 5);

        doc.setFontSize(16);
        doc.setTextColor('#5b4ff5');
        doc.setFont(undefined, 'bold');
        doc.text(domNames, margin + 2, y + 11);

        y += 18;

        // Score bars
        addText('Pontuações DISC', 12, '#333333', 'bold');
        addSpace(2);

        addBar('D - ' + DISC.D.name, scores.D, DISC.D.colorHex);
        addBar('I - ' + DISC.I.name, scores.I, DISC.I.colorHex);
        addBar('S - ' + DISC.S.name, scores.S, DISC.S.colorHex);
        addBar('C - ' + DISC.C.name, scores.C, DISC.C.colorHex);

        addSpace(5);

        // Profile summaries
        dom.forEach(k => {
          const p = DISC[k];
          checkPage(20);

          doc.setDrawColor('#e8eaf2');
          doc.rect(margin, y, contentW, 16, 'D');

          doc.setFontSize(11);
          doc.setTextColor(p.colorHex);
          doc.setFont(undefined, 'bold');
          doc.text(p.name + ' (' + k + ')', margin + 2, y + 5);

          doc.setFontSize(9);
          doc.setTextColor('#4b5563');
          doc.setFont(undefined, 'normal');
          const desc = doc.splitTextToSize(getProfileDesc(k), contentW - 4);
          let dy = y + 10;
          desc.forEach(line => {
            doc.text(line, margin + 2, dy);
            dy += 3.5;
          });

          y += 18;
        });

        // Detailed profiles
        dom.forEach((k, idx) => {
          const p = DISC[k];

          doc.addPage();
          y = margin;

          // Profile header — altura dinâmica baseada na descrição
          doc.setFontSize(10);
          doc.setFont(undefined, 'normal');
          const descLines = doc.splitTextToSize(getProfileDesc(k), contentW - 16);
          const descH = descLines.length * 4.5;
          const headerH = 12 + descH + 6;  // titulo + desc + padding

          doc.setFillColor(p.colorHex);
          doc.rect(margin, y, contentW, headerH, 'F');

          doc.setFontSize(18);
          doc.setTextColor('#ffffff');
          doc.setFont(undefined, 'bold');
          doc.text('Perfil ' + p.name + ' (' + k + ')', pageW / 2, y + 9, { align: 'center' });

          doc.setFontSize(10);
          doc.setFont(undefined, 'normal');
          let dy = y + 15;
          descLines.forEach(line => {
            doc.text(line, pageW / 2, dy, { align: 'center', maxWidth: contentW - 16 });
            dy += 4.5;
          });
          y += headerH + 5;

          addSection('Pontos fortes', '#2a9d8f', p.pontosFortes);
          addSection('Pontos fracos', '#e63946', p.pontosFracos);

          if(currentMode === 'colaborador'){
            addSection('Performance em vendas', '#6c63ff', p.performance.vendas);
            addSection('Produtividade', '#264653', p.performance.produtividade);
          } else {
            addSection('Por que contratar', '#2a9d8f', p.candidato.contratar);
            addSection('Por que não contratar', '#e63946', p.candidato.naoContratar);
            addSection('Performance em campo', '#f4a261', p.candidato.campo);
            addSection(
              vaga === 'supervisao' ? 'Dicas para supervisão' : 'Dicas para vendas',
              '#6c63ff',
              vaga === 'supervisao' ? p.liderar : p.performance.vendas
            );
          }

          checkPage(30);
          addText('Como lidar', 11, '#5b4ff5', 'bold', contentW, pageW / 2, 'center');
          addSpace(2);

          addSubHeader('O QUE FAZER', '#e8f5e9', '#2a9d8f', 22);
          addList(p.comoLidar.fazer, 3);

          addSubHeader('O QUE NÃO FAZER', '#ffebee', '#e63946', 22);
          addList(p.comoLidar.naoFazer, 3);
          addSpace(4);

          checkPage(30);
          addText('Gestão de conflitos', 11, '#c08400', 'bold', contentW, pageW / 2, 'center');
          addSpace(2);

          addSubHeader('O QUE GERA RUÍDO', '#fff3cd', '#c08400', 22);
          addList(p.conflitos.ruido, 3);

          addSubHeader('COMO EVITAR', '#e8f5e9', '#2a9d8f', 22);
          addList(p.conflitos.evitar, 3);

          addSubHeader('COMO COMBINAR PERFIS', '#e3f2fd', '#5b4ff5', 22);
          addList(p.conflitos.combinar, 3);
          addSpace(4);

          checkPage(30);
          addText('Aplicações práticas', 11, '#0f766e', 'bold', contentW, pageW / 2, 'center');
          addSpace(2);

          addSubHeader('COMO LIDERAR', '#e0f2f1', '#0f766e', 22);
          addList(p.liderar, 3);

          addSubHeader('COMO MOTIVAR', '#fff3e0', '#ea580c', 22);
          addList(p.motivar, 3);

          addSubHeader('COMO DAR FEEDBACK', '#f3e5f5', '#7c3aed', 22);
          addList(p.feedback, 3);

          // Footer
          y = pageH - 10;
          doc.setDrawColor('#e8eaf2');
          doc.line(margin, y - 2, pageW - margin, y - 2);
          doc.setFontSize(8);
          doc.setTextColor('#64748b');
          doc.setFont(undefined, 'normal');
          doc.text('DISC Profissional', margin, y);
          doc.text(now, pageW/2, y, { align: 'center' });
          doc.text('Uso interno', pageW - margin, y, { align: 'right' });
        });

        const filename = 'DISC_' + name.replace(/\s+/g, '_') + '_' + now.replace(/\//g, '-') + '.pdf';
        doc.save(filename);

        alert('PDF gerado com sucesso: ' + filename);

      } catch(pdfErr){
        console.error('Erro ao gerar PDF com jsPDF:', pdfErr);
        alert('Erro ao gerar o PDF: ' + (pdfErr.message || pdfErr));
      } finally {
        if(btn){
          btn.disabled = false;
          btn.innerHTML = originalBtn;
          btn.style.opacity = '';
          btn.style.cursor = '';
        }
      }
    }, 200);

  } catch(error) {
    console.error('Falha na função generatePDF:', error);
    alert('Falha ao preparar o PDF: ' + (error && error.message ? error.message : error));
    if(btn){
      btn.disabled = false;
      btn.innerHTML = originalBtn;
      btn.style.opacity = '';
      btn.style.cursor = '';
    }
  }
}
</script>
</body>
</html>
