<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
  <title>Ameripan | Cotação v21</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bl:#004890;--bld:#003168;--bll:#e8f0fa;
  --or:#F47920;--ord:#D4640E;--orl:#FFF3E8;
  --wh:#fff;--bg:#f4f6fb;--bo:#dde4ef;
  --mu:#5a6378;--dk:#1a2540;
  --sh:0 2px 14px rgba(0,72,144,.09);
  --r:10px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dk);font-size:15px;padding-bottom:90px}

/* HEADER */
header{background:var(--bld);position:sticky;top:0;z-index:50;box-shadow:0 3px 20px rgba(0,0,0,.28)}
.hi{max-width:1300px;margin:0 auto;display:flex;justify-content:space-between;align-items:stretch;min-height:62px}
.brand{display:flex;align-items:center;gap:11px;background:#fff;padding:0 3rem 0 1rem;clip-path:polygon(0 0,100% 0,86% 100%,0 100%)}
.brand img{height:40px}
.blab{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.05rem;color:var(--bl);line-height:1.1;text-transform:uppercase}
.blab em{display:block;font-style:normal;font-size:.66rem;font-weight:700;color:var(--or);letter-spacing:.12em}
.hr{display:flex;align-items:center;gap:.8rem;padding:.5rem 1.2rem}
.cbadge{font-size:.68rem;font-weight:700;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);border-radius:20px;padding:3px 10px;white-space:nowrap}
.oc{display:flex;flex-direction:column;align-items:flex-end}
.oc label{font-size:.6rem;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:2px}
.hi-inp{width:86px;padding:5px 7px;font-size:.9rem;text-align:right;border:none;border-radius:6px;font-weight:800;color:var(--bl);background:rgba(255,255,255,.95);font-family:'Nunito',sans-serif}
.hi-inp:focus{outline:2px solid var(--or)}
.hi-inp[type=date]{width:142px}
@media(max-width:600px){.blab{display:none}.hr{gap:.4rem;padding:.4rem .6rem}}

/* LAYOUT */
.wrap{max-width:1300px;margin:1.3rem auto;padding:0 1rem}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:1.2rem;margin-bottom:1.1rem;border:1px solid var(--bo)}
.stit{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.79rem;letter-spacing:.11em;text-transform:uppercase;color:var(--bl);display:flex;align-items:center;gap:7px;margin-bottom:.85rem;padding-bottom:.45rem;border-bottom:2px solid var(--orl)}
.g{display:grid;gap:.8rem}
.c2{grid-template-columns:1fr 1fr}.c4{grid-template-columns:repeat(4,1fr)}
@media(max-width:860px){.c4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.c2,.c4{grid-template-columns:1fr}.wrap{padding:0 .5rem;margin-top:.8rem}}

/* FORMS */
label{display:block;font-size:.71rem;font-weight:700;color:var(--mu);margin-bottom:.26rem;letter-spacing:.04em;text-transform:uppercase}
input,textarea,select{width:100%;padding:.58rem .82rem;border:1.5px solid var(--bo);border-radius:8px;font-size:.91rem;background:#fff;font-family:'Nunito',sans-serif;color:var(--dk);transition:border-color .18s,box-shadow .18s}
input:focus,textarea:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(244,121,32,.13)}
.tog{display:inline-flex;align-items:center;gap:.5rem;margin-top:.8rem;font-size:.82rem;color:var(--mu);cursor:pointer;font-weight:600}
.tog input[type=checkbox]{accent-color:var(--or);width:auto}

/* SUGGESTIONS */
.iw{position:relative; width: 100%;}
.sl{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--or);border-top:none;border-radius:0 0 8px 8px;max-height:220px;overflow-y:auto;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.15);display:none}
.sl.on{display:block}
.si{padding:9px 12px;border-bottom:1px solid #f0f4f9;cursor:pointer;font-size:.86rem}
.si:hover{background:var(--orl);color:var(--ord)}

/* BUTTONS */
.ab{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;justify-content:space-between;margin-bottom:.85rem}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.54rem .95rem;border:none;border-radius:8px;font-weight:700;cursor:pointer;transition:all .17s;font-size:.86rem;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dk)}
.btn:active{transform:scale(.97)}
.btn.pr{background:var(--or);color:#fff}.btn.pr:hover{background:var(--ord)}
.btn.bl{background:var(--bl);color:#fff}.btn.bl:hover{background:var(--bld)}
.btn.se{background:#fff;border:1.5px solid var(--bo);color:var(--mu)}.btn.se:hover{border-color:var(--or);color:var(--ord)}
.btn.da{background:#fee2e2;color:#dc2626}.btn.da:hover{background:#fecaca}
.btn.wa{background:#25D366;color:#fff}.btn.wa:hover{background:#1da851}
.btn.sm{padding:.3rem .55rem;font-size:.78rem}

/* ENTRY FORM v19 (com suporte a edição) */
#ef{background:linear-gradient(135deg,var(--orl),#fffcf9);border:1.5px solid #fcd9b8;position:relative; transition: all 0.3s;}
#ef.editing-mode { border: 2px dashed var(--bl); background: #f0f7ff; }

/* Badge de Edição */
.edit-badge { display: none; position: absolute; top: -12px; left: 15px; background: var(--bl); color: #fff; padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
#ef.editing-mode .edit-badge { display: block; }

/* Cancelar Edição (botão) */
#cancelEditBtn { display: none; margin-left: 0.5rem; }
#ef.editing-mode #cancelEditBtn { display: inline-flex; }

/* Grid Layout */
.ef-row{
  display:grid; gap:.6rem; align-items:end; 
  grid-template-columns: 90px 70px 1fr 100px auto; 
}
#ef.has-bar .ef-row {
  grid-template-columns: 90px 140px 70px 1fr 100px auto;
}

#ef_bar_wrap { display: none; }
#ef.has-bar #ef_bar_wrap { display: block; }

@media(max-width:950px){
  .ef-row, #ef.has-bar .ef-row { grid-template-columns: 1fr 1fr; }
  .iw { grid-column: span 2; }
  .ef-actions { grid-column: span 2; display: flex; gap: 0.5rem; }
  #addBtn { width: 100%; }
}

.ef-hint{font-size:.7rem;color:var(--mu);margin-top:.4rem;text-align:right}
.ef-hint kbd{background:var(--bo);border-radius:4px;padding:1px 5px;font-family:'Nunito',sans-serif;font-size:.7rem}
.ef-feed{margin-top:.8rem;padding:.6rem;background:#fff;border:1px dashed var(--or);border-radius:6px;font-size:.85rem;color:var(--bl);display:none;align-items:center;gap:.5rem}
.ef-feed.on{display:flex}
.ef-feed i{color:var(--or)}

/* TABLE */
.tw{overflow-x:auto;border:1px solid var(--bo);border-radius:8px;margin-top:.75rem}
table{width:100%;border-collapse:collapse;min-width:720px}
th{background:var(--bl);color:#fff;text-align:left;padding:.58rem .65rem;font-size:.73rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;white-space:nowrap}
th.tc{text-align:center}

/* VIEW ROW */
tr.vr td{padding:.32rem .6rem;border-bottom:1px solid var(--bo);font-size:.88rem;vertical-align:middle;transition:background .1s}
tr.vr:nth-child(even) td{background:#f8fafd}
tr.vr:hover td{background:#fff8f1}

/* EDIT ROW */
tr.er td{padding:.22rem .35rem;border-bottom:2px solid var(--or);background:#fffbf5;vertical-align:middle}
tr.er{outline:2px solid var(--or)}

/* inline inputs */
.ti{width:100%;padding:.28rem .4rem;border:1.5px solid var(--or);border-radius:5px;font-size:.85rem;font-family:'Nunito',sans-serif;color:var(--dk);background:#fff}
.ti:focus{outline:none;box-shadow:0 0 0 2px rgba(244,121,32,.2)}
.ti-sm{width:62px;text-align:center}
.ti-pr{width:92px;text-align:right}
.ti-cod{width:68px}
.ti-desc{width:100%}

/* td helpers */
.td-n{text-align:center;color:#bbb;font-size:.74rem;font-weight:700;width:30px}
.td-img{width:52px;text-align:center;padding:2px 3px!important}
.td-th{width:46px;height:46px;object-fit:contain;border:1px solid #eee;background:#fff;border-radius:5px;display:block;cursor:pointer}
.td-tot{font-weight:800;color:var(--bl);text-align:right;white-space:nowrap}
.td-act{text-align:center;width:66px}

/* lápis de edição */
.pen{color:var(--or);font-size:.65rem;opacity:0;margin-left:3px;cursor:pointer;vertical-align:middle;transition:opacity .15s}
tr.vr:hover .pen{opacity:.7}
.pen:hover{opacity:1!important}

/* img placeholder */
.iph{width:46px;height:46px;background:linear-gradient(135deg,#f0f4f9,#e8eef8);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#bbb;border:1px solid #eee;cursor:default}

/* MOBILE CARDS */
.mc{display:none;flex-direction:column;gap:.8rem;margin-top:.8rem}
.mcard{background:#fff;border:1px solid var(--bo);border-radius:var(--r);padding:.85rem;border-left:4px solid var(--or);box-shadow:0 2px 5px rgba(0,0,0,.05)}
.mc-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:.6rem}
.mc-img{width:52px;height:52px;object-fit:contain;border:1px solid #eee;border-radius:5px}
.mc-body{flex:1}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.4rem}
.mc-tot{display:flex;justify-content:space-between;align-items:center;margin-top:.55rem;border-top:1px solid var(--bo);padding-top:.45rem}
.mc-val{font-weight:900;color:var(--bl);font-size:1.05rem}
@media(max-width:768px){.tw{display:none}.mc{display:flex}.da-act{display:none}}

/* TOTAL */
.gtot{font-size:1.45rem;font-weight:900;color:var(--bl);text-align:right;margin:.95rem 0;padding:.82rem 1.15rem;background:linear-gradient(90deg,transparent,var(--bll));border-radius:8px;border-right:5px solid var(--or);font-family:'Barlow Condensed',sans-serif}

/* FAB */
.fab{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);padding:.62rem;border-top:2px solid var(--orl);z-index:99;backdrop-filter:blur(8px)}
.fab-in{max-width:1300px;margin:0 auto;display:flex;gap:.45rem;justify-content:space-between}
.fab-in .fg{display:flex;gap:.4rem}
@media(max-width:768px){.fab{display:block}}

/* TOAST */
#toast{visibility:hidden;min-width:190px;background:var(--bld);color:#fff;text-align:center;border-radius:50px;padding:10px 20px;position:fixed;z-index:1000;left:50%;bottom:88px;transform:translateX(-50%);opacity:0;transition:opacity .3s;font-weight:700;font-size:.86rem;box-shadow:0 4px 20px rgba(0,0,0,.2)}
#toast.on{visibility:visible;opacity:1}

/* HISTÓRICO */
details.hist{margin-top:.8rem;border:1.5px dashed var(--bo);border-radius:8px;padding:.55rem .75rem;background:var(--bg)}
details.hist summary{cursor:pointer;font-weight:700;color:var(--bl);font-size:.86rem}
.hl{margin-top:.55rem;display:flex;flex-direction:column;gap:.4rem}
.hi2{display:flex;justify-content:space-between;align-items:center;padding:.52rem .82rem;background:#fff;border-radius:6px;border:1px solid var(--bo);font-size:.86rem}
.hi2 strong{color:var(--bl)}

/* MODAL */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center}
.mbg.on{display:flex}
.mbox{background:#fff;border-radius:var(--r);padding:1.4rem;width:min(460px,96vw);box-shadow:0 10px 30px rgba(0,0,0,.2)}
.mbox h3{margin:0 0 .9rem;font-size:.98rem;color:var(--bl);font-family:'Barlow Condensed',sans-serif;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.ma{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.1rem}
.mrow{display:flex;align-items:center;gap:.7rem;margin-top:.55rem}
.mrow label{margin:0;white-space:nowrap;text-transform:none;font-size:.85rem;font-weight:700;color:var(--dk)}
.mrow input[type=range]{flex:1;accent-color:var(--or)}
.mrow select{flex:1;border:1px solid var(--bo);padding:.4rem;border-radius:6px}
.mrow .mval{min-width:38px;text-align:right;font-weight:800;color:var(--or);font-size:.88rem}
</style>
</head>
<body>

<div class="mbg" id="cfgM">
  <div class="mbox">
    <h3><i class="fa fa-gear" style="color:var(--or)"></i> Configurações</h3>

    <div class="mrow">
      <label>Fonte de Imagens:</label>
      <select id="cfg_isrc">
        <option value="git">GitHub (Rápido/Estável)</option>
        <option value="site">Site Ameripan (Scraper)</option>
      </select>
    </div>

    <label style="margin-top:.7rem">URL base GitHub</label>
    <input id="cfg_base" placeholder="https://raw.githubusercontent.com/...">

    <label style="margin-top:.7rem">Google API Key <span style="font-weight:400;color:var(--mu)">(opcional)</span></label>
    <input id="cfg_gkey" placeholder="AIza...">

    <label style="margin-top:.7rem">Google Search Engine CX <span style="font-weight:400;color:var(--mu)">(opcional)</span></label>
    <input id="cfg_gcx" placeholder="cx=...">

    <hr style="border:none;border-top:1px solid var(--bo);margin:1rem 0">
    <label style="margin-bottom:.5rem">Altura das linhas no PDF (mm)</label>
    <div class="mrow">
      <span style="font-size:.8rem;color:var(--mu)">10mm</span>
      <input type="range" id="cfg_rowh" min="10" max="40" step="1" value="14" oninput="document.getElementById('cfg_rowh_v').textContent=this.value+'mm'">
      <span style="font-size:.8rem;color:var(--mu)">40mm</span>
      <span class="mval" id="cfg_rowh_v">14mm</span>
    </div>

    <div class="ma">
      <button class="btn se" id="cfgCl">Cancelar</button>
      <button class="btn pr" id="cfgSv">Salvar</button>
    </div>
  </div>
</div>

<header>
  <div class="hi">
    <div class="brand">
      <img src="https://cdn.awsli.com.br/1284/1284671/logo/1e2bc493d1.png" alt="Ameripan">
      <div class="blab">Cotação<em>Ameripan Dist.</em></div>
    </div>
    <div class="hr">
      <span class="cbadge" id="catSt"><i class="fa fa-circle-notch fa-spin"></i></span>
      <button class="btn se sm" id="btnCfg" title="Configurações"><i class="fa fa-gear"></i></button>
      <div class="oc"><label>Nº Cotação</label><input id="oid" class="hi-inp" type="number"></div>
      <div class="oc"><label>Data</label><input id="odt" class="hi-inp" type="date"></div>
    </div>
  </div>
</header>

<div class="wrap">

  <section class="card">
    <div class="ab">
      <div class="stit" style="margin:0;border:none;padding:0"><i class="fa fa-user-tie"></i> Dados da Cotação</div>
      <button class="btn se sm" id="btnNew"><i class="fa fa-plus"></i> Nova Cotação</button>
    </div>
    <div class="g c4" style="margin-top:.85rem">
      <div><label>Vendedor</label><input id="seller" placeholder="Seu Nome"></div>
      <div><label>WhatsApp Vendedor</label><input id="swa" type="tel" placeholder="(00) 00000-0000"></div>
      <div><label>Cliente</label><input id="buyer" placeholder="Razão Social / Nome"></div>
      <div><label>Cód. Cliente</label><input id="ccod" placeholder="Código Interno"></div>
    </div>
    <div class="g c2" style="margin-top:.75rem">
      <div><label>Endereço / CNPJ / Detalhes</label><input id="cdet" placeholder="Rua, Bairro, Cidade, CNPJ..."></div>
      <div><label>Condição de Pagamento</label><input id="cpay" placeholder="Ex: Boleto 14/21 dd"></div>
    </div>
    <label class="tog"><input type="checkbox" id="togBar"> Exibir coluna Código de Barras</label>
    <details class="hist">
      <summary><i class="fa fa-clock-rotate-left"></i> Histórico de Cotações</summary>
      <div class="hl" id="histL"></div>
    </details>
  </section>

  <section class="card" id="ef">
    <span class="edit-badge">EDITANDO ITEM</span>
    <div class="stit" id="ef_title"><i class="fa fa-cart-plus"></i> Adicionar Item</div>
    
    <div class="ef-row">
      <div>
        <label>Código</label>
        <input id="ef_cod" placeholder="Cód." inputmode="numeric" autocomplete="off">
      </div>
      
      <div id="ef_bar_wrap">
        <label>Barras</label>
        <input id="ef_bar" placeholder="EAN / GTIN">
      </div>

      <div>
        <label>Qtd</label>
        <input id="ef_qty" type="number" value="1" min="0.01" step="any">
      </div>
      
      <div class="iw">
        <label>Descrição (busca)</label>
        <input id="ef_desc" placeholder="Busca por nome..." autocomplete="off">
        <div class="sl" id="sug"></div>
      </div>
      
      <div>
        <label>Preço Unit.</label>
        <input id="ef_price" placeholder="R$ 0,00" inputmode="decimal">
      </div>
      
      <div class="ef-actions" style="display:flex;align-items:flex-end">
        <button class="btn pr" id="addBtn" style="width:100%;padding:.6rem 0"><i class="fa fa-plus"></i></button>
        <button class="btn da" id="cancelEditBtn" title="Cancelar Edição"><i class="fa fa-times"></i></button>
      </div>
    </div>
    
    <div class="ef-feed" id="ef_feed">
      <i class="fa fa-info-circle"></i> 
      <span id="ef_feed_txt">...</span>
    </div>

    <div class="ef-hint">
      <i class="fa fa-pencil" style="color:var(--or)"></i>
      Navegue com <kbd>Enter</kbd>: Código → Qtd → Preço → <kbd>Enter</kbd> grava e volta ao Código
    </div>
  </section>

  <section class="card" style="padding-bottom:0">
    <div class="stit"><i class="fa fa-list"></i> Itens da Cotação</div>
    <div class="tw">
      <table id="tbl">
        <thead><tr>
          <th class="tc" style="width:30px">#</th>
          <th style="width:70px">Cód <i class="fa fa-pencil" style="font-size:.55rem;opacity:.45"></i></th>
          <th class="tc" style="width:54px">Img</th>
          <th>Descrição <i class="fa fa-pencil" style="font-size:.55rem;opacity:.45"></i></th>
          <th class="tc" style="width:48px">Un</th>
          <th class="col-bar" style="display:none;width:140px">Barras</th>
          <th class="tc" style="width:68px">Qtde</th>
          <th style="width:100px;text-align:right">Preço Un</th>
          <th style="width:100px;text-align:right">Total</th>
          <th class="tc" style="width:64px">Ações</th>
        </tr></thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
    <div class="mc" id="mc"></div>
    <div class="gtot" id="gtot">Total: R$ 0,00</div>
    <div class="g" style="margin-bottom:1rem">
      <label>Observações</label>
      <textarea id="notes" rows="2" placeholder="Ex: Entrega prevista para..."></textarea>
    </div>
    <div class="ab da-act" style="border-top:1px solid var(--bo);padding-top:1rem;margin-top:.4rem">
      <button class="btn da" id="clearAll"><i class="fa fa-trash"></i> Limpar</button>
      <div style="display:flex;gap:.45rem;flex-wrap:wrap">
        <button class="btn se" id="cpyBtn"><i class="fa fa-copy"></i> Copiar</button>
        <button class="btn wa" id="waBtn"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
        <button class="btn se" id="xlsBtn"><i class="fa fa-file-excel"></i> Excel</button>
        <button class="btn bl" id="pdfBtn"><i class="fa fa-file-pdf"></i> Gerar PDF</button>
      </div>
    </div>
  </section>
</div>

<div class="fab">
  <div class="fab-in">
    <button class="btn se sm" id="mXls"><i class="fa fa-file-excel"></i> XLS</button>
    <div class="fg">
      <button class="btn se sm" id="mCpy"><i class="fa fa-copy"></i></button>
      <button class="btn wa sm" id="mWa"><i class="fa-brands fa-whatsapp"></i></button>
      <button class="btn bl sm" id="mPdf"><i class="fa fa-file-pdf"></i> PDF</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════
   CONFIG & STATE
══════════════════════════════════════════ */
const CFG = {
  sheetId: '1cN_1GBR29BN77eRZAkzvikt96i_kX9AZ04cTc6XRM8Q',
  apiKey:  'AIzaSyChiZPUY-G3oyZN2NGY_vlgRXUzry9Pkeo',
  // Logo: primeiro tenta logo.txt (base64 pré-processado), depois jpg

const imgCache = new Map();

function gitUrl(sku) { return `${CFG.imgBase}${sku}.jpg`; }
function gitUrlPng(sku) { return `${CFG.imgBase}${sku}.png`; }

async function checkUrl(url) {
  try {
    const r = await fetch(url, {method:'HEAD', signal:AbortSignal.timeout(4000)});
    return r.ok ? url : null;
  } catch { return null; }
}

/* SCRAPER AMERIPAN */
async function imgFromScrape(sku) {
  try {
    const url = `https://www.ameripan.com.br/buscar?q=${sku}`;
    const response = await fetch(url, {signal:AbortSignal.timeout(8000)});
    if (!response.ok) return null;

    const html = await response.text();
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const productDiv = doc.querySelector(`.listagem-item .produto-sku.hide`);
    if (!productDiv) return null;

    const skuText = productDiv.textContent.trim();
    if(skuText !== String(sku)) return null;

    const parentDiv = productDiv.closest('.listagem-item');
    const imgEl = parentDiv?.querySelector('.imagem-produto img');
    if (!imgEl) return null;

    let src = imgEl.getAttribute('src') || imgEl.getAttribute('data-src') || '';
    if (src.startsWith('//')) src = 'https:' + src;
    if (src.startsWith('/')) src = 'https://www.ameripan.com.br' + src;
    
    // Nome do produto
    const nameEl = parentDiv.querySelector('.nome-produto');
    const name = nameEl ? nameEl.textContent.trim() : null;

    return { url: src, name: name };
  } catch (error) { return null; }
}

async function imgFromGoogle(sku) {
  if (!CFG.gKey || !CFG.gCx) return null;
  try {
    const q = encodeURIComponent(`Ameripan produto ${sku}`);
    const url = `https://www.googleapis.com/customsearch/v1?key=${CFG.gKey}&cx=${CFG.gCx}&q=${q}&searchType=image&num=1`;
    const res = await fetch(url, {signal:AbortSignal.timeout(6000)});
    const j = await res.json();
    return { url: j?.items?.[0]?.link || null, name: null };
  } catch { return null; }
}

async function resolveImg(sku) {
  if (imgCache.has(sku)) return imgCache.get(sku);
  let res = null;

  // Busca Principal (Scraper ou Git)
  if (CFG.imgSrc === 'site') {
    res = await imgFromScrape(sku);
    if (!res?.url) {
        const u = await checkUrl(gitUrl(sku));
        if(u) res = { url: u, name: null };
    }
  } else {
    // Git
    let u = await checkUrl(gitUrl(sku));
    if (!u) u = await checkUrl(gitUrlPng(sku));
    if (u) { res = { url: u, name: null }; } 
    else { res = await imgFromScrape(sku); }
  }
  
  if (!res?.url) res = await imgFromGoogle(sku);

  const finalRes = { url: res?.url || null, name: res?.name || null };
  imgCache.set(sku, finalRes);
  return finalRes;
}

async function url2b64(url) {
  if (!url) return null;

  // 1️⃣ Tenta fetch normal (funciona para GitHub raw e outros CORS-ok)
  try {
    const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
    if (r.ok) {
      const b = await r.blob();
      return await new Promise(res => { const fr = new FileReader(); fr.onloadend = () => res(fr.result); fr.readAsDataURL(b); });
    }
  } catch {}

  // 2️⃣ Fallback via <img> + <canvas> — contorna CORS para leitura de pixel
  // (funciona quando a imagem já estava carregada no browser / cache)
  return new Promise(resolve => {
    const img = new Image();
    img.crossOrigin = 'anonymous';   // solicita CORS; se o servidor permitir, ótimo
    img.onload = () => {
      try {
        const c = document.createElement('canvas');
        c.width = img.naturalWidth; c.height = img.naturalHeight;
        c.getContext('2d').drawImage(img, 0, 0);
        resolve(c.toDataURL('image/jpeg', 0.85));
      } catch { resolve(null); }     // tainted canvas (servidor não permite CORS)
    };
    img.onerror = () => {
      // 3️⃣ Última tentativa: canvas sem crossOrigin
      // O browser já tem a imagem em cache (estava no <img> da tabela)
      // Cria novo img SEM crossOrigin para forçar uso do cache
      const img2 = new Image();
      img2.onload = () => {
        try {
          const c = document.createElement('canvas');
          c.width = img2.naturalWidth; c.height = img2.naturalHeight;
          c.getContext('2d').drawImage(img2, 0, 0);
          resolve(c.toDataURL('image/jpeg', 0.85));
        } catch { resolve(null); }
      };
      img2.onerror = () => resolve(null);
      img2.src = url;
    };
    img.src = url + (url.includes('?') ? '&' : '?') + '_cb=' + Date.now();
  });
}

// Configura o formulário para modo Edição ou Adição
function setFormMode(mode, idx = -1) {
  S.editingIndex = idx;
  if(mode === 'edit') {
    const item = S.q.items[idx];
    E.ef.classList.add('editing-mode');
    E.efTitle.innerHTML = '<i class="fa fa-pencil"></i> Editando Item #' + (idx+1);
    E.addBtn.innerHTML = '<i class="fa fa-save"></i> Salvar';
    E.addBtn.className = 'btn bl'; // Azul
    E.cancelBtn.style.display = 'inline-flex';
    
    // Preenche campos
    E.cod.value = item.code;
    E.bar.value = item.bar || '';
    E.qty.value = item.qty;
    E.desc.value = item.desc;
    E.price.value = item.price.toFixed(2).replace('.',',');
    
    // Scroll para o formulário
    E.ef.scrollIntoView({behavior: 'smooth', block: 'center'});
    E.desc.focus();
  } else {
    // Reset para modo Adição
    E.ef.classList.remove('editing-mode');
    E.efTitle.innerHTML = '<i class="fa fa-cart-plus"></i> Adicionar Item';
    E.addBtn.innerHTML = '<i class="fa fa-plus"></i>';
    E.addBtn.className = 'btn pr'; // Laranja
    E.cancelBtn.style.display = 'none';
    
    E.cod.value=''; E.bar.value=''; E.qty.value='1'; E.desc.value=''; E.price.value='';
    E.feed.classList.remove('on');
  }
}

E.cancelBtn.onclick = () => setFormMode('add');

function commitItem() {
  const code = E.cod.value.trim();
  const desc = E.desc.value.trim();
  if (!code && !desc) return toast('Preencha Código ou Descrição');
  
  const newItem = { 
    code, desc, 
    bar: E.bar.value.trim(),
    un:'UN', qty:parseFloat(E.qty.value)||1, price:pmny(E.price.value) 
  };
  
  if (S.editingIndex >= 0) {
    // Salvar Edição
    S.q.items[S.editingIndex] = newItem;
    toast('Item atualizado!');
    setFormMode('add'); // já limpa campos e foca cod
  } else {
    // Adicionar Novo — limpa campos, foca código
    S.q.items.push(newItem);
    E.cod.value=''; E.bar.value=''; E.qty.value='1'; E.desc.value=''; E.price.value='';
    E.feed.classList.remove('on');
    E.cod.focus();
  }
  
  persist(); render();
}

E.addBtn.addEventListener('click', commitItem);

function removeItem(i) {
  if (confirm('Remover este item?')) { 
    S.q.items.splice(i,1); 
    if(S.editingIndex === i) setFormMode('add');
    persist(); render(); 
  }
}

/* ── VIEW ROW (DESKTOP) ── */
function buildVR(idx, item, sb) {
  const sub = item.qty * item.price;
  const tr = document.createElement('tr');
  tr.className = 'vr'; tr.id = `vr${idx}`;

  function tdPen(html, align='left', w='') {
    const td = document.createElement('td');
    if (w) td.style.width = w;
    td.style.textAlign = align;
    td.innerHTML = html + ` <i class="fa fa-pencil pen" title="Editar linha"></i>`;
    td.querySelector('.pen').onclick = () => activateER(idx);
    return td;
  }

  const nTd = document.createElement('td'); nTd.className='td-n'; nTd.textContent=idx+1;
  const cTd = tdPen(`<strong style="color:var(--bl)">${item.code}</strong>`, 'left', '70px');

  const iTd = document.createElement('td'); iTd.className='td-img';
  const ph = document.createElement('div'); ph.className='iph'; ph.innerHTML='<i class="fa fa-image"></i>';
  iTd.appendChild(ph);
  resolveImg(item.code).then(r => {
    if (!r?.url) { ph.innerHTML='<i class="fa fa-image" style="color:#ccc"></i>'; return; }
    const img = document.createElement('img');
    img.className='td-th'; img.src=r.url; img.alt=item.code;
    img.onclick = () => window.open(r.url, '_blank');
    img.onerror = () => { img.style.display='none'; ph.innerHTML='<i class="fa fa-image" style="color:#ccc"></i>'; };
    iTd.replaceChild(img, ph);
  });

  const dTd = tdPen(item.desc);
  const uTd = tdPen(item.un||'UN','center','48px');
  const bTd = tdPen(item.bar||'—');
  bTd.className='col-bar'; bTd.style.display=sb?'table-cell':'none';
  const qTd = tdPen(item.qty,'center','68px');
  const pTd = tdPen(fmt(item.price),'right','100px');
  const tTd = document.createElement('td');
  tTd.className='td-tot'; tTd.id=`sub${idx}`; tTd.textContent=fmt(sub);

  const aTd = document.createElement('td'); aTd.className='td-act';
  aTd.innerHTML=`<button class="btn sm se" title="Editar"><i class="fa fa-pencil" style="color:var(--or)"></i></button><button class="btn sm da" title="Remover" style="margin-top:2px"><i class="fa fa-times"></i></button>`;
  aTd.querySelectorAll('button')[0].onclick = () => activateER(idx);
  aTd.querySelectorAll('button')[1].onclick = () => removeItem(idx);

  tr.append(nTd,cTd,iTd,dTd,uTd,bTd,qTd,pTd,tTd,aTd);
  E.tb.appendChild(tr);
}

/* ── EDIT ROW (INLINE DESKTOP) ── */
function activateER(idx) {
  // Se for tela pequena, usa o formulário do topo
  if(window.innerWidth <= 768) {
    setFormMode('edit', idx);
    return;
  }

  document.querySelectorAll('tr.er').forEach(r => { const vi=r.dataset.for; r.remove(); const vr=document.getElementById(`vr${vi}`); if(vr)vr.style.display=''; });

  const item = S.q.items[idx];
  const sb   = S.q.showBar;
  const vr   = document.getElementById(`vr${idx}`);
  if (!vr) return;
  vr.style.display = 'none';

  const er = document.createElement('tr');
  er.className='er'; er.id=`er${idx}`; er.dataset.for=idx;

  function mk(val, cls='ti', type='text') {
    const i=document.createElement('input'); i.type=type; i.value=val; i.className=cls; return i;
  }

  const iCod   = mk(item.code, 'ti ti-cod');
  const iDesc  = mk(item.desc, 'ti ti-desc');
  const iUn    = mk(item.un||'UN', 'ti ti-sm');
  const iBar   = mk(item.bar||'', 'ti');
  const iQty   = mk(item.qty, 'ti ti-sm', 'number'); iQty.min='0.01'; iQty.step='any';
  const iPrice = mk(item.price.toFixed(2).replace('.',','), 'ti ti-pr');
  iPrice.addEventListener('input', ()=>msk(iPrice));
  [iQty,iPrice].forEach(i=>i.addEventListener('focus',function(){this.select();}));

  /* CORREÇÃO BUG ENTER: Atualização Garantida */
  async function updateInfoFromCode() {
    const nc = iCod.value.trim();
    if (!nc || nc === item.code) return; 
    
    if (S.cmap.has(nc)) iDesc.value = S.cmap.get(nc);
    
    imgCache.delete(nc);
    const r = await resolveImg(nc); // Aguarda busca
    
    // Atualiza Imagem
    const imgTd = er.querySelector('.td-img');
    if (imgTd) {
        imgTd.innerHTML='';
        if (!r?.url) { imgTd.innerHTML='<div class="iph"><i class="fa fa-image" style="color:#ccc"></i></div>'; }
        else {
            const img=document.createElement('img'); img.className='td-th'; img.src=r.url;
            img.onclick=()=>window.open(r.url,'_blank');
            imgTd.appendChild(img);
        }
    }
    // Atualiza Nome se necessário
    if(r.name) iDesc.value = r.name;
  }

  iCod.addEventListener('blur', updateInfoFromCode);

  async function save() {
    // Se o código mudou, força a atualização antes de salvar
    if (iCod.value.trim() !== item.code) {
        await updateInfoFromCode();
    }

    const newCode = iCod.value.trim() || item.code;
    const codeChanged = newCode !== item.code;
    S.q.items[idx] = {
      code:  newCode,
      desc:  iDesc.value.trim() || item.desc,
      bar:   iBar.value.trim(),
      un:    iUn.value.trim() || 'UN',
      qty:   parseFloat(iQty.value) || 1,
      price: pmny(iPrice.value)
    };
    if (codeChanged) imgCache.delete(item.code);
    persist();
    er.remove();
    const oldVr = document.getElementById(`vr${idx}`);
    if (oldVr) oldVr.remove();
    // Re-insere a linha (simples re-render)
    render(); 
  }

  function cancel() {
    er.remove();
    const v=document.getElementById(`vr${idx}`); if(v)v.style.display='';
  }

  er.addEventListener('keydown', async e => {
    if(e.key==='Escape') cancel();
    if(e.key==='Enter')  { e.preventDefault(); await save(); }
  });

  const imgTd = document.createElement('td'); imgTd.className='td-img';
  resolveImg(item.code).then(r=>{
    if(!r?.url){imgTd.innerHTML='<div class="iph"><i class="fa fa-image"></i></div>';return;}
    const img=document.createElement('img'); img.className='td-th'; img.src=r.url;
    img.onclick=()=>window.open(r.url,'_blank');
    imgTd.appendChild(img);
  });

  const bTd=document.createElement('td'); bTd.className='col-bar'; bTd.style.display=sb?'table-cell':'none'; bTd.appendChild(iBar);

  const aTd=document.createElement('td'); aTd.className='td-act'; aTd.style.verticalAlign='middle';
  aTd.innerHTML=`<button class="btn sm pr sv-btn" title="Salvar (Enter)"><i class="fa fa-check"></i></button><button class="btn sm se cl-btn" title="Cancelar (Esc)" style="margin-top:2px"><i class="fa fa-times"></i></button>`;
  aTd.querySelector('.sv-btn').onclick=save;
  aTd.querySelector('.cl-btn').onclick=cancel;

  function td(el,al='left'){const t=document.createElement('td');t.style.textAlign=al;t.appendChild(el);return t;}
  const nTd=document.createElement('td');nTd.className='td-n';nTd.textContent=idx+1;

  er.append(nTd, td(iCod), imgTd, td(iDesc), td(iUn,'center'), bTd, td(iQty,'center'), td(iPrice,'right'), document.createElement('td'), aTd);
  vr.insertAdjacentElement('afterend', er);
  iDesc.focus();
}

/* ── MOBILE CARD ── */
function buildCard(idx, item) {
  const sub = item.qty * item.price;
  const card = document.createElement('div'); card.className='mcard';
  card.innerHTML=`
    <div class="mc-top">
      <div id="mc_img_${idx}"><div class="iph"><i class="fa fa-image"></i></div></div>
      <div class="mc-body" style="flex:1">
        <div style="font-size:.72rem;color:var(--mu)">Cód: <strong>${item.code}</strong></div>
        <div style="font-weight:700;font-size:.92rem;margin-top:2px">${item.desc}</div>
      </div>
      <button class="btn sm da" onclick="removeItem(${idx})"><i class="fa fa-times"></i></button>
    </div>
    <div class="mc-grid">
      <div><label>Qtde</label><div style="font-weight:700">${item.qty}</div></div>
      <div><label>Preço Un</label><div style="font-weight:700">${fmt(item.price)}</div></div>
    </div>
    <div class="mc-tot">

}

/* ══════════════════════════════════════════
   HISTÓRICO / WA / PDF / EXCEL
══════════════════════════════════════════ */
function newOrder() {
  if (confirm('Iniciar nova cotação? A atual será salva no histórico.')) {
    addToHist();
    S.q.id=nextId(); S.q.dt=new Date().toISOString().split('T')[0];
    S.q.items=[]; S.q.buyer=''; S.q.ccod=''; S.q.notes='';
    syncToForm(); persist(); render();
    toast(`Cotação #${S.q.id} iniciada`);
  }
}
function addToHist() {
  if(!S.q.items.length)return;
  let h=JSON.parse(localStorage.getItem('a_v16h')||'[]');
  h=h.filter(x=>x.id!=S.q.id); h.unshift(S.q);
  if(h.length>20)h.pop();
  localStorage.setItem('a_v16h',JSON.stringify(h));
}
function renderHist() {
  const h=JSON.parse(localStorage.getItem('a_v16h')||'[]'), c=$('histL'); c.innerHTML='';
  if(!h.length){c.innerHTML='<i style="color:#bbb;font-size:.82rem">Nenhuma cotação recente.</i>';return;}
  h.forEach(q=>{
    const t=q.items.reduce((a,i)=>a+i.qty*i.price,0);
    const d=document.createElement('div'); d.className='hi2';
    d.innerHTML=`<div><strong>#${q.id}</strong> — ${q.buyer||'(sem cliente)'}<br><small style="color:#aaa">${q.dt} · ${fmt(t)}</small></div><button class="btn sm se" onclick="loadHist(${q.id})">Abrir</button>`;
    c.appendChild(d);
  });
}
window.loadHist=id=>{
  const h=JSON.parse(localStorage.getItem('a_v16h')||'[]'), f=h.find(x=>x.id==id);
  if(f){S.q=f;syncToForm();render();toast(`Cotação #${id} carregada`);}
};

function waText() {
  const q=S.q;
  let m=`*COTAÇÃO #${q.id}* (${fmtDt(q.dt)})\n`;
  if(q.buyer)  m+=`Cliente: *${q.buyer}*\n`;
  if(q.seller) m+=`Vendedor: ${q.seller}\n`;
  m+=`*COD - QTDE - NOME - PREÇO *\n`;
  q.items.forEach((i,idx)=>{
    m+=`${i.code} - ${i.qty} - ${i.desc} - ${fmt(i.price)}\n`;
    if(idx < q.items.length-1) m+=`-------\n`;
  });
  const t=q.items.reduce((a,i)=>a+i.qty*i.price,0);
  m+=`-------\nTotal: ${fmt(t)}`;
  if(q.notes) m+=`\nObs: ${q.notes}`;
  return m;
}
function waUrl() {
  const ph=(S.q.swa||'').replace(/\D/g,'');
  return `https://api.whatsapp.com/send/?phone=55${ph}&text=${encodeURIComponent(waText())}&type=phone_number&app_absent=0`;
}

async function genPDF() {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF('l','mm','a4');
  const q=S.q, W=297, H=210;
  const RH = CFG.rowH;         
  const IMG_W = RH - 2;

  toast('Aguarde… buscando imagens para o PDF…', 15000);

  const imgB64 = {}; const imgUrl = {};
  await Promise.allSettled(q.items.map(async item => {
    const r = await resolveImg(item.code);
    if (r?.url) {
      imgUrl[item.code] = r.url;
      const b64 = await url2b64(r.url);
      if (b64) imgB64[item.code] = b64;
    }
  }));

  /* ── HEADER ── */
  doc.setFillColor(...P.bld); doc.rect(0,0,W,10,'F');
  doc.setFillColor(...P.bll); doc.rect(0,10,W,35,'F');
  doc.setFillColor(...P.or);  doc.rect(0,45,W,2.5,'F');

  // Logo — carrega logo.txt (base64) ou fallback jpg
  try {
    const lb = await loadLogo();
    if (lb) {
      // Detecta tipo: PNG (fundo transparente) usa PNG, JPG usa JPEG
      const fmt = lb.includes('data:image/png') ? 'PNG' : 'JPEG';
      doc.addImage(lb, fmt, 8, 11, 50, 25);
    }
  } catch{}

  doc.setFontSize(20); doc.setTextColor(...P.bld); doc.setFont('helvetica','bold');
  doc.text('COTAÇÃO DE PRODUTOS', W/2, 26, {align:'center'});
  doc.setFontSize(7); doc.setTextColor(...P.gy); doc.setFont('helvetica','normal');
  doc.text('AMERIPAN DISTRIBUIDORA DESDE 1990', W/2, 32, {align:'center'});

  doc.setFillColor(...P.wh); doc.roundedRect(217,11,71,28,2,2,'F');
  doc.setDrawColor(...P.bo); doc.setLineWidth(0.25); doc.roundedRect(217,11,71,28,2,2,'S');
  doc.setFontSize(7); doc.setTextColor(...P.gy); doc.setFont('helvetica','normal');
  doc.text('COTAÇÃO Nº',221,19);
  doc.setFontSize(18); doc.setTextColor(...P.or); doc.setFont('helvetica','bold');
  doc.text(`#${q.id}`,285,21,{align:'right'});
  doc.setFontSize(7); doc.setTextColor(...P.gy); doc.setFont('helvetica','normal');
  doc.text('DATA:',221,30);
  doc.setFontSize(9); doc.setTextColor(...P.tx); doc.setFont('helvetica','bold');
  doc.text(fmtDt(q.dt),285,30,{align:'right'});

  /* ── BLOCOS ── */
  let y=51, bH=26;
  // cliente
  doc.setFillColor(...P.wh); doc.rect(8,y,133,bH,'F');
  doc.setDrawColor(...P.bo); doc.setLineWidth(0.25); doc.rect(8,y,133,bH,'S');
  doc.setFillColor(...P.bl); doc.rect(8,y,133,5.5,'F');
  doc.setFontSize(6.5); doc.setTextColor(...P.wh); doc.setFont('helvetica','bold');
  doc.text('CLIENTE / ENTREGA',11,y+3.9);
  doc.setFontSize(8.5); doc.setTextColor(...P.tx); doc.setFont('helvetica','bold');
  const cn=(q.buyer||'').toUpperCase()+(q.ccod?`  (Cód: ${q.ccod})`:'');
  doc.text(cn,11,y+11);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...P.gy);
  doc.text(doc.splitTextToSize(q.cdet||'',125),11,y+17);

  // comercial
  doc.setFillColor(...P.wh); doc.rect(148,y,141,bH,'F');
  doc.setDrawColor(...P.bo); doc.rect(148,y,141,bH,'S');
  doc.setFillColor(...P.bl); doc.rect(148,y,141,5.5,'F');
  doc.setFontSize(6.5); doc.setTextColor(...P.wh); doc.setFont('helvetica','bold');
  doc.text('DADOS COMERCIAIS',152,y+3.9);
  doc.setFontSize(8); doc.setTextColor(...P.tx); doc.setFont('helvetica','bold');
  doc.text(`Vendedor: ${(q.seller||'').toUpperCase()}`,152,y+11);
  if(q.swa){
    const ph=q.swa.replace(/\D/g,'');
    doc.setTextColor(0,100,200);
    doc.textWithLink(`WhatsApp: ${q.swa}`,152,y+17,{url:`https://wa.me/55${ph}`});
    doc.setTextColor(...P.tx);
  }
  if(q.cpay){
    doc.setFont('helvetica','normal'); doc.setFontSize(7); doc.setTextColor(...P.gy);
    doc.text(`Pagamento: ${q.cpay}`,152,y+22);
  }

  y += bH + 4;

  const cols=[
    {header:'#',       dataKey:'n'},
    {header:'CÓD.',    dataKey:'cod'},
    {header:'IMG',     dataKey:'img'},
    {header:'DESCRIÇÃO',dataKey:'desc'},
    {header:'UN',      dataKey:'un'},
  ];
  if(q.showBar) cols.push({header:'BARRAS',dataKey:'bar'});
  cols.push(
    {header:'QTDE',    dataKey:'qty'},
    {header:'PREÇO UN',dataKey:'price'},
    {header:'TOTAL',   dataKey:'total'},
  );

  const rows = q.items.map((item,i)=>({
    n:(i+1).toString(), cod:item.code, img:'',
    desc:item.desc, un:item.un||'UN',
    bar:item.bar||'', qty:item.qty.toString(),
    price:fmt(item.price), total:fmt(item.qty*item.price),
    _sku:item.code
  }));

  doc.autoTable({
    startY:y, columns:cols, body:rows,
    theme:'grid',
    headStyles:{
      fillColor:P.bl, textColor:255, fontStyle:'bold', halign:'center',
      fontSize:7, cellPadding:{top:2,bottom:2,left:1.5,right:1.5}
    },
    bodyStyles:{
      textColor:P.tx, fontSize:7.5,
      cellPadding:{top:1,bottom:1,left:1.5,right:1.5},
      minCellHeight:RH, valign:'middle'
    },
    alternateRowStyles:{fillColor:P.ra},
    columnStyles:{
      n:    {halign:'center', cellWidth:8},
      cod:  {halign:'center', cellWidth:18},
      img:  {halign:'center', cellWidth:IMG_W+2},
      desc: {cellWidth:'auto'},
      un:   {halign:'center', cellWidth:11},
      bar:  {halign:'center', cellWidth:25},
      qty:  {halign:'center', cellWidth:14},
      price:{halign:'right',  cellWidth:24},
      total:{halign:'right',  cellWidth:26, fontStyle:'bold', textColor:P.or},
    },
    didDrawCell(data) {
      if (data.column.dataKey === 'img' && data.cell.section === 'body') {
        const sku = data.row.raw._sku;
        const b64 = imgB64[sku];
        const pub = imgUrl[sku];
        if (!b64) return;
        const pad = 0.7;
        const x  = data.cell.x + pad;
        const cy = data.cell.y + pad;
        const w  = data.cell.width  - pad*2;
        const h  = data.cell.height - pad*2;
        try {
          doc.addImage(b64, 'JPEG', x, cy, w, h, undefined, 'FAST');
          if (pub) doc.link(x, cy, w, h, {url: pub});
        } catch(e) {}
      }
    }
  });

  const fy = doc.lastAutoTable.finalY;
  const tv = q.items.reduce((a,i)=>a+i.qty*i.price,0);

  // Área disponível abaixo da tabela (antes do rodapé de 7mm)
  const PAGE_BOTTOM = H - 9;   // 7mm rodapé + 2mm margem
  const FOOTER_H    = 36;      // espaço necessário: obs(6) + total(13) + assinatura+WA(17)

  // Se tabela transbordar perto do rodapé, abre nova página
  let baseY;
  if (fy + FOOTER_H > PAGE_BOTTOM) {
    doc.addPage();
    baseY = 14;
  } else {
    baseY = fy + 2;
  }

  /* ── OBS ── */
  if (q.notes) {
    doc.setFontSize(7); doc.setTextColor(...P.gy); doc.setFont('helvetica','italic');
    doc.text('Obs.: ' + q.notes, 10, baseY + 4);
    baseY += 7;
  }

  /* ── BOX TOTAL ── */
  const bw=68, bh=13, bx=W-bw-8, by=baseY;
  doc.setFillColor(...P.or); doc.roundedRect(bx, by, bw, bh, 2, 2, 'F');
  doc.setFontSize(6); doc.setTextColor(...P.wh); doc.setFont('helvetica','normal');
  doc.text('TOTAL DA COTAÇÃO', bx+3, by+4.5);
  doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(fmt(tv), bx+bw-3, by+11, {align:'right'});

  /* ── ASSINATURA ── */
  const sigY = baseY + 16;
  doc.setDrawColor(...P.bo); doc.setLineWidth(0.4);
  doc.line(10, sigY, 88, sigY);
  doc.setFontSize(6.5); doc.setTextColor(...P.gy); doc.setFont('helvetica','normal');
  doc.text('Assinatura do Cliente', 10, sigY + 4);

  /* ── BOTÃO WHATSAPP ── */
  const waL   = '✉  CLIQUE AQUI PARA FALAR SOBRE ESTA COTAÇÃO NO WHATSAPP';
  const waLnk = waUrl();
  const bW=170, bHb=11, bX=(W-bW)/2, bY=sigY - 1;
  doc.setFillColor(...P.gn);
  doc.roundedRect(bX, bY, bW, bHb, 2.5, 2.5, 'F');
  doc.setDrawColor(20,155,65); doc.setLineWidth(0.2);
  doc.roundedRect(bX, bY, bW, bHb, 2.5, 2.5, 'S');
  doc.setFontSize(8.5); doc.setTextColor(...P.wh); doc.setFont('helvetica','bold');
  doc.textWithLink(waL, bX + bW/2, bY + 7.2, {align:'center', url: waLnk});

  doc.setFillColor(...P.bld); doc.rect(0,H-7,W,7,'F');
  doc.setFillColor(...P.or);  doc.rect(0,H-7,5,7,'F');
  doc.setFontSize(6); doc.setTextColor(...P.wh); doc.setFont('helvetica','normal');
  doc.text(`Ameripan Distribuidora — Desde 1990  |  Cotação #${q.id}  |  ${fmtDt(q.dt)}  |  App Web`,
    W/2, H-3.3, {align:'center'});

  doc.save(`Cotacao_${q.id}_${(q.buyer||'cotacao').replace(/[^a-z0-9]/gi,'_')}.pdf`);
  addToHist();
  toast('PDF gerado! ✓');
}

/* ══════════════════════════════════════════
   CATÁLOGO & EVENTS
══════════════════════════════════════════ */
async function loadCatalog() {
  const k='a_cat16'; E.catSt.innerHTML='<i class="fa fa-circle-notch fa-spin"></i>';
  try {
    const sv=localStorage.getItem(k);
    if(sv){const d=JSON.parse(sv);if(Date.now()-d.ts<86400000){proc(d.it);E.catSt.textContent=`✓ ${d.it.length}`;return;}}
    const res=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CFG.sheetId}/values/produtos!A2:B?key=${CFG.apiKey}`);
    const j=await res.json();
    const it=(j.values||[]).map(r=>({code:(r[0]||'').trim(),desc:(r[1]||'').trim()})).filter(i=>i.code);
    localStorage.setItem(k,JSON.stringify({ts:Date.now(),it}));
    proc(it); E.catSt.textContent=`✓ ${it.length}`;
  } catch(e) {
    const sv=localStorage.getItem(k); if(sv)proc(JSON.parse(sv).it);
    E.catSt.textContent='Offline';
  }
}
function proc(it){S.cat=it;S.cmap=new Map(it.map(i=>[i.code,i.desc]));}

E.desc.addEventListener('input', e=>{
  const v=e.target.value.toUpperCase();
  if(v.length<2){E.sug.classList.remove('on');return;}
  const terms=v.split(/[\s*]+/).filter(t=>t), m=[];
  for(const it of S.cat){if(m.length>=10)break;if(terms.every(t=>it.desc.toUpperCase().includes(t)))m.push(it);}
  renderSug(m);
});
function renderSug(list){
  E.sug.innerHTML='';
  if(!list.length){E.sug.classList.remove('on');return;}
  list.forEach(it=>{
    const d=document.createElement('div');d.className='si';
    d.innerHTML=`<strong style="color:var(--or)">${it.code}</strong> — ${it.desc}`;
    d.onclick=()=>{E.cod.value=it.code;E.desc.value=it.desc;E.sug.classList.remove('on');E.price.focus();};
    E.sug.appendChild(d);
  });
  E.sug.classList.add('on');
}
document.addEventListener('click',e=>{if(!E.sug.contains(e.target)&&e.target!==E.desc)E.sug.classList.remove('on');});

E.swa.addEventListener('input',function(){this.value=fmtPh(this.value);});
E.addBtn.addEventListener('click', commitItem);
E.price.addEventListener('input', function(){msk(this);});
[E.qty,E.price].forEach(el=>el.addEventListener('focus',function(){this.select();}));

$('clearAll').onclick=()=>{if(confirm('Limpar todos os itens?')){S.q.items=[];persist();render();}};
$('btnNew').onclick=newOrder;
$('pdfBtn').onclick=genPDF; $('mPdf').onclick=genPDF;

const exportXls=()=>{
  const q=S.q;
  const d=[
    ['Cotação',q.id,'Data',q.dt],['Cliente',q.buyer,'Cód',q.ccod],
    ['Vendedor',q.seller,'Tel',q.swa],[],
    ['#','COD','BARRAS','DESCRIÇÃO','UN','QTD','UNIT','TOTAL'],

  q.items.forEach((i,x)=>d.push([x+1,i.code,i.bar,i.desc,i.un||'UN',i.qty,i.price,i.qty*i.price]));
  const ws=XLSX.utils.aoa_to_sheet(d),wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Cotação');XLSX.writeFile(wb,`cotacao_${q.id}.xlsx`);

$('xlsBtn').onclick=exportXls; $('mXls').onclick=exportXls;

['oid','odt','seller','swa','buyer','ccod','cdet','cpay','notes','togBar']
  .forEach(id=>$(id).addEventListener('change',syncFromForm));

$('cpyBtn').onclick=()=>{navigator.clipboard.writeText(waText());toast('Texto copiado!');};
$('mCpy').onclick=$('cpyBtn').onclick;
$('waBtn').onclick=()=>window.open(waUrl(),'_blank');
$('mWa').onclick=$('waBtn').onclick;

window.activateER=activateER;
window.removeItem=removeItem;
window.setFormMode=setFormMode;

init();
