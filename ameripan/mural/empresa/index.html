<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Mural Corporativo — Ameripan</title>
    <meta name="description" content="Mural de tarefas, avisos e eventos corporativos da Ameripan Distribuidora">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2pdf.js para exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --secondary: #3b82f6;
            --secondary-dark: #2563eb;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #f1f5f9;
            --dark: #334155;
            --text: #1e293b;
            --text-light: #64748b;
            --text-muted: #94a3b8;
            --card-bg: rgba(255,255,255,0.92);
            --card-radius: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --anim: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --gradient-hero: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ===== HERO HEADER ===== */
        .hero {
            background: var(--gradient-hero);
            color: white;
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: "";
            position: absolute;
            top: -50%; right: -30%;
            width: 80%; height: 200%;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }
        .hero::after {
            content: "";
            position: absolute;
            bottom: -40%; left: -20%;
            width: 60%; height: 180%;
            background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
            animation: pulseGlow 10s ease-in-out infinite alternate-reverse;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        .hero-inner {
            position: relative; z-index: 2;
            max-width: 1400px; margin: 0 auto;
            padding: 40px 30px 20px;
        }
        .hero-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .hero-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .hero-brand .logo-icon {
            width: 50px; height: 50px;
            background: rgba(59,130,246,0.2);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        .hero-brand h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }
        .hero-brand h1 span {
            display: block;
            font-size: 0.8rem;
            font-weight: 400;
            opacity: 0.7;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .hero-actions {
            display: flex; gap: 10px; flex-wrap: wrap;
        }
        .hero-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 18px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.85rem; font-weight: 600;
            transition: all var(--anim);
            border: 1px solid rgba(255,255,255,0.15);
            cursor: pointer;
        }
        .hero-btn-ghost { background: rgba(255,255,255,0.08); color: white; }
        .hero-btn-ghost:hover { background: rgba(255,255,255,0.18); }
        .hero-btn-accent { background: var(--secondary); color: white; border-color: var(--secondary); }
        .hero-btn-accent:hover { background: var(--secondary-dark); }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex; gap: 20px; flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .stat-item {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 10px 16px;
            backdrop-filter: blur(10px);
        }
        .stat-item .stat-num {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-item .stat-label {
            font-size: 0.75rem;
            opacity: 0.7;
            line-height: 1.2;
        }

        /* ===== CATEGORY TABS ===== */
        .category-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 0;
            scrollbar-width: none;
        }
        .category-tabs::-webkit-scrollbar { display: none; }
        .cat-tab {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px;
            border-radius: 10px 10px 0 0;
            font-size: 0.82rem; font-weight: 500;
            cursor: pointer;
            transition: all var(--anim);
            white-space: nowrap;
            color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-bottom: none;
        }
        .cat-tab:hover { background: rgba(255,255,255,0.1); color: white; }
        .cat-tab.active {
            background: #f8fafc;
            color: var(--primary);
            font-weight: 600;
            border-color: rgba(0,0,0,0.06);
        }
        .cat-tab .tab-count {
            background: rgba(255,255,255,0.15);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem; font-weight: 700;
        }
        .cat-tab.active .tab-count {
            background: var(--secondary);
            color: white;
        }

        /* ===== MAIN CONTENT ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* ===== TOOLBAR ===== */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 24px;
            background: white;
            border-radius: 0 16px 16px 16px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .search-box {
            display: flex;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            flex: 1;
            max-width: 450px;
            transition: border-color var(--anim);
        }
        .search-box:focus-within { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .search-box input {
            flex: 1;
            border: none;
            padding: 12px 18px;
            outline: none;
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--text);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box button {
            border: none;
            background: var(--secondary);
            color: white;
            padding: 0 20px;
            cursor: pointer;
            transition: background var(--anim);
            font-size: 0.9rem;
        }
        .search-box button:hover { background: var(--secondary-dark); }
        .toolbar-actions {
            display: flex; gap: 10px;
        }
        .tool-btn {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 0.85rem; font-weight: 500;
            color: var(--dark);
            transition: all var(--anim);
            font-family: inherit;
        }
        .tool-btn:hover { border-color: var(--secondary); color: var(--secondary); background: rgba(59,130,246,0.04); }
        .tool-btn-primary {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            border-color: transparent;
        }
        .tool-btn-primary:hover { opacity: 0.9; color: white; }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform var(--anim), box-shadow var(--anim);
            display: flex;
            flex-direction: column;
            position: relative;
            border: 1px solid rgba(0,0,0,0.04);
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            padding: 20px 22px 14px;
            align-items: flex-start;
            gap: 12px;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.3;
            flex: 1;
        }
        .card-tag {
            font-size: 0.7rem;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            padding: 4px 12px;
            border-radius: 20px;
            color: var(--text-light);
            font-weight: 600;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-body {
            padding: 0 22px 16px;
            flex: 1;
        }
        .card-info {
            line-height: 1.7;
            color: var(--dark);
            font-size: 0.9rem;
            word-break: break-word;
            white-space: pre-line;
        }
        .card-info a {
            color: var(--secondary);
            font-weight: 500;
            text-decoration: none;
        }
        .card-info a:hover { text-decoration: underline; }
        .card-footer {
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-top: 1px solid rgba(0,0,0,0.04);
            gap: 10px;
            flex-wrap: wrap;
        }
        .card-meta {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .card-meta span {
            display: flex; align-items: center; gap: 6px;
        }
        .card-meta .icon {
            color: var(--secondary);
            opacity: 0.7;
            font-size: 0.85rem;
        }
        .card-btn {
            padding: 9px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.82rem;
            border: none;
            cursor: pointer;
            transition: all var(--anim);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            text-decoration: none;
        }
        .primary-btn {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
            color: white;
            box-shadow: 0 2px 8px rgba(59,130,246,0.25);
        }
        .primary-btn:hover { box-shadow: 0 4px 12px rgba(59,130,246,0.35); opacity: 0.95; }
        .outline-btn {
            background: transparent;
            border: 1px solid #e2e8f0;
            color: var(--dark);
        }
        .outline-btn:hover { border-color: var(--secondary); color: var(--secondary); background: rgba(59,130,246,0.04); }

        /* Image */
        .image-container {
            width: 100%;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            overflow: hidden;
            min-height: 100px;
            border-top: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            position: relative;
        }
        .card-image {
            width: 100%;
            display: block;
            max-height: 200px;
            object-fit: contain;
            transition: transform 0.5s ease;
        }
        .image-container:hover .card-image { transform: scale(1.04); }
        .image-container::after {
            content: "\f002"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            position: absolute; bottom: 10px; right: 12px;
            background: rgba(255,255,255,0.9);
            padding: 6px 8px; border-radius: 8px;
            font-size: 11px; color: var(--secondary);
            opacity: 0; transition: all 0.3s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .image-container:hover::after { opacity: 1; }

        /* ===== PRIORITY ===== */
        .high-priority { border-left: 4px solid var(--danger); }
        .medium-priority { border-left: 4px solid var(--warning); }
        .low-priority { border-left: 4px solid var(--success); }
        .priority-indicator {
            position: absolute; top: 0; left: 0;
            font-size: 0.65rem; padding: 4px 10px;
            border-radius: 0 0 8px 0;
            font-weight: 700; z-index: 2; color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .high-priority .priority-indicator { background: linear-gradient(135deg, var(--danger), #dc2626); }
        .medium-priority .priority-indicator { background: linear-gradient(135deg, var(--warning), #d97706); }
        .low-priority .priority-indicator { background: linear-gradient(135deg, var(--success), #059669); }

        .card.no-image { min-height: 220px; }

        /* ===== PROMO CARD ===== */
        .promo-box {
            background: linear-gradient(135deg, rgba(59,130,246,0.04), rgba(6,182,212,0.04));
            border-radius: 12px;
            padding: 18px;
            border: 1px dashed rgba(59,130,246,0.3);
        }
        .promo-box h4 {
            color: var(--secondary);
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .promo-product {
            background: white;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .promo-product .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .promo-product .name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--primary);
            line-height: 1.3;
            word-break: break-word;
        }
        .promo-product .sku { color: var(--text-muted); font-size: 0.75rem; margin-top: 4px; }
        .promo-product .price {
            margin-top: 10px;
            font-weight: 800;
            font-size: 1.2rem;
        }
        .promo-product .price small { font-size: 0.75rem; font-weight: 500; }
        .promo-divider {
            text-align: center;
            padding: 8px 0;
            font-weight: 800;
            font-size: 0.85rem;
        }
        .promo-bonus { border-bottom: 3px solid var(--success); }

        /* ===== PLACEHOLDER ===== */
        .placeholder {
            display: flex; justify-content: center; align-items: center;
            min-height: 300px;
            color: var(--text-light);
            text-align: center;
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--shadow);
            padding: 40px;
            grid-column: 1 / -1;
        }
        .placeholder i { font-size: 3rem; opacity: 0.15; margin-bottom: 20px; color: var(--secondary); }
        .placeholder p { font-size: 1rem; max-width: 300px; margin: 8px auto; }

        /* ===== LOADER ===== */
        .loader {
            width: 50px; height: 50px;
            border: 4px solid #e2e8f0;
            border-bottom-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* ===== ANIMATIONS ===== */
        .fade-in {
            animation: fadeSlideUp 0.5s ease forwards;
            opacity: 0;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== ERROR ===== */
        .error-msg {
            background: linear-gradient(135deg, #fef2f2, #fee2e2);
            color: var(--danger);
            padding: 14px 22px;
            border-radius: 12px;
            margin: 0 0 20px;
            display: none;
            font-weight: 500;
            border: 1px solid rgba(239,68,68,0.2);
        }

        /* ===== FOOTER ===== */
        .site-footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid #e2e8f0;
            margin-top: 20px;
        }
        .site-footer a { color: var(--secondary); text-decoration: none; }
        .site-footer a:hover { text-decoration: underline; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .hero-inner { padding: 25px 16px 15px; }
            .hero-brand h1 { font-size: 1.2rem; }
            .container { padding: 0 16px; }
            .grid { grid-template-columns: 1fr; gap: 16px; }
            .toolbar { border-radius: 12px; flex-direction: column; align-items: stretch; }
            .search-box { max-width: none; }
            .stats-bar { gap: 10px; }
            .stat-item { padding: 8px 12px; }
            .hero-actions { width: 100%; }
            .hero-btn { flex: 1; justify-content: center; }
        }

        /* ===== PRINT / PDF ===== */
        @media print {
            .hero, .toolbar, .site-footer, .tool-btn, .hero-btn, .card-actions { display: none !important; }
            .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
            .card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
            body { background: white; }
        }
    </style>
</head>
<body>
    <!-- ===== HERO ===== -->
    <header class="hero">
        <div class="hero-inner">
            <div class="hero-top">
                <div class="hero-brand">
                    <div class="logo-icon"><i class="fas fa-bullhorn"></i></div>
                    <h1>MURAL CORPORATIVO
                        <span>Ameripan Distribuidora — Foco, Prioridades e Ação</span>
                    </h1>
                </div>
                <div class="hero-actions">
                    <a href="mural/ajuda/index.html" class="hero-btn hero-btn-ghost"><i class="fas fa-question-circle"></i> Ajuda</a>
                    <a href="manager.html" target="_blank" class="hero-btn hero-btn-ghost"><i class="fas fa-cog"></i> Manager</a>
                    <button class="hero-btn hero-btn-accent" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Exportar PDF</button>
                </div>
            </div>

            <div class="stats-bar" id="stats-bar"></div>

            <div class="category-tabs" id="category-tabs"></div>
        </div>
    </header>

    <!-- ===== MAIN ===== -->
    <div class="container">
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar por título, descrição, responsável...">
                <button id="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <div class="toolbar-actions">
                <button class="tool-btn" id="sort-btn"><i class="fas fa-sort"></i> Ordenar</button>
            </div>
        </div>

        <div id="error-msg" class="error-msg"></div>
        <div id="loader" class="loader"></div>
        <div id="content-grid" class="grid" style="display: none;"></div>
    </div>

    <footer class="site-footer">
        <p>© 2026 <a href="#">Ameripan Distribuidora</a> — Mural Corporativo v3.0 | Gerado dinamicamente via Google Sheets</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzccpQkRJT5FvOpyHQNMkK3_fEKXpGSyIlIxyE0xexOC6x4OyjCMFbSyl2HnML7b6LuKQ/exec";

        let allItems = [];
        let filteredItems = [];
        let sortDirection = 'asc';
        let isLoading = true;
        let activeCategory = 'Todos';

        const CATEGORIAS = ['Todos','Ações da Semana','Projetos em Destaque','Campanhas em Destaque','Produtos em Destaque','Mural Geral','Ações Anteriores (Sem Validade)'];
        const CAT_ICONS = {'Todos':'fa-th-large','Ações da Semana':'fa-calendar-check','Projetos em Destaque':'fa-project-diagram','Campanhas em Destaque':'fa-bullhorn','Produtos em Destaque':'fa-box-open','Mural Geral':'fa-clipboard-list','Ações Anteriores (Sem Validade)':'fa-archive'};

        const contentGrid = document.getElementById('content-grid');
        const loader = document.getElementById('loader');
        const errorMsg = document.getElementById('error-msg');
        const searchInput = document.getElementById('search-input');
        const sortBtn = document.getElementById('sort-btn');

        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            loadData();
        });

        function setupEventListeners() {
            searchInput.addEventListener('input', debounce(e => filterItems(e.target.value), 300));
            document.getElementById('search-btn').addEventListener('click', () => filterItems(searchInput.value));
            sortBtn.addEventListener('click', () => {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                sortBtn.innerHTML = `<i class="fas fa-sort"></i> ${sortDirection === 'asc' ? 'A-Z' : 'Z-A'}`;
                sortItems();
            });
        }

        function loadData() {
            if (!API_URL || API_URL.includes("SUA_URL")) {
                showError("Configure a API_URL corretamente.");
                isLoading = false;
                hideLoader();
                return;
            }
            fetch(API_URL)
                .then(r => { if(!r.ok) throw new Error("Erro na requisição"); return r.json(); })
                .then(data => { processData(data); isLoading = false; hideLoader(); renderTabs(); renderStats(); applyFilter(); })
                .catch(err => { showError("Não foi possível carregar: " + err.message); isLoading = false; hideLoader(); });
        }

        function processData(data) {
            allItems = [];
            const hoje = new Date(); hoje.setHours(0,0,0,0);

            Object.keys(data).forEach(aba => {
                const items = data[aba];
                if (!Array.isArray(items)) return;
                items.forEach(row => {
                    let categoriaFinal = aba;
                    let rawData = row['Prazo'] ? String(row['Prazo']).trim() : "";
                    let dataExibicao = rawData;

                    if (rawData) {
                        let dataPrazo;
                        if (rawData.includes('T')) {
                            dataPrazo = new Date(rawData);
                        } else {
                            const p = rawData.split('/');
                            if (p.length === 3) {
                                let d = parseInt(p[0],10), m = parseInt(p[1],10)-1, a = parseInt(p[2],10);
                                if (a < 100) a += 2000;
                                dataPrazo = new Date(a, m, d);
                            }
                        }
                        if (dataPrazo && !isNaN(dataPrazo)) {
                            if (dataPrazo < hoje) categoriaFinal = "Ações Anteriores (Sem Validade)";
                            const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
                            dataExibicao = `${dias[dataPrazo.getDay()]} ${String(dataPrazo.getDate()).padStart(2,'0')}/${String(dataPrazo.getMonth()+1).padStart(2,'0')}/${dataPrazo.getFullYear()}`;
                        }
                    }

                    allItems.push({
                        titulo: row['Título'] || "Sem título",
                        informacao: row['Informação'] || "",
                        linkAcesso: row['Link de Acesso'] || "",
                        linkImagem: row['Link da Imagem'] || "",
                        data: dataExibicao,
                        categoria: categoriaFinal,
                        autor: row['Autor/Responsável'] || "",
                        prioridade: row['Prioridade'] || "Normal",
                        id: row['ID'] || Math.random().toString(36).substr(2, 9)
                    });
                });
            });

            filteredItems = [...allItems];
        }

        function renderTabs() {
            const container = document.getElementById('category-tabs');
            container.innerHTML = '';
            CATEGORIAS.forEach(cat => {
                const count = cat === 'Todos' ? allItems.length : allItems.filter(i => i.categoria === cat).length;
                if (cat !== 'Todos' && count === 0) return;
                const tab = document.createElement('div');
                tab.className = 'cat-tab' + (activeCategory === cat ? ' active' : '');
                tab.innerHTML = `<i class="fas ${CAT_ICONS[cat] || 'fa-tag'}"></i> ${cat} <span class="tab-count">${count}</span>`;
                tab.addEventListener('click', () => {
                    activeCategory = cat;
                    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    applyFilter();
                });
                container.appendChild(tab);
            });
        }

        function renderStats() {
            const bar = document.getElementById('stats-bar');
            const total = allItems.length;
            const alta = allItems.filter(i => (i.prioridade||'').toLowerCase() === 'alta').length;
            const semana = allItems.filter(i => i.categoria === 'Ações da Semana').length;
            const vencidos = allItems.filter(i => i.categoria === 'Ações Anteriores (Sem Validade)').length;
            bar.innerHTML = `
                <div class="stat-item"><span class="stat-num">${total}</span><span class="stat-label">Total<br>Registros</span></div>
                <div class="stat-item"><span class="stat-num">${semana}</span><span class="stat-label">Ações<br>da Semana</span></div>
                <div class="stat-item"><span class="stat-num" style="background:linear-gradient(135deg,#f87171,#ef4444);-webkit-background-clip:text;background-clip:text;">${alta}</span><span class="stat-label">Prioridade<br>Alta</span></div>
                ${vencidos > 0 ? `<div class="stat-item"><span class="stat-num" style="background:linear-gradient(135deg,#94a3b8,#64748b);-webkit-background-clip:text;background-clip:text;">${vencidos}</span><span class="stat-label">Itens<br>Vencidos</span></div>` : ''}
            `;
        }

        function applyFilter() {
            const query = searchInput.value.toLowerCase().trim();
            filteredItems = allItems.filter(item => {
                const matchCat = activeCategory === 'Todos' || item.categoria === activeCategory;
                const matchQ = !query || item.titulo.toLowerCase().includes(query) || item.informacao.toLowerCase().includes(query) || (item.autor && item.autor.toLowerCase().includes(query));
                return matchCat && matchQ;
            });
            renderCards();
        }

        function filterItems(query) { applyFilter(); }

        const linkCache = new Map();
        function makeLinksClickable(text) {
            if (!text) return '';
            if (linkCache.has(text)) return linkCache.get(text);
            let result = text.replace(/\n/g, '<br>');
            result = result.replace(/(https?:\/\/[^\s]+)/g, url => `<a href="${url}" target="_blank">${url}</a>`);
            linkCache.set(text, result);
            return result;
        }

        function renderCards() {
            if (isLoading) return;
            contentGrid.innerHTML = '';
            contentGrid.style.display = 'grid';

            if (filteredItems.length === 0) {
                contentGrid.innerHTML = `<div class="placeholder"><div><i class="fas fa-search"></i><p>Nenhum item encontrado.</p><p style="font-size:0.85rem;opacity:0.6">Ajuste sua busca ou selecione outra categoria.</p></div></div>`;
                return;
            }
            filteredItems.forEach((item, idx) => {
                const card = createCard(item);
                card.classList.add('fade-in');
                card.style.animationDelay = `${Math.min(idx * 60, 600)}ms`;
                contentGrid.appendChild(card);
            });
        }

        function createCard(item) {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = item.id;
            if (!item.linkImagem) card.classList.add('no-image');

            const cardType = item.categoria || 'Geral';
            let priorityLabel = '';
            const p = (item.prioridade || '').toLowerCase();
            if (p === 'alta') { card.classList.add('high-priority'); priorityLabel = 'Alta'; }
            else if (p === 'média' || p === 'media') { card.classList.add('medium-priority'); priorityLabel = 'Média'; }
            else if (p === 'baixa') { card.classList.add('low-priority'); priorityLabel = 'Baixa'; }

            let isPromo = false, promoData = null, processedInfo = "";
            try {
                if (item.informacao.trim().startsWith('PROMOJSON:')) {
                    promoData = JSON.parse(item.informacao.replace('PROMOJSON:','').trim());
                    isPromo = true;
                } else {
                    processedInfo = makeLinksClickable(item.informacao);
                }
            } catch(e) { processedInfo = makeLinksClickable(item.informacao); }

            let html = `<div class="card-header"><h3 class="card-title">${item.titulo}</h3><span class="card-tag">${cardType}</span></div>`;
            if (priorityLabel) html += `<span class="priority-indicator"><i class="fas fa-flag" style="margin-right:4px;font-size:0.6rem"></i>${priorityLabel}</span>`;

            html += `<div class="card-body">`;
            if (isPromo && promoData) {
                html += `<div class="promo-box">
                    <h4><i class="fas fa-gift"></i> ${promoData.tipo}</h4>
                    <div class="promo-product">
                        <div class="label">Produto</div>
                        <div class="name">${promoData.produtoPrincipalNome}</div>
                        <div class="sku">SKU: ${promoData.produtoPrincipalSku}</div>
                        <div class="price" style="color:var(--secondary);">${promoData.quantidadePrincipal}x <small>R$ ${promoData.precoPrincipal}</small></div>
                    </div>
                    <div class="promo-divider" style="color:var(--success);"><i class="fas fa-plus-circle"></i> LEVA / GANHA</div>
                    <div class="promo-product promo-bonus">
                        <div class="label">Bônus</div>
                        <div class="name">${promoData.produtoBonusNome}</div>
                        <div class="sku">SKU: ${promoData.produtoBonusSku}</div>
                        <div class="price" style="color:var(--success);">${promoData.quantidadeBonus}x <small>R$ ${promoData.precoBonus}</small></div>
                    </div>
                </div>`;
            } else {
                html += `<div class="card-info">${processedInfo}</div>`;
            }
            html += `</div>`;

            html += `<div class="card-footer"><div class="card-meta">`;
            if (item.data) html += `<span><i class="fas fa-calendar-alt icon"></i>${item.data}</span>`;
            if (item.autor) html += `<span><i class="fas fa-user icon"></i>${item.autor}</span>`;
            html += `</div>`;
            if (item.linkAcesso) {
                html += `<a href="${item.linkAcesso}" target="_blank" class="card-btn primary-btn"><i class="fas fa-external-link-alt"></i> Acessar</a>`;
            }
            html += `</div>`;

            if (item.linkImagem) {
                html += `<div class="image-container"><a href="${item.linkImagem}" target="_blank" title="Ver imagem"><img src="${item.linkImagem}" alt="${item.titulo}" class="card-image" loading="lazy" onerror="this.closest('.image-container').style.display='none'"></a></div>`;
            }

            card.innerHTML = html;
            return card;
        }

        function sortItems() {
            filteredItems.sort((a, b) => sortDirection === 'asc' ? a.titulo.localeCompare(b.titulo) : b.titulo.localeCompare(a.titulo));
            renderCards();
        }

        function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
        function hideLoader() { loader.style.display = 'none'; }

        function debounce(func, wait) {
            let t;
            return function(...args) { clearTimeout(t); t = setTimeout(() => func(...args), wait); };
        }

        // ===== PDF EXPORT =====
        function exportPDF() {
            const btn = document.querySelector('[onclick="exportPDF()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gerando...';
            btn.style.pointerEvents = 'none';

            const pdfContent = document.createElement('div');
            pdfContent.style.padding = '20px';
            pdfContent.style.fontFamily = 'Inter, sans-serif';

            const now = new Date();
            const dateStr = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} às ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            pdfContent.innerHTML = `
                <div style="text-align:center;margin-bottom:25px;padding-bottom:15px;border-bottom:2px solid #e2e8f0;">
                    <h1 style="font-size:1.5rem;color:#0f172a;margin-bottom:5px;">MURAL CORPORATIVO — AMERIPAN</h1>
                    <p style="color:#64748b;font-size:0.85rem;">Gerado em ${dateStr} | Filtro: ${activeCategory} | ${filteredItems.length} registros</p>
                </div>
            `;

            filteredItems.forEach(item => {
                const priorColor = (item.prioridade||'').toLowerCase() === 'alta' ? '#ef4444' : (item.prioridade||'').toLowerCase() === 'média' || (item.prioridade||'').toLowerCase() === 'media' ? '#f59e0b' : '#10b981';
                let info = item.informacao;
                if (info.startsWith('PROMOJSON:')) {
                    try {
                        const pd = JSON.parse(info.replace('PROMOJSON:','').trim());
                        info = `${pd.tipo}: ${pd.quantidadePrincipal}x ${pd.produtoPrincipalNome} (R$ ${pd.precoPrincipal}) → ${pd.quantidadeBonus}x ${pd.produtoBonusNome} (R$ ${pd.precoBonus})`;
                    } catch(e) {}
                }
                pdfContent.innerHTML += `
                    <div style="border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:12px;page-break-inside:avoid;border-left:4px solid ${priorColor};">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                            <strong style="font-size:0.95rem;color:#0f172a;">${item.titulo}</strong>
                            <span style="font-size:0.7rem;background:#f1f5f9;padding:2px 8px;border-radius:12px;color:#64748b;">${item.categoria}</span>
                        </div>
                        <p style="font-size:0.82rem;color:#334155;line-height:1.5;margin-bottom:8px;">${info.substring(0, 300)}${info.length > 300 ? '...' : ''}</p>
                        <div style="display:flex;gap:15px;font-size:0.75rem;color:#94a3b8;">
                            ${item.data ? `<span>📅 ${item.data}</span>` : ''}
                            ${item.autor ? `<span>👤 ${item.autor}</span>` : ''}
                            <span>⚡ ${item.prioridade || 'Normal'}</span>
                        </div>
                    </div>
                `;
            });

            document.body.appendChild(pdfContent);

            html2pdf().set({
                margin: [10, 10, 10, 10],
                filename: `Mural_Ameripan_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.pdf`,
                image: { type: 'jpeg', quality: 0.95 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
            }).from(pdfContent).save().then(() => {
                document.body.removeChild(pdfContent);
                btn.innerHTML = originalText;
                btn.style.pointerEvents = '';
            }).catch(() => {
                document.body.removeChild(pdfContent);
                btn.innerHTML = originalText;
                btn.style.pointerEvents = '';
            });
        }
    </script>
</body>
