
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Edimar Pro Roteiro</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font: Outfit (Premium look) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet.js (Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Chart.js (Gráficos) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #004d40; 
            --accent: #00796b; 
            --bg: #f4f6f8; 
            --whats: #25d366;
            --gradient: linear-gradient(135deg, #004d40 0%, #00796b 100%);
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { 
            background-color: var(--bg); 
            font-family: 'Outfit', 'Segoe UI', Roboto, Helvetica, sans-serif; 
            padding-top: 145px; 
            padding-bottom: 90px; 
            overflow-x: hidden; 
            transition: padding-top 0.3s ease;
        }
        
        /* Cabeçalho App-Style */
        .app-header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            background: var(--gradient); 
            color: white; 
            z-index: 1050; 
            padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
        }
        
        .search-container { 
            position: fixed; 
            top: 60px; 
            left: 0; 
            right: 0; 
            background: var(--primary); 
            padding: 10px 15px; 
            z-index: 1040; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        .form-control-search { 
            border-radius: 25px; 
            border: none; 
            padding: 10px 20px; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.08); 
            font-size: 1rem; 
        }
        
        /* Filtros Rápidos Horizontal */
        .filter-row { 
            display: flex; 
            gap: 8px; 
            margin-top: 8px; 
            overflow-x: auto; 
            padding-bottom: 5px; 
            scrollbar-width: none; 
        }
        .filter-row::-webkit-scrollbar { display: none; }
        .filter-select { 
            background: rgba(255,255,255,0.15); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 0.75rem; 
            padding: 6px 12px; 
            outline: none; 
            transition: var(--transition);
        }
        .filter-select:focus {
            background: rgba(255,255,255,0.25);
        }
        .filter-select option { color: #333; }
        
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(60px + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.04);
            z-index: 1040;
        }
        .nav-item-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: #718096;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px;
            flex-grow: 1;
            transition: var(--transition);
            position: relative;
            min-width: 0; /* Permite comprimir */
        }
        .nav-item-btn i {
            font-size: 1.15rem;
            margin-bottom: 1px;
            transition: var(--transition);
        }
        .nav-item-btn.active {
            color: var(--primary);
        }
        .nav-item-btn.active i {
            transform: translateY(-1px);
            color: var(--accent);
        }

        /* Card de Cliente Premium */
        .card-client { 
            border: none; 
            border-radius: 18px; 
            background: white; 
            margin-bottom: 15px; 
            box-shadow: var(--card-shadow); 
            position: relative; 
            transition: var(--transition); 
            border-left: 6px solid var(--accent); 
        }
        .card-client.visited-card {
            border-left: 6px solid #28a745 !important;
            background-color: #f7fbf8;
        }
        .card-client.absent-card {
            border-left: 6px solid #ffc107 !important;
            background-color: #fffdf5;
        }
        /* CORREÇÃO DO BUG: O card-client não escala mais ao clicar, evitando deslocamento de botões */
        .card-client:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        .card-body { padding: 15px; }
        
        .client-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .id-badge { font-size: 0.9rem; font-weight: 800; color: #4a5568; background: #edf2f7; padding: 4px 10px; border-radius: 6px; }
        .ordem-badge { background: #e0f2f1; color: var(--primary); font-weight: 800; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .ordem-whats { background: #fff8e1; color: #f57c00; }
        .visitado-badge { background: #d4edda; color: #155724; font-weight: 800; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .visitado-badge.absent-badge { background: #fff3cd; color: #856404; }

        .client-fantasia { font-size: 1.1rem; font-weight: 700; color: var(--primary); line-height: 1.2; }
        .client-razao { font-size: 0.8rem; color: #718096; margin-bottom: 10px; font-style: italic; display: block; }
        
        .info-box { background: #f8fafc; border-radius: 12px; padding: 12px; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border: 1px solid #edf2f7; }
        .info-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #2d3748; }
        .info-item i { color: var(--accent); font-size: 0.9rem; width: 16px; text-align: center; }
        .full-width { grid-column: span 2; }

        .obs-tag { background: #fffdf0; border-left: 3px solid #ffcc00; padding: 8px 12px; font-size: 0.8rem; border-radius: 6px; margin-top: 12px; color: #856404; font-weight: 500; }

        /* Ações Rápidas Mobile */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-circle { height: 48px; border-radius: 14px; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: var(--transition); color: white; }
        .btn-wa { background: var(--whats); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
        .btn-gps { background: #4285f4; box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2); }
        .btn-copy { background: #4a5568; font-size: 1rem; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.15); }
        .btn-edit { background: #e2e8f0; color: var(--primary); font-size: 1.1rem; }
        
        /* Efeito de toque individual nos botões */
        .btn-circle:active { transform: scale(0.9); }
        .btn-circle.copied { background: var(--primary) !important; }

        /* Floating Button */
        .app-fab { position: fixed; bottom: calc(85px + env(safe-area-inset-bottom, 0px)); right: 25px; width: 60px; height: 60px; background: var(--gradient); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 6px 16px rgba(0,77,64,0.3); border: none; z-index: 1000; transition: var(--transition); }
        .app-fab:active { transform: scale(0.9); }
        
        /* Loader */
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        /* Modais Customizados */
        .modal-content-rounded { border-radius: 24px !important; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Checklist View Styles */
        .chk-card { border-left-color: #4a5568; }
        .chk-card.visited { border-left-color: #25d366; background-color: #f0fdf4; }
        .chk-card.absent { border-left-color: #ffc107; background-color: #fffdf5; }
        .chk-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; transition: var(--transition); background: none; }
        
        /* Dashboard View Styles */
        .dash-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-stat-box { background: white; padding: 12px 8px; border-radius: 14px; text-align: center; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .dash-stat-num { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .dash-stat-label { font-size: 0.65rem; color: #718096; text-transform: uppercase; font-weight: 700; margin-top: 2px; }
        .dash-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #edf2f7; }
        .dash-list-item:last-child { border-bottom: none; }

        /* Estilo dos Badges Interativos para Checklist no Roteiro */
        .ordem-badge, .visitado-badge {
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .ordem-badge:hover {
            filter: brightness(0.9);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0, 77, 64, 0.1);
        }
        .visitado-badge:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(37, 211, 102, 0.1);
        }
        .ordem-badge:active, .visitado-badge:active {
            transform: translateY(0) scale(0.97);
        }

        /* --- Estilos do Mapa Leaflet --- */
        #map {
            width: 100%;
            height: calc(100vh - 240px);
            min-height: 350px;
            border-radius: 18px;
            box-shadow: var(--card-shadow);
            z-index: 1;
        }

        /* --- Chips de Filtros --- */
        .filter-chip {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.15);
            color: white;
            border-radius: 15px;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .filter-chip:hover {
            background: rgba(255,255,255,0.25);
        }
        .filter-chip.active {
            background: white !important;
            color: var(--primary) !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* --- Estilos de Dark Mode --- */
        body.dark-theme {
            --bg: #121212;
            --primary: #00251a;
            --accent: #004d40;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            background-color: var(--bg);
            color: #e0e0e0;
        }
        body.dark-theme .app-header {
            background: linear-gradient(135deg, #00251a 0%, #004d40 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        body.dark-theme .search-container {
            background: #1e1e1e;
            border-bottom: 1px solid #2d2d2d;
        }
        body.dark-theme .bottom-nav {
            background: #1e1e1e;
            border-top: 1px solid #2d2d2d;
            box-shadow: 0 -3px 15px rgba(0, 0, 0, 0.3);
        }
        body.dark-theme .nav-item-btn {
            color: #a0aec0;
        }
        body.dark-theme .nav-item-btn.active {
            color: #4db6ac;
        }
        body.dark-theme .nav-item-btn.active i {
            color: #80cbc4;
        }
        body.dark-theme .card-client {
            background: #1e1e1e;
            color: #e0e0e0;
            border-left-color: #00796b;
        }
        body.dark-theme .card-client.visited-card {
            background-color: #172c1c;
            border-left-color: #2e7d32 !important;
        }
        body.dark-theme .card-client.absent-card {
            background-color: #2b2512;
            border-left-color: #f57f17 !important;
        }
        body.dark-theme .client-fantasia {
            color: #80cbc4;
        }
        body.dark-theme .id-badge {
            background: #2d3748;
            color: #edf2f7;
        }
        body.dark-theme .info-box {
            background: #1a1a1a;
            border-color: #2d2d2d;
        }
        body.dark-theme .info-item {
            color: #cbd5e0;
        }
        body.dark-theme .info-item i {
            color: #4db6ac;
        }
        body.dark-theme .obs-tag {
            background: #2b2302;
            border-left-color: #f57f17;
            color: #ffb74d;
        }
        body.dark-theme .btn-edit {
            background: #2d3748;
            color: #e2e8f0;
        }
        body.dark-theme .loading-overlay {
            background: rgba(18,18,18,0.92);
        }
        body.dark-theme .modal-content {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        body.dark-theme .form-control, 
        body.dark-theme .form-select {
            background-color: #2d2d2d;
            border-color: #404040;
            color: #e0e0e0;
        }
        body.dark-theme .form-control:focus, 
        body.dark-theme .form-select:focus {
            background-color: #2d2d2d;
            color: #e0e0e0;
        }
        body.dark-theme .dash-card, 
        body.dark-theme .dash-stat-box {
            background: #1e1e1e;
            border-color: #2d2d2d;
        }
        body.dark-theme .dash-stat-num {
            color: #80cbc4;
        }
        body.dark-theme .dash-list-item {
            border-bottom-color: #2d2d2d;
            color: #e0e0e0;
        }
        body.dark-theme .modal-header,
        body.dark-theme .modal-footer {
            border-color: #2d2d2d;
        }
        body.dark-theme .chk-card.visited {
            background-color: #172c1c;
        }
        body.dark-theme .chk-card.absent {
            background-color: #2b2512;
        }
        body.dark-theme .filter-chip.active {
            background: var(--accent) !important;
            color: white !important;
        }
        
        /* Customizar Popup do Leaflet */
        .leaflet-popup-content-wrapper {
            background: var(--card-bg, #ffffff) !important;
            color: var(--text-main, #2d3748) !important;
            border-radius: 16px !important;
            padding: 0 !important;
            overflow: hidden !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
            border: 1px solid var(--border-color, #e2e8f0) !important;
        }
        body.dark-theme .leaflet-popup-content-wrapper {
            background: #1e1e1e !important;
            color: #e0e0e0 !important;
            border-color: #2d2d2d !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
            width: 260px !important;
            line-height: inherit !important;
        }
        .leaflet-popup-tip {
            background: var(--card-bg, #ffffff) !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important;
        }
        body.dark-theme .leaflet-popup-tip {
            background: #1e1e1e !important;
        }
        .leaflet-popup-close-button {
            color: #ffffff !important;
            font-size: 1.25rem !important;
            padding: 6px 8px 0 0 !important;
            z-index: 10;
        }
        .leaflet-popup-close-button:hover {
            color: #ffcccc !important;
            background: none !important;
        }
        
        /* Custom Online/Offline Toggle Switch */
        .online-toggle-container {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            padding: 4px 10px;
            border-radius: 20px;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: var(--transition);
        }
        .online-toggle-container.offline-mode {
            background: rgba(220, 53, 69, 0.25);
            border-color: rgba(220, 53, 69, 0.45);
        }
        .online-toggle-container.online-mode {
            background: rgba(40, 167, 69, 0.25);
            border-color: rgba(40, 167, 69, 0.45);
        }
        .online-toggle-switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 16px;
            margin: 0;
        }
        .online-toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .online-toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: .25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px;
        }
        .online-toggle-slider:before {
            position: absolute;
            content: "";
            height: 10px;
            width: 10px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }
        input:checked + .online-toggle-slider {
            background-color: #28a745;
        }
        input:checked + .online-toggle-slider:before {
            transform: translateX(16px);
        }

        /* Animations for Visit Confirmation Pulse */
        @keyframes visitPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(40, 167, 69, 0.6); }
            100% { transform: scale(1); }
        }
        @keyframes absentPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(255, 193, 7, 0.6); }
            100% { transform: scale(1); }
        }
        .visit-confirmed { 
            animation: visitPulse 0.6s ease-in-out; 
        }
        .absent-confirmed { 
            animation: absentPulse 0.6s ease-in-out; 
        }

        /* Playbook Card List Styles */
        .pb-client-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 8px;
            background: #ffffff;
            transition: var(--transition);
        }
        body.dark-theme .pb-client-list {
            background: #2d2d2d;
            border-color: #404040;
        }
        .pb-client-card {
            border-left: 4px solid transparent;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 6px;
            padding: 10px;
            transition: var(--transition);
            color: #2d3748;
        }
        body.dark-theme .pb-client-card {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        .pb-client-card:hover {
            background: #edf2f7;
            transform: translateY(-1px);
        }
        body.dark-theme .pb-client-card:hover {
            background: #363636;
        }
        .pb-client-card.active {
            background: rgba(0, 121, 107, 0.1);
            border-left-color: var(--accent);
            border-top: 1px solid rgba(0, 121, 107, 0.2);
            border-right: 1px solid rgba(0, 121, 107, 0.2);
            border-bottom: 1px solid rgba(0, 121, 107, 0.2);
        }
        body.dark-theme .pb-client-card.active {
            background: rgba(128, 203, 196, 0.08);
            border-left-color: #80cbc4;
            border-top: 1px solid rgba(128, 203, 196, 0.15);
            border-right: 1px solid rgba(128, 203, 196, 0.15);
            border-bottom: 1px solid rgba(128, 203, 196, 0.15);
        }
        .pb-client-card .pb-card-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: #1a202c;
        }
        body.dark-theme .pb-client-card .pb-card-name {
            color: #ffffff;
        }
        .pb-client-card .pb-card-meta {
            color: #718096;
        }
        body.dark-theme .pb-client-card .pb-card-meta {
            color: #a0aec0;
        }

        /* Playbook Accordion Styles */
        body.dark-theme .accordion-item {
            background-color: #1e1e1e;
            color: #e0e0e0;
            border-color: #2d2d2d;
        }
        body.dark-theme .accordion-button {
            background-color: #1e1e1e;
            color: #e0e0e0;
        }
        body.dark-theme .accordion-button:not(.collapsed) {
            background-color: #2d2d2d;
            color: #80cbc4;
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.1);
        }
        body.dark-theme .accordion-button::after {
            filter: invert(1) grayscale(1);
        }
    </style>
</head>
<body>

<!-- Loader Overlay -->
<div id="loader" class="loading-overlay">
    <div class="spinner-grow text-success" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 fw-bold text-success">Carregando Roteiro...</div>
</div>

<!-- Tela de Login de Acesso Restrito -->
<div id="login-screen" class="position-fixed top-0 start-0 w-100 h-100 d-none align-items-center justify-content-center" style="background: var(--gradient); z-index: 9999;">
    <div class="card shadow-lg border-0 m-3 modal-content-rounded text-dark" style="max-width: 400px; width: 100%;">
        <div class="card-body p-4 text-center">
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px; background: rgba(0, 121, 107, 0.1);">
                    <i class="fas fa-lock text-success" style="font-size: 2rem;"></i>
                </div>
                <h4 class="fw-bold mb-1 text-primary">Acesso Restrito</h4>
                <p class="text-muted small">Roteiro Edimar Pro</p>
            </div>
            
            <!-- Aviso do Google Sites / Iframe -->
            <div id="iframe-warning" class="alert alert-warning py-2.5 px-3 small rounded-3 mb-3 text-start" style="display: none; border-left: 4px solid #ffc107;">
                <i class="fas fa-exclamation-triangle text-warning me-1"></i>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // LINK DO BACKEND WEB APP (APPS SCRIPT)
    const API_URL = 'https://script.google.com/macros/s/AKfycbzfSATmgpwLFYJHKy95cdnmgh7kciPvaHD64f3J1cLoAOAdYFFrztMGixNLgKLLN0IO/exec';
    
    let db = [];
    let visitsDb = [];
    let playbookDb = []; // Dados dos Playbooks/Dossiês (Clientes_Brain)
    let activeTab = 'roteiro';
    let filterChecklist = 'hoje'; // 'hoje' ou 'todos'
    let checklistSearch = '';
    let gpsSortedOrder = null;
    const coordsCache = JSON.parse(localStorage.getItem('coords_cache') || '{}');
    let pbSearchQuery = '';
    let pbDayFilterVal = '';
    let pbFieldFilterVal = '';
    let pbSelectedClientId = '';
    let isOnlineMode = true;
    
    function getLocalDateStr() {
        const d = new Date();
        const year = d.getFullYear();
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    
    let selectedDate = getLocalDateStr();
    
    // Converte YYYY-MM-DD para DD/MM/YYYY
    function formatDatePtBr(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length < 3) return dateStr;
        return `${parts[2]}/${parts[1]}/${parts[0]}`;
    }
    
    // Converte YYYY-MM-DD para "DD/MM/YYYY DIA"
    function formatLocalDateAndDay(dateStr) {
        if (!dateStr) return '';
        const parts = dateStr.split('-');
        if (parts.length < 3) return dateStr;
        const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
        const dayCode = getDayCodeForDate(dateStr);
        return `${formattedDate} ${dayCode}`;
    }
    
    function updateSelectedDate(newDate, updateDayFilter = true) {
        selectedDate = newDate;
        
        // Sincroniza todos os campos de data
        const inputRoteiro = document.getElementById('roteiroDate');
        if (inputRoteiro) inputRoteiro.value = newDate;
        
        const inputChecklist = document.getElementById('chk-visit-date');
        if (inputChecklist) inputChecklist.value = newDate;
        
        const inputMapa = document.getElementById('mapa-visit-date');
        if (inputMapa) inputMapa.value = newDate;
        
        const inputDashboard = document.getElementById('dash-visit-date');
        if (inputDashboard) inputDashboard.value = newDate;
        
        if (updateDayFilter) {
            const dayCode = getDayCodeForDate(newDate);
            const fVisitaEl = document.getElementById('fVisita');
            if (fVisitaEl) {
                fVisitaEl.value = dayCode;
            }
        }
        
        // Limpa ordenação temporária local de GPS quando a data muda
        gpsSortedOrder = null;
        
        render();
    }
    
    // Alvos para os modais de WhatsApp/GPS
    let currentWaTarget = null;
    let currentGpsTarget = null;

    const modal = new bootstrap.Modal(document.getElementById('modalForm'));
    const waModal = new bootstrap.Modal(document.getElementById('modalWhatsapp'));
    const gpsModal = new bootstrap.Modal(document.getElementById('modalGps'));
    
    const customModalEl = document.getElementById('customModal');
    const customModalInstance = new bootstrap.Modal(customModalEl);
    let customModalResolve = null;

    customModalEl.addEventListener('hidden.bs.modal', function () {
        if (customModalResolve) {
            const resolveTemp = customModalResolve;
            customModalResolve = null;
            document.getElementById('customModalInputContainer').style.display = 'none';
            resolveTemp(null);
        }
    });

    function customAlert(message, title = "Aviso") {
        return new Promise((resolve) => {
            document.getElementById('customModalInputContainer').style.display = 'none';
            document.getElementById('customModalTitle').innerText = title;
            document.getElementById('customModalTitle').className = "fw-bold mb-0 text-primary";
            document.getElementById('customModalBody').innerText = message;
            document.getElementById('customModalBtnCancel').style.display = 'none';
            
            const btnOk = document.getElementById('customModalBtnConfirm');
            btnOk.innerText = 'OK';
            btnOk.className = 'btn btn-primary px-4 py-1.5 rounded-pill btn-sm fw-bold';
            
            customModalResolve = resolve;
            btnOk.onclick = function() {
                customModalResolve = null;
                customModalInstance.hide();
                resolve(true);
            };
            customModalInstance.show();
        });
    }

    function customConfirm(message, title = "Confirmação") {
        return new Promise((resolve) => {
            document.getElementById('customModalInputContainer').style.display = 'none';
            document.getElementById('customModalTitle').innerText = title;
            document.getElementById('customModalTitle').className = "fw-bold mb-0 text-success";
            document.getElementById('customModalBody').innerText = message;
            document.getElementById('customModalBtnCancel').style.display = 'block';
            
            const btnConfirm = document.getElementById('customModalBtnConfirm');
            btnConfirm.innerText = 'Confirmar';
            btnConfirm.className = 'btn btn-success px-4 py-1.5 rounded-pill btn-sm fw-bold text-white';
            
            customModalResolve = resolve;
            btnConfirm.onclick = function() {
                customModalResolve = null;
                customModalInstance.hide();
                resolve(true);
            };
            customModalInstance.show();
        });
    }

    function customPrompt(message, defaultValue = '', title = "Entrada") {
        return new Promise((resolve) => {
            document.getElementById('customModalTitle').innerText = title;
            document.getElementById('customModalTitle').className = "fw-bold mb-0 text-primary";
            document.getElementById('customModalBody').innerText = message;
            
            const inputContainer = document.getElementById('customModalInputContainer');
            const inputEl = document.getElementById('customModalInput');
            inputContainer.style.display = 'block';
            inputEl.value = defaultValue;
            
            document.getElementById('customModalBtnCancel').style.display = 'block';
            
            const btnConfirm = document.getElementById('customModalBtnConfirm');
            btnConfirm.innerText = 'OK';
            btnConfirm.className = 'btn btn-primary px-4 py-1.5 rounded-pill btn-sm fw-bold';
            
            customModalResolve = (val) => {
                inputContainer.style.display = 'none';
                resolve(val);
            };
            
            btnConfirm.onclick = function() {
                const val = inputEl.value;
                customModalResolve = null;
                inputContainer.style.display = 'none';
                customModalInstance.hide();
                resolve(val);
            };
            customModalInstance.show();
            setTimeout(() => inputEl.focus(), 500);
        });
    }

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

    // Limpa complementos do endereço para navegação (evitando quebrar o GPS)
    function cleanAddressForGps(address) {
        if (!address) return '';
        const parts = address.split('-');
        if (parts.length <= 2) return address;
        
        const cleanedParts = parts.filter((part, index) => {
            if (index === 0 || index === parts.length - 1) return true;
            const p = part.toLowerCase();
            if (p.includes('sala') || p.includes('loja') || p.includes('apto') || 
                p.includes('apt') || p.includes('bloc') || p.includes('andar') || 
                p.includes('fundo') || p.includes('casa') || p.includes('sl ') ||
                p.includes('lj ') || /^\s*\d+\s*$/.test(part)) { 
                return false;
            }
            return true;
        });
        return cleanedParts.map(p => p.trim()).join(' - ');
    }

    // Formatar CNPJ com máscara
    function formatCnpj(v) {
        if (!v) return '';
        v = v.toString().replace(/\D/g,"").replace(".0","");
        if(v.length == 14) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        return v;
    }

    // Formatar Telefone com máscara
    function formatPhone(v) {
        if (!v) return '';
        v = v.toString().replace(/\D/g,"");
        if (v.length === 11) {
            return `(${v.substring(0,2)}) ${v.substring(2,7)}-${v.substring(7)}`;
        } else if (v.length === 10) {
            return `(${v.substring(0,2)}) ${v.substring(2,6)}-${v.substring(6)}`;
        }
        return v;
    }

    // Retorna a abreviação do dia da semana em português
    function getTodayCode() {
        const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
        return days[new Date().getDay()];
    }

    // Nome completo do dia para exibição
    function getTodayFullString() {
        const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
        return days[new Date().getDay()];
    }

    // Parse de data robusto que aceita objetos Date, strings ISO e formato pt-BR
    function parseDate(dateInput) {
        if (!dateInput) return new Date(NaN);
        if (dateInput instanceof Date) return isNaN(dateInput.getTime()) ? new Date(NaN) : dateInput;
        
        let d = new Date(dateInput);
        if (!isNaN(d.getTime())) return d;
        
        const str = dateInput.toString().trim();
        // Tenta pt-BR "DD/MM/YYYY HH:MM:SS" ou "DD/MM/YYYY"
        const parts = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}):?(\d{2})?)?/);
        if (parts) {
            const day = parseInt(parts[1], 10);
            const month = parseInt(parts[2], 10) - 1;
            const year = parseInt(parts[3], 10);
            const hour = parts[4] ? parseInt(parts[4], 10) : 0;
            const minute = parts[5] ? parseInt(parts[5], 10) : 0;
            const second = parts[6] ? parseInt(parts[6], 10) : 0;
            return new Date(year, month, day, hour, minute, second);
        }
        return new Date(NaN);
    }

    // Retorna o status da visita em uma data específica ('Visita', 'Não Encontrado' ou null)
    function getVisitStatusOnDate(clientId, dateStr) {
        if (!clientId) return null;
        if (!dateStr) dateStr = getLocalDateStr();
        const parts = dateStr.split('-');
        const targetDate = new Date(parts[0], parts[1] - 1, parts[2]);
        if (isNaN(targetDate.getTime())) return null;
        const targetDateStr = targetDate.toDateString();
        
        const dayVisits = visitsDb.filter(v => {
            if (!v || !v.ID || !v.Data) return false;
            const d = parseDate(v.Data);
            return v.ID.toString().trim() === clientId.toString().trim() && !isNaN(d.getTime()) && d.toDateString() === targetDateStr;
        });
        
        if (dayVisits.length === 0) return null;
        
        dayVisits.sort((a, b) => parseDate(b.Data) - parseDate(a.Data));
        return dayVisits[0].Status || 'Visita';
    }

    // Verifica se o cliente foi visitado hoje (com status 'Visita')
    function isVisitedToday(clientId) {
        return getVisitStatusOnDate(clientId, getLocalDateStr()) === 'Visita';
    }

    // Verifica se o cliente foi visitado ou marcado como não encontrado em uma data específica ('YYYY-MM-DD')
    function isVisitedOnDate(clientId, dateStr) {
        return getVisitStatusOnDate(clientId, dateStr) !== null;
    }

    // Retorna o código do dia ('SEG', 'TER', etc.) para uma data 'YYYY-MM-DD'
    function getDayCodeForDate(dateStr) {
        if (!dateStr) return '';
        const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
        const parts = dateStr.split('-');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        return days[d.getDay()];
    }

    // Retorna o índice de prioridade do dia da semana (SEG=1, TER=2...) para ordenação padrão
    const dayOrderMap = { 'SEG': 1, 'TER': 2, 'QUA': 3, 'QUI': 4, 'SEX': 5, 'SAB': 6, 'DOM': 7 };
    function getMinDayOrder(visitaStr) {
        if (!visitaStr) return 8;
        let min = 8;
        for (const [day, order] of Object.entries(dayOrderMap)) {
            if (visitaStr.toUpperCase().includes(day)) {
                if (order < min) min = order;
            }
        }
        return min;
    }

    // Retorna a string por extenso do dia para uma data 'YYYY-MM-DD'
    function getFullStringForDate(dateStr) {
        if (!dateStr) return '';
        const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
        const parts = dateStr.split('-');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        return days[d.getDay()];
    }

    // Normaliza hora escrita para formato comparável 'HH:MM'
    function normalizeTime(timeStr) {
        if (!timeStr) return "";
        const match = timeStr.toString().match(/(\d{1,2}):(\d{2})/);
        if (!match) return "";
        const h = match[1].padStart(2, '0');
        const m = match[2];
        return `${h}:${m}`;
    }

    // Alerta o usuário se o cliente estiver fora do horário de funcionamento ou se o horário da visita não chegou
    async function checkHoursAlert(client, actionName) {
        const now = new Date();
        const curHourStr = now.toTimeString().substring(0, 5); // "HH:MM"
        
        let warnings = [];
        
        // 1. Verificar HAbertura
        if (client.HAbertura && client.HAbertura.toString().trim()) {
            const hab = client.HAbertura.toString().trim();
            const parts = hab.split(/[-–—至às]/).map(p => p.trim());
            if (parts.length >= 1) {
                const openTime = normalizeTime(parts[0]);
                const closeTime = normalizeTime(parts[1]) || "23:59";
                
                if ((openTime && curHourStr < openTime) || (closeTime && curHourStr > closeTime)) {
                    warnings.push(`⚠️ O cliente pode estar FECHADO agora (Horário de funcionamento: ${hab}).`);
                }
            }
        }
        
        // 2. Verificar Hvisita
        if (client.Hvisita && client.Hvisita.toString().trim()) {
            const hvis = client.Hvisita.toString().trim();
            const parts = hvis.split(/[-–—至às]/).map(p => p.trim());
            if (parts.length >= 1) {
                const visitTime = normalizeTime(parts[0]);
                if (visitTime && curHourStr < visitTime) {
                    warnings.push(`⏳ O horário programado de visita ainda não chegou (Visita programada para: ${hvis}).`);
                }
            }
        }
        
        if (warnings.length > 0) {
            return await customConfirm(`${warnings.join('\n')}\n\nDeseja prosseguir com o ${actionName} mesmo assim?`, "Aviso de Horário");
        }
        
        return true;
    }

    // Retorna data da última visita formatada
    function getLastVisitDateStr(clientId) {
        if (!clientId) return 'Nunca visitado';
        const clientVisits = visitsDb
            .filter(v => v && v.ID && v.Data && v.ID.toString().trim() === clientId.toString().trim() && (!v.Status || v.Status === 'Visita'))
            .map(v => parseDate(v.Data))
            .filter(d => d && !isNaN(d.getTime()))
            .sort((a, b) => b - a);
        if (clientVisits.length === 0) return 'Nunca visitado';
        const last = clientVisits[0];
        try {
            return last.toLocaleDateString('pt-BR');
        } catch (e) {
            return 'Data inválida';
        }
    }

    // --- 2. GESTÃO DE CONEXÃO E FILA OFFLINE ---
    let isSyncing = false;

    function updateConnectionBadge(online, textOverride) {
        const toggle = document.getElementById('connection-toggle');
        const container = document.getElementById('toggle-container');
        const text = document.getElementById('connection-status-text');
        const badge = document.getElementById('pending-badge');
        
        const queue = JSON.parse(localStorage.getItem('offline_queue') || '[]');
        const pendingCount = queue.length;

        // Atualiza o badge de pendências
        if (badge) {
            if (pendingCount > 0) {
                badge.textContent = `${pendingCount} pendente(s)`;
                badge.style.display = 'inline-block';
            } else {
                badge.style.display = 'none';
            }
        }

        if (toggle) {
            toggle.checked = online;
        }

        if (container) {
            if (online) {
                container.className = "online-toggle-container online-mode";
            } else {
                container.className = "online-toggle-container offline-mode";
            }
        }

        if (text) {
            text.textContent = textOverride || (online ? 'Online' : 'Offline');
        }
    }

    function toggleOnlineMode(checked) {
        isOnlineMode = checked;
        if (isOnlineMode) {
            if (navigator.onLine) {
                updateConnectionBadge(true);
                syncOfflineQueue();
            } else {
                customAlert("Você está sem conexão de internet. O modo online não pode ser ativado agora.", "Aviso de Conexão");
                const toggle = document.getElementById('connection-toggle');
                if (toggle) toggle.checked = false;
                isOnlineMode = false;
                updateConnectionBadge(false);
            }
        } else {
            updateConnectionBadge(false);
        }
    }

    function queueOffline(action, data, extra) {
        const queue = JSON.parse(localStorage.getItem('offline_queue') || '[]');
        queue.push({ action, data, extra, timestamp: Date.now() });
        localStorage.setItem('offline_queue', JSON.stringify(queue));
        
        const pendingCount = queue.length;
        updateConnectionBadge(isOnlineMode && navigator.onLine, `${pendingCount} pendente(s)`);
        
        // Salva cache local imediato
        localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
        localStorage.setItem('cached_db', JSON.stringify(db));
    }

    async function syncOfflineQueue() {
        if (isSyncing) return;
        if (!navigator.onLine) {
            customAlert("Sem internet para sincronizar.", "Erro de Conexão");
            return;
        }
        const queue = JSON.parse(localStorage.getItem('offline_queue') || '[]');
        if (queue.length === 0) {
            updateConnectionBadge(isOnlineMode && navigator.onLine);
            return;
        }
        
        isSyncing = true;
        updateConnectionBadge(true, `Sincronizando ${queue.length}...`);
        
        const failed = [];
        for (let req of queue) {
            try {
                const user = localStorage.getItem('pref_user');
                const psw = localStorage.getItem('pref_psw');
                const body = {
                    action: req.action,
                    user: user,
                    psw: psw,
                    data: req.data,
                    ...req.extra
                };
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(body)
                });
                const text = await resp.text();
                if (text === 'unauthorized') {
                    localStorage.removeItem('pref_user');
                    localStorage.removeItem('pref_psw');
                    showLoginScreen("Sessão expirada. Faça login novamente.");
                    isSyncing = false;
                    return;
                }
            } catch (e) {
                console.error("Falha ao sincronizar item offline:", req, e);
                failed.push(req);
            }
        }
        
        localStorage.setItem('offline_queue', JSON.stringify(failed));
        isSyncing = false;
        
        if (failed.length === 0) {
            isOnlineMode = true; // garante que volta a online
            updateConnectionBadge(true);
            customAlert("Todas as alterações offline foram sincronizadas com a planilha!", "Sincronização");
            load();
        } else {
            updateConnectionBadge(isOnlineMode && navigator.onLine, `${failed.length} pendente(s)`);
        }
    }

    // Ouvintes globais de conexão
    window.addEventListener('online', () => {
        isOnlineMode = true;
        updateConnectionBadge(true);
        syncOfflineQueue();
    });
    window.addEventListener('offline', () => {
        isOnlineMode = false;
        updateConnectionBadge(false);
    });

    // Helper para chamadas POST com interceptação offline
    async function apiPost(action, data = {}, extra = {}) {
        if (!isOnlineMode || !navigator.onLine) {
            queueOffline(action, data, extra);
            return 'queued';
        }
        
        const user = localStorage.getItem('pref_user');
        const psw = localStorage.getItem('pref_psw');
        const body = {
            action: action,
            user: user,
            psw: psw,
            data: data,
            ...extra
        };
        
        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(body)
            });
            const text = await resp.text();
            if (text === 'unauthorized') {
                localStorage.removeItem('pref_user');
                localStorage.removeItem('pref_psw');
                showLoginScreen("Sessão expirada. Faça login novamente.");
                throw new Error("Unauthorized");
            }
            return text;
        } catch (e) {
            console.warn("Erro ao fazer POST, enfileirando offline...", e);
            queueOffline(action, data, extra);
            updateConnectionBadge(false);
            return 'queued';
        }
    }

    function cleanAddressForGeocoding(address) {
        if (!address) return '';
        let addr = address.trim();
        const idxPira = addr.toLowerCase().indexOf('piracicaba');
        if (idxPira !== -1) {
            addr = addr.substring(0, idxPira).trim();
        }
        addr = addr.replace(/[,-\s]+$/, '');
        const parts = addr.split(',');
        if (parts.length >= 2) {
            const street = parts[0].trim();
            const numberPart = parts[1].split('-')[0].trim();
            return `${street}, ${numberPart}`;
        }
        return addr;
    }

    async function geocodeAddress(cleanAddr) {
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cleanAddr + ', Piracicaba, SP')}&limit=1`;
            const resp = await fetch(url, {
                headers: { 'User-Agent': 'RotaEdimarApp/1.0 (edimarpcosta.github.io)' }
            });
            if (!resp.ok) throw new Error("Erro na rede do Nominatim");
            const data = await resp.json();
            if (data && data.length > 0) {
                return {
                    lat: parseFloat(data[0].lat),
                    lon: parseFloat(data[0].lon)
                };
            }
        } catch (e) {
            console.error("Erro ao geocodificar no Nominatim: " + cleanAddr, e);
        }
        return null;
    }

    async function getCoordinatesForAddress(address) {
        if (!address) return null;
        const cleanAddr = cleanAddressForGeocoding(address);
        if (!cleanAddr) return null;
        if (coordsCache[cleanAddr]) {
            return coordsCache[cleanAddr];
        }
        const coords = await geocodeAddress(cleanAddr);
        if (coords) {
            coordsCache[cleanAddr] = coords;
            localStorage.setItem('coords_cache', JSON.stringify(coordsCache));
        }
        return coords;
    }

    window.optimizeMapRoute = async function() {
        const type = document.getElementById('map-start-type').value;
        if (!type) {
            customAlert("Selecione um ponto de partida.");
            return;
        }
        
        toggleLoader(true);
        let startLat, startLon;
        
        if (type === 'gps') {
            if (!navigator.geolocation) {
                toggleLoader(false);
                customAlert("Seu navegador não oferece suporte à geolocalização.");
                return;
            }
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 8000 });
                });
                startLat = position.coords.latitude;
                startLon = position.coords.longitude;
            } catch (err) {
                toggleLoader(false);
                console.error(err);
                customAlert("Falha ao obter sinal de GPS do aparelho. Verifique as permissões de localização.");
                return;
            }
        } else if (type === 'address') {
            const addressVal = document.getElementById('map-start-address').value.trim();
            if (!addressVal) {
                toggleLoader(false);
                customAlert("Digite o endereço de partida.");
                return;
            }
            
            const coords = await getCoordinatesForAddress(addressVal);
            if (!coords) {
                toggleLoader(false);
                customAlert("Não foi possível geocodificar o endereço de partida digitado.");
                return;
            }
            startLat = coords.lat;
            startLon = coords.lon;
        }
        
        const targetDate = selectedDate;
        const targetDateCode = getDayCodeForDate(targetDate);
        let scheduled = db.filter(i => i.Visita.includes(targetDateCode) && i.Endereco && i.Endereco.trim().length > 5);
        
        const omitWhats = localStorage.getItem('map_omit_whats') === 'true';
        if (omitWhats) {
            scheduled = scheduled.filter(i => i.Ordem != 99);
        }
        
        if (scheduled.length === 0) {
            toggleLoader(false);
            customAlert("Não há clientes agendados com endereço neste dia para otimizar.");
            return;
        }
        
        const coordsList = [];
        for (let c of scheduled) {
            const coords = await getCoordinatesForAddress(c.Endereco);
            if (coords) {
                coordsList.push({ id: c.ID, lat: coords.lat, lon: coords.lon });
            }
        }
        
        let currentLat = startLat;
        let currentLon = startLon;
        const remaining = [...coordsList];
        const sortedIds = [];
        
        while (remaining.length > 0) {
            let nearestIdx = -1;
            let minDistance = Infinity;
            
            for (let i = 0; i < remaining.length; i++) {
                const d = getHaversineDistance(currentLat, currentLon, remaining[i].lat, remaining[i].lon);
                if (d < minDistance) {
                    minDistance = d;
                    nearestIdx = i;
                }
            }
            
            if (nearestIdx !== -1) {
                const next = remaining.splice(nearestIdx, 1)[0];
                sortedIds.push(next.id);
                currentLat = next.lat;
                currentLon = next.lon;
            } else {
                break;
            }
        }
        
        scheduled.forEach(c => {
            if (!sortedIds.includes(c.ID)) {
                sortedIds.push(c.ID);
            }
        });
        
        gpsSortedOrder = sortedIds;
        toggleLoader(false);
        customAlert("Rota ordenada localmente a partir do ponto de partida!", "Otimizador");
        render();
    };
    
    function getHaversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    async function handleLoginSubmit(event) {
        event.preventDefault();
        const user = document.getElementById('login-username').value.trim();
        const psw = document.getElementById('login-password').value.trim();
        
        document.getElementById('login-btn-text').innerText = 'Validando...';

            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch (err) {
                console.error("Resposta do servidor não-JSON:", text);
                throw new Error("Resposta inválida (não é JSON). Verifique a implantação do Apps Script.");

            if (res && res.error === 'unauthorized') {

            } else {

                    db = res.clients;

    // Carregar dados via Fetch API (com autenticação e suporte a cache local)
    async function load() {
        const user = localStorage.getItem('pref_user');
        const psw = localStorage.getItem('pref_psw');
        if (!user || !psw) {
            showLoginScreen();
            return;
        }
        
        // Carregamento instantâneo do cache se disponível
        const cachedDb = localStorage.getItem('cached_db');
        const cachedVisits = localStorage.getItem('cached_visits');
        const cachedPlaybook = localStorage.getItem('cached_playbook');
        let cacheLoaded = false;
        if (cachedDb) {
            try {
                db = JSON.parse(cachedDb);
                visitsDb = cachedVisits ? JSON.parse(cachedVisits) : [];
                playbookDb = cachedPlaybook ? JSON.parse(cachedPlaybook) : [];
                popularCidades();
                updateSemEnderecoBadge();
                render();
                cacheLoaded = true;
                hideLoginScreen();
            } catch (err) {
                console.error("Erro ao ler cache local:", err);
            }
        }
        
        // Se não tiver cache, exibe o spinner principal
        if (!cacheLoaded) {
            toggleLoader(true);
        }
        
        try {
            const resp = await fetch(`${API_URL}?user=${encodeURIComponent(user)}&psw=${encodeURIComponent(psw)}`);
            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch (err) {
                console.error("Resposta do servidor não-JSON no load:", text);
                throw new Error("Resposta inválida (não é JSON). Verifique a implantação.");
            }
            
            if (res && res.error === 'unauthorized') {
                localStorage.removeItem('pref_user');
                localStorage.removeItem('pref_psw');
                showLoginScreen("Sessão expirada ou senha alterada. Faça login novamente.");
                toggleLoader(false);
                return;
            }
            
            hideLoginScreen();
            
            if (res && res.clients) {
                db = res.clients;
                visitsDb = res.visits || [];
                playbookDb = res.brain || [];
            } else {
                db = res;
                visitsDb = [];
                playbookDb = [];
            }
            
            // Salvar no cache local
            localStorage.setItem('cached_db', JSON.stringify(db));
            localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
            localStorage.setItem('cached_playbook', JSON.stringify(playbookDb));
            
            popularCidades();
            updateSemEnderecoBadge();
            render();
            
            // Se estávamos com indicador de erro de rede, limpa
            updateConnectionBadge(true);
        } catch (e) { 
            console.error(e);
            if (cacheLoaded) {
                // Se já carregou o cache, não bloqueia o usuário com um alert incômodo,
                // apenas atualiza o badge para offline.
                updateConnectionBadge(false);
            } else {
                customAlert(`Erro ao conectar com o banco de dados: ${e.message}`); 
            }
        }
        toggleLoader(false);
    }

            btn.innerHTML = '<i class="fas fa-check"></i>';

    // Helper para requisição JSONP para contornar CORS do ReceitaWS
    function fetchJSONP(url) {
        return new Promise((resolve, reject) => {
            const callbackName = 'receitaws_callback_' + Math.floor(Math.random() * 1000000);
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.onerror = function(err) {
                delete window[callbackName];
                if (script.parentNode) document.body.removeChild(script);
                reject(err);
            };
            document.body.appendChild(script);
            
            // Timeout de 5 segundos
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    if (script.parentNode) document.body.removeChild(script);
                    reject(new Error("Timeout de conexão"));
                }
            }, 5000);
        });
    }

    async function queryCNPJ(cnpjRaw) {
        const cnpj = cnpjRaw.replace(/\D/g, '');
        if (cnpj.length !== 14) {
            customAlert("CNPJ inválido. Digite 14 dígitos.");
            return null;
        }
        toggleLoader(true);
        
        // 1. Tenta ReceitaWS via JSONP (limite: 3 req/min)
        try {
            const data = await fetchJSONP(`https://receitaws.com.br/v1/cnpj/${cnpj}`);
            if (!data || data.status === 'ERROR') {
                throw new Error(data ? data.message : "Erro na resposta do ReceitaWS");
            }
            return {
                source: 'receitaws',
                razao_social: data.nome,
                nome_fantasia: data.fantasia || data.nome,
                logradouro: data.logradouro,
                numero: data.numero,
                complemento: data.complemento,
                bairro: data.bairro,
                municipio: data.municipio,
                uf: data.uf,
                cep: data.cep ? data.cep.replace(/\D/g, '') : '',
                ddd_telefone_1: data.telefone ? data.telefone.split('/')[0].replace(/\D/g, '') : ''
            };
        } catch (e) {
            console.warn("Falha no ReceitaWS (ou limite excedido), tentando BrasilAPI...", e);
            // 2. Fallback para BrasilAPI
            try {
                const resp = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
                if (!resp.ok) throw new Error("CNPJ não encontrado no BrasilAPI.");
                const data = await resp.json();
                return {
                    source: 'brasilapi',
                    razao_social: data.razao_social,
                    nome_fantasia: data.nome_fantasia || data.razao_social,
                    descricao_tipo_de_logradouro: data.descricao_tipo_de_logradouro,
                    logradouro: data.logradouro,
                    numero: data.numero,
                    complemento: data.complemento,
                    bairro: data.bairro,
                    municipio: data.municipio,
                    uf: data.uf,
                    cep: data.cep ? data.cep.replace(/\D/g, '') : '',
                    ddd_telefone_1: data.ddd_telefone_1 || ''
                };
            } catch (err) {
                customAlert("Erro ao buscar CNPJ (ReceitaWS e BrasilAPI falharam): " + err.message);
                return null;
            }
        } finally {
            toggleLoader(false);
        }
    }

    async function queryCEP(cepRaw) {
        const cep = cepRaw.replace(/\D/g, '');
        if (cep.length !== 8) {
            customAlert("CEP inválido. Digite 8 dígitos.");
            return null;
        }
        toggleLoader(true);
        try {
            const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            if (!resp.ok) throw new Error("CEP não encontrado.");
            const data = await resp.json();
            if (data.erro) {
                customAlert("CEP não localizado.");
                return null;
            }
            return data;
        } catch (e) {
            customAlert("Erro ao buscar CEP: " + e.message);
            return null;
        } finally {
            toggleLoader(false);
        }
    }

    function abrirGpsOpcao(option) {
        if (!currentGpsTarget) return;

        let url = '';

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if (option === 'maps') {
            if (isAndroid) {
                // Força abertura do Google Maps no Android em modo navegação
                url = `google.navigation:q=${encodeURIComponent(address)}`;
            } else {
                url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
            }
        } else if (option === 'waze') {
            if (isMobile) {
                // Abre o app do Waze diretamente
                url = `waze://?q=${encodeURIComponent(address)}&navigate=yes`;
            } else {
                url = `https://waze.com/ul?q=${encodeURIComponent(address)}&navigate=yes`;

            url = `maps://?q=${encodeURIComponent(address)}`;

            localStorage.setItem('pref_gps', option);
        }
        
        // CORREÇÃO: Usar window.location.href para links nativos para não abrir abas em branco no celular

        }

    // Registrar ou Remover Visita
    async function toggleVisita(id, event, customDateStr = null, targetStatus = 'Visita') {
        if (event) event.stopPropagation();
        
        const c = db.find(x => x.ID.toString().trim() === id.toString().trim());
        if (!c) return;
        
        const targetDate = customDateStr || document.getElementById('roteiroDate').value || getLocalDateStr();
        const parts = targetDate.split('-');
        const formattedDateForConfirm = `${parts[2]}/${parts[1]}/${parts[0]}`;
        
        if (targetStatus === 'delete') {
            const confirmed = await customConfirm(`Remover a marcação de visita/ausência de "${c.Fantasia || c.Cliente}" em ${formattedDateForConfirm}?`);
            if (confirmed) {
                // Remove do banco de dados local imediatamente
                visitsDb = visitsDb.filter(v => {
                    if (!v || !v.ID || !v.Data) return true;
                    const d = parseDate(v.Data);
                    const targetParts = targetDate.split('-');
                    const targetDateObj = new Date(targetParts[0], targetParts[1] - 1, targetParts[2]);
                    const isMatch = v.ID.toString().trim() === id.toString().trim() && 
                                    !isNaN(d.getTime()) && 
                                    d.toDateString() === targetDateObj.toDateString();
                    return !isMatch;
                });
                
                // Salva cache local
                localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
                
                render();

                // Envia para o backend em background
                apiPost('delete_visit', { ID: id }, { date: targetDate }).catch(e => console.error("Erro ao deletar visita em background:", e));
            }
            return;
        }
        
        const msg = targetStatus === 'Não Encontrado' 
            ? `Confirmar que o cliente "${c.Fantasia || c.Cliente}" NÃO foi encontrado em ${formattedDateForConfirm}?`
            : `Confirmar que você visitou "${c.Fantasia || c.Cliente}" em ${formattedDateForConfirm}?`;
            
        const confirmed = await customConfirm(msg);
        if (confirmed) {
            const dateStr = `${parts[2]}/${parts[1]}/${parts[0]}`;
            
            // Grava localmente imediatamente
            visitsDb.push({ ID: id, Data: dateStr, Status: targetStatus });
            localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
            
            // Animação visual no botão/card clicado
            let btn = null;
            if (event && event.target) {
                btn = event.target.closest('button') || event.target;
            }
            
            if (btn) {
                btn.classList.add(targetStatus === 'Não Encontrado' ? 'absent-confirmed' : 'visit-confirmed');
                
                // Modifica o texto do botão provisoriamente
                if (targetStatus === 'Não Encontrado') {
                    btn.innerHTML = '<i class="fas fa-user-slash me-1"></i>Ausente ✓';
                    btn.className = 'btn btn-sm btn-warning rounded-pill px-3 py-1 fw-bold text-dark';
                } else {
                    btn.innerHTML = '<i class="fas fa-check-double me-1"></i>Visitado ✓';
                    btn.className = 'btn btn-sm btn-success rounded-pill px-3 py-1 fw-bold text-white';
                }
                
                // Aguarda o tempo da animação de pulse (600ms)
                await new Promise(resolve => setTimeout(resolve, 600));
            }
            
            render();
            
            // Envia para o backend em background (sem bloquear tela)
            apiPost('record_visit', { ID: id }, { date: dateStr, status: targetStatus }).catch(e => console.error("Erro ao salvar visita em background:", e));
        }
    }

            const e = document.getElementById('fEntrega').value;

                const matchS = (i.ID + i.Cliente + i.Fantasia + i.Comprador + i.WhatsApp + i.CNPJ + i.Endereco).toLowerCase().includes(s);
                return matchS && (!v || i.Visita.includes(v)) && (!e || i.Entrega.includes(e)) && (!c || i.Cidade === c);

                const dayA = getMinDayOrder(a.Visita);

    // ============================================
