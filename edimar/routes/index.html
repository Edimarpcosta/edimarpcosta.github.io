
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Edimar Pro Roteiro</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font: Outfit (Premium look) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet.js (Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Chart.js (Gráficos) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Decodificador de Polyline do Google -->
    <script src="https://cdn.jsdelivr.net/npm/@mapbox/polyline@1.2.1/src/polyline.js"></script>
    <!-- SortableJS para Ordenação por Drag-and-Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
        :root { 
            --primary: #004d40; 
            --accent: #00796b; 
            --bg: #f4f6f8; 
            --whats: #25d366;
            --gradient: linear-gradient(135deg, #004d40 0%, #00796b 100%);
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { 
            background-color: var(--bg); 
            font-family: 'Outfit', 'Segoe UI', Roboto, Helvetica, sans-serif; 
            padding-top: 145px; 
            padding-bottom: 90px; 
            overflow-x: hidden; 
            transition: padding-top 0.3s ease;
        }
        
        /* Container Fixo do Topo */
        #fixed-top-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1050;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
        }
        
        /* Cabeçalho App-Style */
        .app-header { 
            background: var(--gradient); 
            color: white; 
            padding: 15px; 
        }
        
        .search-container { 
            background: var(--primary); 
            padding: 10px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        .form-control-search { 
            border-radius: 25px; 
            border: none; 
            padding: 10px 20px; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.08); 
            font-size: 1rem; 
        }
        
        /* Filtros Rápidos Horizontal */
        .filter-row { 
            display: flex; 
            gap: 8px; 
            margin-top: 8px; 
            overflow-x: auto; 
            padding-bottom: 5px; 
            scrollbar-width: none; 
        }
        .filter-row::-webkit-scrollbar { display: none; }
        .filter-select { 
            background: rgba(255,255,255,0.15); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 0.75rem; 
            padding: 6px 12px; 
            outline: none; 
            transition: var(--transition);
        }
        .filter-select:focus {
            background: rgba(255,255,255,0.25);
        }
        .filter-select option { color: #333; }
        
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(60px + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.04);
            z-index: 1040;
        }
        .nav-item-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: #718096;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px;
            flex-grow: 1;
            transition: var(--transition);
            position: relative;
            min-width: 0; /* Permite comprimir */
        }
        .nav-item-btn i {
            font-size: 1.15rem;
            margin-bottom: 1px;
            transition: var(--transition);
        }
        .nav-item-btn.active {
            color: var(--primary);
        }
        .nav-item-btn.active i {
            transform: translateY(-1px);
            color: var(--accent);
        }

        /* Card de Cliente Premium */
        .card-client { 
            border: none; 
            border-radius: 18px; 
            background: white; 
            margin-bottom: 15px; 
            box-shadow: var(--card-shadow); 
            position: relative; 
            transition: var(--transition); 
            border-left: 6px solid var(--accent); 
        }
        .card-client.visited-card {
            border-left: 6px solid #28a745 !important;
            background-color: #f7fbf8;
        }
        .card-client.absent-card {
            border-left: 6px solid #ffc107 !important;
            background-color: #fffdf5;
        }
        /* CORREÇÃO DO BUG: O card-client não escala mais ao clicar, evitando deslocamento de botões */
        .card-client:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        .card-body { padding: 15px; }
        
        .client-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .id-badge { font-size: 0.9rem; font-weight: 800; color: #4a5568; background: #edf2f7; padding: 4px 10px; border-radius: 6px; }
        .ordem-badge { background: #e0f2f1; color: var(--primary); font-weight: 800; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .ordem-whats { background: #fff8e1; color: #f57c00; }
        .visitado-badge { background: #d4edda; color: #155724; font-weight: 800; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .visitado-badge.absent-badge { background: #fff3cd; color: #856404; }

        .client-fantasia { font-size: 1.1rem; font-weight: 700; color: var(--primary); line-height: 1.2; }
        .client-razao { font-size: 0.8rem; color: #718096; margin-bottom: 10px; font-style: italic; display: block; }
        
        .info-box { background: #f8fafc; border-radius: 12px; padding: 12px; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border: 1px solid #edf2f7; }
        .info-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #2d3748; }
        .info-item i { color: var(--accent); font-size: 0.9rem; width: 16px; text-align: center; }
        .full-width { grid-column: span 2; }

        .obs-tag { background: #fffdf0; border-left: 3px solid #ffcc00; padding: 8px 12px; font-size: 0.8rem; border-radius: 6px; margin-top: 12px; color: #856404; font-weight: 500; }

        /* Ações Rápidas Mobile */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-circle { height: 48px; border-radius: 14px; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: var(--transition); color: white; }
        .btn-wa { background: var(--whats); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
        .btn-gps { background: #4285f4; box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2); }
        .btn-copy { background: #4a5568; font-size: 1rem; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.15); }
        .btn-edit { background: #e2e8f0; color: var(--primary); font-size: 1.1rem; }
        
        /* Efeito de toque individual nos botões */
        .btn-circle:active { transform: scale(0.9); }
        .btn-circle.copied { background: var(--primary) !important; }

        /* Floating Button */
        .app-fab { position: fixed; bottom: calc(85px + env(safe-area-inset-bottom, 0px)); right: 25px; width: 60px; height: 60px; background: var(--gradient); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 6px 16px rgba(0,77,64,0.3); border: none; z-index: 1000; transition: var(--transition); }
        .app-fab:active { transform: scale(0.9); }
        
        /* Loader */
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        /* Modais Customizados */
        .modal-content-rounded { border-radius: 24px !important; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Checklist View Styles */
        .chk-card { border-left-color: #4a5568; }
        .chk-card.visited { border-left-color: #25d366; background-color: #f0fdf4; }
        .chk-card.absent { border-left-color: #ffc107; background-color: #fffdf5; }
        .chk-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; transition: var(--transition); background: none; }
        
        /* Dashboard View Styles */
        .dash-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-stat-box { background: white; padding: 12px 8px; border-radius: 14px; text-align: center; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .dash-stat-num { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .dash-stat-label { font-size: 0.65rem; color: #718096; text-transform: uppercase; font-weight: 700; margin-top: 2px; }
        .dash-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #edf2f7; }
        .dash-list-item:last-child { border-bottom: none; }

        /* Estilo dos Badges Interativos para Checklist no Roteiro */
        .ordem-badge, .visitado-badge {
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .ordem-badge:hover {
            filter: brightness(0.9);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0, 77, 64, 0.1);
        }
        .visitado-badge:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(37, 211, 102, 0.1);
        }
        .ordem-badge:active, .visitado-badge:active {
            transform: translateY(0) scale(0.97);
        }

        /* --- Estilos do Mapa Leaflet --- */
        #map {
            width: 100%;
            height: calc(100vh - 240px);
            min-height: 350px;
            border-radius: 18px;
            box-shadow: var(--card-shadow);
            z-index: 1;
        }

        /* --- Chips de Filtros --- */
        .filter-chip {
            display: inline-flex;
            align-items: center;
            background: rgba(255,255,255,0.15);
            color: white;
            border-radius: 15px;
            padding: 5px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .filter-chip:hover {
            background: rgba(255,255,255,0.25);
        }
        .filter-chip.active {
            background: white !important;
            color: var(--primary) !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* --- Estilos de Dark Mode --- */
        body.dark-theme {
            --bg: #121212;
            --primary: #00251a;
            --accent: #004d40;
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            background-color: var(--bg);
            color: #e0e0e0;
        }
        body.dark-theme .app-header {
            background: linear-gradient(135deg, #00251a 0%, #004d40 100%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        body.dark-theme .search-container {
            background: #1e1e1e;
            border-bottom: 1px solid #2d2d2d;
        }
        body.dark-theme .bottom-nav {
            background: #1e1e1e;
            border-top: 1px solid #2d2d2d;
            box-shadow: 0 -3px 15px rgba(0, 0, 0, 0.3);
        }
        body.dark-theme .nav-item-btn {
            color: #a0aec0;
        }
        body.dark-theme .nav-item-btn.active {
            color: #4db6ac;
        }
        body.dark-theme .nav-item-btn.active i {
            color: #80cbc4;
        }
        body.dark-theme .card-client {
            background: #1e1e1e;
            color: #e0e0e0;
            border-left-color: #00796b;
        }
        body.dark-theme .card-client.visited-card {
            background-color: #172c1c;
            border-left-color: #2e7d32 !important;
        }
        body.dark-theme .card-client.absent-card {
            background-color: #2b2512;
            border-left-color: #f57f17 !important;
        }
        body.dark-theme .client-fantasia {
            color: #80cbc4;
        }
        body.dark-theme .id-badge {
            background: #2d3748;
            color: #edf2f7;
        }
        body.dark-theme .info-box {
            background: #1a1a1a;
            border-color: #2d2d2d;
        }
        body.dark-theme .info-item {
            color: #cbd5e0;
        }
        body.dark-theme .info-item i {
            color: #4db6ac;
        }
        body.dark-theme .obs-tag {
            background: #2b2302;
            border-left-color: #f57f17;
            color: #ffb74d;
        }
        body.dark-theme .btn-edit {
            background: #2d3748;
            color: #e2e8f0;
        }
        body.dark-theme .loading-overlay {
            background: rgba(18,18,18,0.92);
        }
        body.dark-theme .modal-content {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        body.dark-theme .form-control, 
        body.dark-theme .form-select {
            background-color: #2d2d2d;
            border-color: #404040;
            color: #e0e0e0;
        }
        body.dark-theme .form-control:focus, 
        body.dark-theme .form-select:focus {
            background-color: #2d2d2d;
            color: #e0e0e0;
        }
        body.dark-theme .dash-card, 
        body.dark-theme .dash-stat-box {
            background: #1e1e1e;
            border-color: #2d2d2d;
        }
        body.dark-theme .dash-stat-num {
            color: #80cbc4;
        }
        body.dark-theme .dash-list-item {
            border-bottom-color: #2d2d2d;
            color: #e0e0e0;
        }
        body.dark-theme .modal-header,
        body.dark-theme .modal-footer {
            border-color: #2d2d2d;
        }
        body.dark-theme .chk-card.visited {
            background-color: #172c1c;
        }
        body.dark-theme .chk-card.absent {
            background-color: #2b2512;
        }
        body.dark-theme .filter-chip.active {
            background: var(--accent) !important;
            color: white !important;
        }
        
        /* Customizar Popup do Leaflet */
        .leaflet-popup-content-wrapper {
            background: var(--card-bg, #ffffff) !important;
            color: var(--text-main, #2d3748) !important;
            border-radius: 16px !important;
            padding: 0 !important;
            overflow: hidden !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15) !important;
            border: 1px solid var(--border-color, #e2e8f0) !important;
        }
        body.dark-theme .leaflet-popup-content-wrapper {
            background: #1e1e1e !important;
            color: #e0e0e0 !important;
            border-color: #2d2d2d !important;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5) !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
            width: 260px !important;
            line-height: inherit !important;
        }
        .leaflet-popup-tip {
            background: var(--card-bg, #ffffff) !important;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1) !important;
        }
        body.dark-theme .leaflet-popup-tip {
            background: #1e1e1e !important;
        }
        .leaflet-popup-close-button {
            color: #ffffff !important;
            font-size: 1.25rem !important;
            padding: 6px 8px 0 0 !important;
            z-index: 10;
        }
        .leaflet-popup-close-button:hover {
            color: #ffcccc !important;
            background: none !important;
        }
        
        /* Custom Online/Offline Toggle Switch */
        .online-toggle-container {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            padding: 4px 10px;
            border-radius: 20px;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: var(--transition);
        }
        .online-toggle-container.offline-mode {
            background: rgba(220, 53, 69, 0.25);
            border-color: rgba(220, 53, 69, 0.45);
        }
        .online-toggle-container.online-mode {
            background: rgba(40, 167, 69, 0.25);
            border-color: rgba(40, 167, 69, 0.45);
        }
        .online-toggle-switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 16px;
            margin: 0;
        }
        .online-toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .online-toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.3);
            transition: .25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px;
        }
        .online-toggle-slider:before {
            position: absolute;
            content: "";
            height: 10px;
            width: 10px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .25s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }
        input:checked + .online-toggle-slider {
            background-color: #28a745;
        }
        input:checked + .online-toggle-slider:before {
            transform: translateX(16px);
        }

        /* Animations for Visit Confirmation Pulse */
        @keyframes visitPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(40, 167, 69, 0.6); }
            100% { transform: scale(1); }
        }
        @keyframes absentPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 20px rgba(255, 193, 7, 0.6); }
            100% { transform: scale(1); }
        }
        .visit-confirmed { 
            animation: visitPulse 0.6s ease-in-out; 
        }
        .absent-confirmed { 
            animation: absentPulse 0.6s ease-in-out; 
        }

        /* Playbook Card List Styles */
        .pb-client-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 8px;
            background: #ffffff;
            transition: var(--transition);
        }
        body.dark-theme .pb-client-list {
            background: #2d2d2d;
            border-color: #404040;
        }
        .pb-client-card {
            border-left: 4px solid transparent;
            background: #f8fafc;
            border-radius: 8px;
            margin-bottom: 6px;
            padding: 10px;
            transition: var(--transition);
            color: #2d3748;
        }
        body.dark-theme .pb-client-card {
            background: #1e1e1e;
            color: #e0e0e0;
        }
        .pb-client-card:hover {
            background: #edf2f7;
            transform: translateY(-1px);
        }
        body.dark-theme .pb-client-card:hover {
            background: #363636;
        }
        .pb-client-card.active {
            background: rgba(0, 121, 107, 0.1);
            border-left-color: var(--accent);
            border-top: 1px solid rgba(0, 121, 107, 0.2);
            border-right: 1px solid rgba(0, 121, 107, 0.2);
            border-bottom: 1px solid rgba(0, 121, 107, 0.2);
        }
        body.dark-theme .pb-client-card.active {
            background: rgba(128, 203, 196, 0.08);
            border-left-color: #80cbc4;
            border-top: 1px solid rgba(128, 203, 196, 0.15);
            border-right: 1px solid rgba(128, 203, 196, 0.15);
            border-bottom: 1px solid rgba(128, 203, 196, 0.15);
        }
        .pb-client-card .pb-card-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: #1a202c;
        }
        body.dark-theme .pb-client-card .pb-card-name {
            color: #ffffff;
        }
        .pb-client-card .pb-card-meta {
            color: #718096;
        }
        body.dark-theme .pb-client-card .pb-card-meta {
            color: #a0aec0;
        }

        /* Playbook Accordion Styles */
        body.dark-theme .accordion-item {
            background-color: #1e1e1e;
            color: #e0e0e0;
            border-color: #2d2d2d;
        }
        body.dark-theme .accordion-button {
            background-color: #1e1e1e;
            color: #e0e0e0;
        }
        body.dark-theme .accordion-button:not(.collapsed) {
            background-color: #2d2d2d;
            color: #80cbc4;
            box-shadow: inset 0 -1px 0 rgba(255,255,255,0.1);
        }
        body.dark-theme .accordion-button::after {
            filter: invert(1) grayscale(1);
        }

        /* Interactive Stats and Focus Animations */
        .stat-box-interactive {
            cursor: pointer !important;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease, opacity 0.2s ease, background-color 0.2s ease !important;
        }
        .stat-box-interactive:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08) !important;
        }
        .stat-box-interactive:active {
            transform: translateY(0);
        }
        .stat-box-interactive.active-filter {
            background-color: rgba(0, 77, 64, 0.08) !important;
            box-shadow: 0 0 0 2.5px var(--accent) !important;
        }
        body.dark-theme .stat-box-interactive.active-filter {
            background-color: rgba(128, 203, 196, 0.08) !important;
            box-shadow: 0 0 0 2.5px #80cbc4 !important;
        }
        .stat-box-dimmed {
            opacity: 0.5;
        }

        @keyframes pulseFocus {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(211, 0, 123, 0.8);
            }

    // Limpa complementos do endereço para navegação (evitando quebrar o GPS)
    function cleanAddressForGps(address) {
        if (!address) return '';
        const parts = address.split('-');
        if (parts.length <= 2) return address;
        
        const cleanedParts = parts.filter((part, index) => {
            if (index === 0 || index === parts.length - 1) return true;
            const p = part.toLowerCase();
            if (p.includes('sala') || p.includes('loja') || p.includes('apto') || 
                p.includes('apt') || p.includes('bloc') || p.includes('andar') || 
                p.includes('fundo') || p.includes('casa') || p.includes('sl ') ||
                p.includes('lj ') || /^\s*\d+\s*$/.test(part)) { 
                return false;
            }
            return true;
        });
        return cleanedParts.map(p => p.trim()).join(' - ');
    }

    function getCleanCnpj(v) {
        if (!v) return '';
        let clean = v.toString().replace(/\.0+$/, "").replace(/\D/g, "");
        if (!clean) return '';
        return clean.padStart(14, '0').substring(0, 14);
    }

    // Formatar CNPJ com máscara e preenchimento de zeros à esquerda (zero left)
    function formatCnpj(v) {
        const clean = getCleanCnpj(v);
        if (!clean) return '';
        return clean.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
    }


    // Formatar Telefone com máscara
    function formatPhone(v) {
        if (!v) return '';
        v = v.toString().replace(/\D/g,"");
        if (v.length === 11) {
            return `(${v.substring(0,2)}) ${v.substring(2,7)}-${v.substring(7)}`;
        } else if (v.length === 10) {
            return `(${v.substring(0,2)}) ${v.substring(2,6)}-${v.substring(6)}`;
        }
        return v;
    }

    // Parse de data robusto que aceita objetos Date, strings ISO e formato pt-BR
    function parseDate(dateInput) {
        if (!dateInput) return new Date(NaN);
        if (dateInput instanceof Date) return isNaN(dateInput.getTime()) ? new Date(NaN) : dateInput;
        
        const str = dateInput.toString().trim();
        // Se contiver barra, assume o formato brasileiro DD/MM/YYYY prioritariamente
        if (str.includes('/')) {
            const parts = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}):?(\d{2})?)?/);
            if (parts) {
                const day = parseInt(parts[1], 10);
                const month = parseInt(parts[2], 10) - 1; // Meses de 0 a 11
                const year = parseInt(parts[3], 10);
                const hour = parts[4] ? parseInt(parts[4], 10) : 0;
                const minute = parts[5] ? parseInt(parts[5], 10) : 0;
                const second = parts[6] ? parseInt(parts[6], 10) : 0;
                return new Date(year, month, day, hour, minute, second);
            }
        }
        
        // Fallback para datas ISO ou outras strings válidas (Ex: YYYY-MM-DD)
        let d = new Date(dateInput);
        if (!isNaN(d.getTime())) return d;
        
        return new Date(NaN);
    }

    // Retorna o status da visita em uma data específica ('Visita', 'Não Encontrado' ou null)
    function getVisitStatusOnDate(clientId, dateStr) {
        if (!clientId) return null;
        if (!dateStr) dateStr = getLocalDateStr();
        const parts = dateStr.split('-');
        const targetDate = new Date(parts[0], parts[1] - 1, parts[2]);
        if (isNaN(targetDate.getTime())) return null;
        const targetDateStr = targetDate.toDateString();
        
        const dayVisits = visitsDb.filter(v => {
            if (!v || !v.ID || !v.Data) return false;
            const d = parseDate(v.Data);
            return v.ID.toString().trim() === clientId.toString().trim() && !isNaN(d.getTime()) && d.toDateString() === targetDateStr;
        });
        
        if (dayVisits.length === 0) return null;
        
        dayVisits.sort((a, b) => parseDate(b.Data) - parseDate(a.Data));
        return dayVisits[0].Status || 'Visita';
    }


    // Verifica se o cliente foi visitado ou marcado como não encontrado em uma data específica ('YYYY-MM-DD')
    function isVisitedOnDate(clientId, dateStr) {

    }

    // Retorna o status de positivação e dias desde a última compra
    function getClientPositivacaoStatus(clientId, refDateStr) {
        if (!clientId) return { count: 0, status: 'none', latestDate: null, daysSince: Infinity };
        if (!refDateStr) refDateStr = getLocalDateStr();
        const parts = refDateStr.split('-');
        const refMonth = `${parts[0]}-${parts[1]}`; // YYYY-MM
        
        let allDates = [];
        positivacoesDb.forEach(p => {
            if (p.ID.toString().trim() === clientId.toString().trim() && p.Datas_Pedidos) {
                p.Datas_Pedidos.toString().split(',').forEach(d => {
                    const parsed = parseDate(d);
                    if (!isNaN(parsed.getTime())) {
                        allDates.push(parsed);
                    }
                });
            }
        });
        
        allDates.sort((a, b) => b - a); // decrescente
        const latestDate = allDates[0] || null;
        
        const currentRecord = positivacoesDb.find(p => p.ID.toString().trim() === clientId.toString().trim() && p.Ano_Mes === refMonth);
        const count = currentRecord ? (parseInt(currentRecord.Count_Pedidos) || 0) : 0;
        
        let daysSince = Infinity;
        let status = 'none';
        
        if (latestDate) {
            const refDateObj = new Date(parts[0], parts[1] - 1, parts[2]);
            const diffTime = refDateObj - latestDate;
            daysSince = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (daysSince > 40) {
                status = 'critical'; // Vermelho (>40 dias sem pedido)
            } else if (count >= 3) {
                status = 'very_active'; // Verde escuro (3+ pedidos no mês)
            } else if (count >= 1) {
                status = 'positivado'; // Verde claro (1-2 pedidos no mês)
            } else {
                status = 'active_before'; // Amarelo (0 pedidos este mês, mas ativo nos últimos 40 dias)
            }
        }
        
        return { count, status, latestDate, daysSince };
    }

    // Retorna o código do dia ('SEG', 'TER', etc.) para uma data 'YYYY-MM-DD'
    function getDayCodeForDate(dateStr) {
        if (!dateStr) return '';
        const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
        const parts = dateStr.split('-');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        return days[d.getDay()];
    }

    // Retorna o índice de prioridade do dia da semana (SEG=1, TER=2...) para ordenação padrão
    const dayOrderMap = { 'SEG': 1, 'TER': 2, 'QUA': 3, 'QUI': 4, 'SEX': 5, 'SAB': 6, 'DOM': 7 };
    function getMinDayOrder(visitaStr) {
        if (!visitaStr) return 8;
        let min = 8;
        for (const [day, order] of Object.entries(dayOrderMap)) {
            if (visitaStr.toUpperCase().includes(day)) {
                if (order < min) min = order;
            }
        }
        return min;
    }

    // Retorna a string por extenso do dia para uma data 'YYYY-MM-DD'
    function getFullStringForDate(dateStr) {
        if (!dateStr) return '';
        const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
        const parts = dateStr.split('-');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        return days[d.getDay()];
    }

    function normalizeTime(timeStr) {
        if (!timeStr) return "";
        let s = timeStr.toString().trim().toLowerCase();
        if (/^\d{1,2}$/.test(s)) {
            return s.padStart(2, '0') + ":00";
        }
        const hMatch = s.match(/^(\d{1,2})\s*h\s*(\d{2})?$/);
        if (hMatch) {
            const h = hMatch[1].padStart(2, '0');
            const m = hMatch[2] ? hMatch[2] : "00";
            return `${h}:${m}`;
        }
        const match = s.match(/(\d{1,2}):(\d{2})/);
        if (!match) return "";
        const h = match[1].padStart(2, '0');
        const m = match[2];
        return `${h}:${m}`;
    }

    // Alerta o usuário se o cliente estiver fora do horário de funcionamento ou se o horário da visita não chegou
    async function checkHoursAlert(client, actionName) {
        const now = new Date();
        const curHourStr = now.toTimeString().substring(0, 5); // "HH:MM"
        
        let warnings = [];
        
        // 1. Verificar HAbertura
        if (client.HAbertura && client.HAbertura.toString().trim()) {
            const hab = client.HAbertura.toString().trim();
            const parts = hab.split(/[-–—至às]/).map(p => p.trim());
            if (parts.length >= 1) {
                const openTime = normalizeTime(parts[0]);
                const closeTime = normalizeTime(parts[1]) || "23:59";
                
                if ((openTime && curHourStr < openTime) || (closeTime && curHourStr > closeTime)) {
                    warnings.push(`⚠️ O cliente pode estar FECHADO agora (Horário de funcionamento: ${hab}).`);
                }
            }
        }
        
        // 2. Verificar Hvisita
        if (client.Hvisita && client.Hvisita.toString().trim()) {
            const hvis = client.Hvisita.toString().trim();
            const parts = hvis.split(/[-–—至às]/).map(p => p.trim());
            if (parts.length >= 1) {
                const visitTime = normalizeTime(parts[0]);
                if (visitTime && curHourStr < visitTime) {
                    warnings.push(`⏳ O horário programado de visita ainda não chegou (Visita programada para: ${hvis}).`);
                }
            }
        }
        
        if (warnings.length > 0) {
            return await customConfirm(`${warnings.join('\n')}\n\nDeseja prosseguir com o ${actionName} mesmo assim?`, "Aviso de Horário");
        }
        
        return true;
    }

    function queueOffline(action, data, extra) {
        const queue = JSON.parse(localStorage.getItem('offline_queue') || '[]');
        queue.push({ action, data, extra, timestamp: Date.now() });
        localStorage.setItem('offline_queue', JSON.stringify(queue));
        
        const pendingCount = queue.length;
        updateConnectionBadge(isOnlineMode && navigator.onLine, `${pendingCount} pendente(s)`);
        
        // Salva cache local imediato
        localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
        localStorage.setItem('cached_db', JSON.stringify(db));
        localStorage.setItem('cached_positivacoes', JSON.stringify(positivacoesDb));
    }

    async function syncOfflineQueue() {
        if (isSyncing) return;
        if (!navigator.onLine) {
            customAlert("Sem internet para sincronizar.", "Erro de Conexão");
            return;
        }
        const queue = JSON.parse(localStorage.getItem('offline_queue') || '[]');
        if (queue.length === 0) {
            updateConnectionBadge(isOnlineMode && navigator.onLine);
            return;
        }
        
        isSyncing = true;
        updateConnectionBadge(true, `Sincronizando ${queue.length}...`);
        
        const failed = [];
        for (let req of queue) {
            try {
                const user = localStorage.getItem('pref_user');
                const psw = localStorage.getItem('pref_psw');
                const body = {
                    action: req.action,
                    user: user,
                    psw: psw,
                    data: req.data,
                    ...req.extra
                };
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(body)
                });
                if (!resp.ok) {
                    throw new Error(`HTTP ${resp.status}`);
                }
                const text = await resp.text();
                if (text === 'unauthorized') {
                    localStorage.removeItem('pref_user');
                    localStorage.removeItem('pref_psw');
                    showLoginScreen("Sessão expirada. Faça login novamente.");
                    isSyncing = false;
                    return;
                }
            } catch (e) {
                console.error("Falha ao sincronizar item offline:", req, e);
                failed.push(req);
            }
        }
        
        localStorage.setItem('offline_queue', JSON.stringify(failed));
        isSyncing = false;
        
        if (failed.length === 0) {
            isOnlineMode = true; // garante que volta a online
            updateConnectionBadge(true);
            // Sincroniza silenciosamente sem alert intrusivo
            console.log("Todas as alterações offline foram sincronizadas com a planilha!");
            load();
        } else {
            updateConnectionBadge(isOnlineMode && navigator.onLine, `${failed.length} pendente(s)`);
        }
    }

    // Helper para chamadas POST com interceptação offline
    async function apiPost(action, data = {}, extra = {}) {
        if (!isOnlineMode || !navigator.onLine) {
            queueOffline(action, data, extra);
            return 'queued';
        }
        
        const user = localStorage.getItem('pref_user');
        const psw = localStorage.getItem('pref_psw');
        const body = {
            action: action,
            user: user,
            psw: psw,
            data: data,
            ...extra
        };
        
        try {
            const resp = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(body)
            });
            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            if (text === 'unauthorized') {
                localStorage.removeItem('pref_user');
                localStorage.removeItem('pref_psw');
                showLoginScreen("Sessão expirada. Faça login novamente.");
                throw new Error("Unauthorized");
            }
            return text;
        } catch (e) {
            console.warn("Erro ao fazer POST, enfileirando offline...", e);
            queueOffline(action, data, extra);
            updateConnectionBadge(false);
            return 'queued';
        }
    }

    /**
     * Normaliza uma coordenada que pode estar armazenada como inteiro sem decimal.
     * Ex: -22773317 → -22.773317  |  -475918219 → -47.5918219
     * Coordenadas válidas de lat estão entre -90 e 90. De lon entre -180 e 180.
     * Se o valor absoluto for > 180, é um inteiro que precisa ser dividido.
     */
    function safeCoord(val) {
        if (val === null || val === undefined || val === '' || val === 0) return null;
        const num = parseFloat(val);
        if (isNaN(num)) return null;
        // Se estiver dentro do range válido, retorna diretamente
        if (Math.abs(num) <= 180) return num;
        // É um inteiro sem decimal: calcular o divisor correto
        // -22773317 tem 8 dígitos → dividir por 10^6 = -22.773317
        // -475918219 tem 9 dígitos → dividir por 10^7 = -47.5918219
        const absStr = Math.abs(Math.round(num)).toString();
        const digits = absStr.length;
        // Para lat (max 2 casas inteiras: -90 a 90): digits - 2 casas decimais
        // Para lon (max 3 casas inteiras: -180 a 180): digits - 3 casas decimais
        // Usamos a heurística: se dividindo por 10^(digits-2) ainda > 180, tenta digits-3
        let divisor = Math.pow(10, digits - 2);
        let result = num / divisor;
        if (Math.abs(result) > 180) {
            divisor = Math.pow(10, digits - 3);
            result = num / divisor;
        }
        // Sanity check final
        if (Math.abs(result) > 180) return null;
        return result;
    }

    function cleanAddressForGeocoding(address, cidade = 'Piracicaba') {
        if (!address) return '';
        let addr = address.trim();
        const cityLower = (cidade || 'piracicaba').toString().toLowerCase().trim();
        const idxCity = addr.toLowerCase().indexOf(cityLower);
        if (idxCity !== -1) {
            addr = addr.substring(0, idxCity).trim();
        }
        addr = addr.replace(/[,-\s]+$/, '');
        const parts = addr.split(',');
        if (parts.length >= 2) {
            const street = parts[0].trim();
            const numberPart = parts[1].split('-')[0].trim();
            return `${street}, ${numberPart}`;
        }
        return addr;
    }

    async function geocodeAddress(cleanAddr, cidade = 'Piracicaba') {
        try {
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(cleanAddr + ', ' + (cidade || 'Piracicaba') + ', SP')}&limit=1`;
            const resp = await fetch(url, {
                headers: { 'User-Agent': 'RotaEdimarApp/1.0 (edimarpcosta.github.io)' }
            });
            if (!resp.ok) throw new Error("Erro na rede do Nominatim");
            const data = await resp.json();
            if (data && data.length > 0) {
                return {
                    lat: parseFloat(data[0].lat),
                    lon: parseFloat(data[0].lon)
                };
            }
        } catch (e) {
            console.error("Erro ao geocodificar no Nominatim: " + cleanAddr, e);
        }
        return null;
    }

    async function getCoordinatesForAddress(address, client) {
        if (!address) return null;
        const safeClientLat = safeCoord(client && client.lat);
        const safeClientLon = safeCoord(client && client.long);
        if (client && safeClientLat !== null && safeClientLon !== null) {
            return { lat: safeClientLat, lon: safeClientLon };
        }
        const city = (client && client.Cidade) || 'Piracicaba';
        const cleanAddr = cleanAddressForGeocoding(address, city);
        if (!cleanAddr) return null;
        if (coordsCache[cleanAddr]) {
            const coords = coordsCache[cleanAddr];
            if (client && (!client.lat || !client.long)) {
                client.lat = coords.lat;
                client.long = coords.lon;
                localStorage.setItem('cached_db', JSON.stringify(db));
                apiPost('save', client).catch(e => console.error("Erro ao salvar lat/long em background:", e));
            }
            return coords;
        }
        const coords = await geocodeAddress(cleanAddr, city);
        if (coords) {
            coordsCache[cleanAddr] = coords;
            localStorage.setItem('coords_cache', JSON.stringify(coordsCache));
            if (client) {
                client.lat = coords.lat;
                client.long = coords.lon;
                localStorage.setItem('cached_db', JSON.stringify(db));
                apiPost('save', client).catch(e => console.error("Erro ao salvar lat/long em background:", e));
            }
        }
        return coords;
    }

                                box-shadow: 0 0 10px rgba(0, 123, 255, 0.7);
                            "></div>`,
                            iconSize: [18, 18],
                            iconAnchor: [9, 9]
                        });
                        
                        L.marker([gpsLat, gpsLon], { icon: userIcon })
                            .addTo(leafletMap)
                            .bindPopup("<b>Minha Localização Atual</b>");
                        
                        if (routePolyline) {
                            leafletMap.removeLayer(routePolyline);
                        }
                        const newPolylineLatLns = [[gpsLat, gpsLon], [focusedCoords.lat, focusedCoords.lon]];
                        routePolyline = L.polyline(newPolylineLatLns, {
                            color: '#d3007b',
                            weight: 6,
                            opacity: 0.9,
                            dashArray: '8, 8'
                        }).addTo(leafletMap);
                        
                        leafletMap.fitBounds(L.latLngBounds(newPolylineLatLns), { padding: [50, 50] });
                    }
                }, (error) => {
                    console.warn("Erro ao obter localização GPS em tempo real:", error);
                }, { timeout: 4000, enableHighAccuracy: true });
            }
            
        } else if (gpsSortedOrder && gpsSortedOrder.length > 0) {
            // Desenhar trajeto completo otimizado
            if (startCoords) {
                const startIcon = L.divIcon({
                    className: 'start-marker-icon',
                    html: `<div style="
                        background-color: #007bff;
                        color: white;
                        border: 2px solid white;
                        border-radius: 50%;
                        width: 28px;
                        height: 28px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                    "><i class="fas fa-home" style="font-size: 0.8rem;"></i></div>`,
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });
                L.marker([startCoords.lat, startCoords.lon], { icon: startIcon })
                    .addTo(leafletMap)
                    .bindPopup("<b>Ponto de Partida</b>");
            }
            
            if (backCoords) {
                const backIcon = L.divIcon({
                    className: 'back-marker-icon',
                    html: `<div style="
                        background-color: #dc3545;
                        color: white;
                        border: 2px solid white;
                        border-radius: 50%;
                        width: 28px;
                        height: 28px;
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                    "><i class="fas fa-flag-checkered" style="font-size: 0.8rem;"></i></div>`,
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });
                L.marker([backCoords.lat, backCoords.lon], { icon: backIcon })
                    .addTo(leafletMap)
                    .bindPopup("<b>Ponto de Retorno</b>");
            }
            
            const polylineLatLns = [];
            if (startCoords) polylineLatLns.push([startCoords.lat, startCoords.lon]);
            latLns.forEach(pt => polylineLatLns.push(pt));
            if (backCoords) polylineLatLns.push([backCoords.lat, backCoords.lon]);
            
            if (polylineLatLns.length > 0) {
                routePolyline = L.polyline(polylineLatLns, { color: isDark ? '#4db6ac' : '#00796b', weight: 4, opacity: 0.7 }).addTo(leafletMap);
                leafletMap.fitBounds(L.latLngBounds(polylineLatLns), { padding: [30, 30] });
            }
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const gpsLat = position.coords.latitude;
                    const gpsLon = position.coords.longitude;
                    if (leafletMap && currentInstanceId === mapRenderInstanceId) {
                        const userIcon = L.divIcon({
                            className: 'user-location-marker',
                            html: `<div style="
                                background-color: #007bff;
                                border: 3px solid white;
                                border-radius: 50%;
                                width: 18px;
                                height: 18px;
                                box-shadow: 0 0 10px rgba(0, 123, 255, 0.7);
                            "></div>`,
                            iconSize: [18, 18],
                            iconAnchor: [9, 9]
                        });
                        L.marker([gpsLat, gpsLon], { icon: userIcon })
                            .addTo(leafletMap)
                            .bindPopup("<b>Minha Localização Atual</b>");
                    }
                }, null, { timeout: 4000 });
            }
        } else {
            // Sem trajeto ativo: centraliza apenas nos marcadores dos clientes mapeados
            if (latLns.length > 0) {
                leafletMap.fitBounds(L.latLngBounds(latLns), { padding: [40, 40] });
            } else {
                leafletMap.setView([-22.725, -47.6476], 13);
            }
        }
        
        // Evento de clique no mapa para selecionar o retorno caso backType seja 'click'
        if (backType === 'click') {
            leafletMap.on('click', async function(e) {
                const lat = e.latlng.lat;
                const lng = e.latlng.lng;
                localStorage.setItem('map_click_back_coords', JSON.stringify({ lat, lon: lng }));
                
                try {
                    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`;
                    const resp = await fetch(url, {
                        headers: { 'User-Agent': 'RotaEdimarApp/1.0 (edimarpcosta.github.io)' }
                    });
                    if (resp.ok) {
                        const data = await resp.json();
                        if (data && data.display_name) {
                            const address = data.display_name;
                            localStorage.setItem('map_click_back', address);
                            const inputBack = document.getElementById('map-back-address');
                            if (inputBack) {
                                inputBack.value = address;
                            }
                            render();
                        }
                    }
                } catch(err) {
                    console.error("Erro na geocodificação reversa:", err);
                    const fallbackAddr = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                    localStorage.setItem('map_click_back', fallbackAddr);
                    const inputBack = document.getElementById('map-back-address');
                    if (inputBack) {
                        inputBack.value = fallbackAddr;
                    }
                    render();
                }
            });
        }
    }

    window.configureStandardAddress = async function(type) {
        const typeLabel = type === 'start' ? 'Partida' : 'Retorno';
        const cep = await customPrompt(`[Endereço de ${typeLabel}]\nDigite o CEP (apenas números) para buscar o endereço:\n(Ou cancele para digitar manualmente)`, "");
        let address = "";
        if (cep && cep.trim().replace(/\D/g, '').length === 8) {
            const data = await queryCEP(cep);
            if (data) {
                let end = data.logradouro || '';
                if (data.bairro) {
                    if (end) end += ` - ${data.bairro}`;
                    else end = data.bairro;
                }
                const num = await customPrompt(`Endereço encontrado:\n${end}\n\nDigite o número para o endereço de ${typeLabel}:`, "");
                if (num) {
                    address = `${end}, ${num}`;
                } else {
                    address = `${end}, S/N`;
                }
                address += `, ${data.localidade || ''}, ${data.uf || ''}`;
                address = address.toUpperCase();
            }
        }
        
        const currentVal = address || (type === 'start' ? userConfig.adress_start : userConfig.adress_back);
        const finalAddress = await customPrompt(`Confirme ou edite o endereço de ${typeLabel}:`, currentVal, `Endereço de ${typeLabel}`);
        if (finalAddress === null) return;
        
        const cleanFinal = finalAddress.trim().toUpperCase();
        if (!cleanFinal) {
            customAlert("Endereço não pode ser vazio.");
            return;
        }
        
        toggleLoader(true);
        try {
            const configData = {};
            if (type === 'start') {
                configData.adress_start = cleanFinal;
                userConfig.adress_start = cleanFinal;
                const displayEl = document.getElementById('config-start-val');
                if (displayEl) displayEl.innerText = cleanFinal;
            } else {
                configData.adress_back = cleanFinal;
                userConfig.adress_back = cleanFinal;
                const displayEl = document.getElementById('config-back-val');
                if (displayEl) displayEl.innerText = cleanFinal;
            }
            localStorage.setItem('cached_user_config', JSON.stringify(userConfig));
            await apiPost('save_user_config', configData);
            customAlert(`Endereço padrão de ${typeLabel} salvo com sucesso na nuvem!`, "Configurações");
            render();
        } catch (e) {
            console.error(e);
            customAlert("Erro ao salvar endereço padrão na nuvem.");
        }
        toggleLoader(false);
    };

    // Inicializa a lista ordenada baseada nos clientes filtrados do dia
    window.inicializarRoteiroMapa = function(clientesDia) {
        const cacheOrdem = JSON.parse(sessionStorage.getItem('ordem_manual_dia') || 'null');
        
        if (cacheOrdem && cacheOrdem.length > 0) {
            arrayOrdemRota = cacheOrdem;
        } else {
            // Ordena de acordo com o campo "Ordem" da planilha
            arrayOrdemRota = clientesDia
                .filter(c => c.Endereco && c.Endereco.length > 5 && parseInt(c.Ordem) !== 99)
                .sort((a, b) => (parseInt(a.Ordem) || 0) - (parseInt(b.Ordem) || 0))
                .map(c => c.ID.toString().trim());
        }
        
        renderizarListaClientesArrastavel();
        desenharRotaGMaps();
    };

    // Analisa a string de horários do cache e compara com o horário estimado de visita (ETA)
    window.obterStatusFuncionamento = function(cliente, dateEta) {
        if (!cliente.horarios_completos) {
            return { status: 'desconhecido', badge: `<span class="badge bg-secondary text-white py-0 px-2" style="font-size:0.6rem;"><i class="fas fa-clock me-1"></i>Horário não cadastrado</span>` };
        }
        
        try {
            const grade = JSON.parse(cliente.horarios_completos);
            const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
            const diaHoje = diasSemana[dateEta.getDay()];
            const horarioDia = grade[diaHoje];
            
            if (!horarioDia || horarioDia.toLowerCase() === 'fechado') {
                return { status: 'fechado', badge: `<span class="badge bg-danger text-white py-0 px-2" style="font-size:0.6rem;"><i class="fas fa-ban me-1"></i>Fechado aos ${diaHoje}s</span>` };
            }
            
            const [abertura, fechamento] = horarioDia.split('-');
            const [hAbertura, mAbertura] = abertura.split(':').map(Number);
            const [hFechamento, mFechamento] = fechamento.split(':').map(Number);
            
            const minEta = dateEta.getHours() * 60 + dateEta.getMinutes();
            const minAbertura = hAbertura * 60 + mAbertura;
            const minFechamento = hFechamento * 60 + mFechamento;
            
            if (minEta < minAbertura) {
                return { status: 'antes_abrir', badge: `<span class="badge bg-warning text-dark py-0 px-2" style="font-size:0.6rem;"><i class="fas fa-exclamation-triangle me-1"></i>Chega antes de abrir (${abertura})</span>` };
            } else if (minEta > minFechamento) {
                return { status: 'fechado', badge: `<span class="badge bg-danger text-white py-0 px-2" style="font-size:0.6rem;"><i class="fas fa-exclamation-circle me-1"></i>Fecha às ${fechamento} (Atrasado)</span>` };
            } else if (minFechamento - minEta <= 30) {
                return { status: 'fechando', badge: `<span class="badge bg-warning text-dark py-0 px-2" style="font-size:0.6rem;"><i class="fas fa-hourglass-half me-1"></i>Fecha em breve (${fechamento})</span>` };
            }
            
            return { status: 'aberto', badge: `<span class="badge bg-success text-white py-0 px-2" style="font-size:0.6rem;"><i class="fas fa-check-circle me-1"></i>Aberto das ${abertura} às ${fechamento}</span>` };
        } catch (e) {
            return { status: 'erro', badge: '' };
        }
    };

    // Chamada ao Backend e Desenho da Polilinha da Rota Real (Google Routes API)
    window.desenharRotaGMaps = async function() {
        if (arrayOrdemRota.length < 2) {
            if (activePolyline && leafletMap) leafletMap.removeLayer(activePolyline);
            const panel = document.getElementById('painel-metricas-viagem');
            if (panel) panel.style.display = 'none';
            return;
        }
        
        const loader = document.getElementById('rota-loader');
        if (loader) loader.style.display = 'block';
        
        let partidaCoords = '';
        const startType = localStorage.getItem('map_start_type') || 'planilha';
        if (navigator.geolocation && startType === 'gps') {
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {timeout: 4000}));
                partidaCoords = `${pos.coords.latitude},${pos.coords.longitude}`;
            } catch (e) {
                console.warn("Falha ao obter sinal de GPS atual. Usando padrão.");
            }
        }

        try {
            const res = await apiPost('calcular_rota_dinamica', null, {
                sequence_ids: arrayOrdemRota,
                start_address: partidaCoords || userConfig.adress_start || '',
                back_address: localStorage.getItem('map_back_type') !== 'none' ? userConfig.adress_back : ''
            });
            
            const parsed = typeof res === 'string' ? JSON.parse(res) : res;
            
            if (parsed.success) {
                currentRouteData = parsed;
                
                // Decodifica a polilinha comprimida enviada pelo Google (suporta única ou array de polilinhas)
                let coords = [];
                if (parsed.polylines && Array.isArray(parsed.polylines)) {
                    parsed.polylines.forEach(p => {
                        const decoded = polyline.decode(p);
                        coords = coords.concat(decoded);
                    });
                } else if (parsed.polyline) {
                    coords = polyline.decode(parsed.polyline);
                }
                const isDark = document.body.classList.contains('dark-theme');
                
                if (activePolyline && leafletMap) leafletMap.removeLayer(activePolyline);
                
                activePolyline = L.polyline(coords, {
                    color: isDark ? '#26a69a' : '#004d40',
                    weight: 6,
                    opacity: 0.9,
                    lineJoin: 'round'
                }).addTo(leafletMap);
                
                leafletMap.fitBounds(activePolyline.getBounds(), { padding: [40, 40] });
                
                // Preenche o painel de métricas
                const metricDist = document.getElementById('metric-distancia');
                if (metricDist) metricDist.innerText = `${parsed.distanciaKmTotal} km`;
                const metricDur = document.getElementById('metric-duracao');
                if (metricDur) metricDur.innerText = `${parsed.tempoMinutosTotal} min`;
                const metricParadas = document.getElementById('metric-paradas');
                if (metricParadas) metricParadas.innerText = arrayOrdemRota.length;

                if (panel) panel.style.display = 'block';
                
                // Recarrega a lista para atualizar ETAs calculados
                renderizarListaClientesArrastavel();
            } else {
                console.error("Erro no retorno da API do Google:", parsed.error, parsed.detalhes);
            }
        } catch (err) {
            console.error("Erro ao calcular rota:", err);
        } finally {
            if (loader) loader.style.display = 'none';
        }
    };

    // Abre a rota no aplicativo do Google Maps (Deep Link com múltiplas paradas)
    window._abrirRotaMultiParadaNoGMaps = function() {
        if (arrayOrdemRota.length === 0) return;
        
        const waypoints = arrayOrdemRota
            .map(id => {
                const c = db.find(x => x.ID.toString().trim() === id.toString().trim());
                if (!c) return null;
                if (c.lat && c.long) {
                    let lat = c.lat;
                    let lon = c.long;
                    if (Math.abs(lat) > 90) lat = lat / 10000000;
                    if (Math.abs(lon) > 180) lon = lon / 10000000;
                    return `${lat},${lon}`;
                }
                return encodeURIComponent(`${c.Endereco}, ${c.Cidade}`);
            })
            .filter(Boolean);
            
        if (waypoints.length < 2) {
            customAlert("São necessários pelo menos 2 clientes na rota para abrir no GPS.", "Aviso");
            return;
        }
        
        const origin = waypoints[0];
        const destination = waypoints[waypoints.length - 1];
        const midpoints = waypoints.slice(1, -1).join('|');
        
        let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
        if (midpoints) url += `&waypoints=${midpoints}`;
        
        window.open(url, '_blank');
    };

    function getHaversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function renderCharts(visits, clients) {

        }

        }
        
        const dayCounts = { 'SEG': 0, 'TER': 0, 'QUA': 0, 'QUI': 0, 'SEX': 0, 'SAB': 0 };
        const getDayCodeFromDateObj = (d) => {
            const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
            return days[d.getDay()];
        };

        visits.forEach(v => {
            let dayCode = '';
            if (v && v.Dia_Visita) {
                dayCode = v.Dia_Visita.toUpperCase().trim();
            } else if (v && v.Data) {
                const d = parseDate(v.Data);
                if (!isNaN(d.getTime())) {
                    dayCode = getDayCodeFromDateObj(d);
                }
            }
            if (dayCode && dayCounts[dayCode] !== undefined) {
                dayCounts[dayCode]++;
            }
        });
        
        const cityCounts = {};
        clients.forEach(c => {
            if (c && c.Cidade) {
                const city = c.Cidade.trim();
                cityCounts[city] = (cityCounts[city] || 0) + 1;
            }
        });
        
        const sortedCities = Object.entries(cityCounts).sort((a,b) => b[1] - a[1]).slice(0, 5);
        const cityLabels = sortedCities.map(x => x[0]);
        const cityValues = sortedCities.map(x => x[1]);

        const year = parseInt(parts[0]);
        const month = parseInt(parts[1]);
        
        let monthList = [];

            let m = month - i;
            let y = year;
            if (m <= 0) {
                m += 12;
                y -= 1;
            }
            const mStr = String(m).padStart(2, '0');
            monthList.push(`${y}-${mStr}`);
        }
        
        const monthRates = monthList.map(anoMes => {
            const positivadosCount = db.filter(c => {
                const rec = positivacoesDb.find(p => p.ID.toString().trim() === c.ID.toString().trim() && p.Ano_Mes === anoMes);
                return rec && (parseInt(rec.Count_Pedidos) || 0) > 0;

    // Submissão do formulário de Login
    async function handleLoginSubmit(event) {
        event.preventDefault();
        const user = document.getElementById('login-username').value.trim();
        const psw = document.getElementById('login-password').value.trim();
        
        document.getElementById('login-btn-text').innerText = 'Validando...';
        document.getElementById('login-btn-spinner').style.display = 'inline-block';
        document.querySelector('#login-form button[type="submit"]').disabled = true;
        document.getElementById('login-alert').style.display = 'none';
        
        try {
            const resp = await fetch(`${API_URL}?user=${encodeURIComponent(user)}&psw=${encodeURIComponent(psw)}`);
            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch (err) {
                console.error("Resposta do servidor não-JSON:", text);
                throw new Error("Resposta inválida (não é JSON). Verifique a implantação do Apps Script.");
            }
            
            if (res && res.error === 'unauthorized') {
                document.getElementById('login-alert').innerText = 'Usuário ou senha incorretos.';
                document.getElementById('login-alert').style.display = 'block';
            } else {
                localStorage.setItem('pref_user', user);
                localStorage.setItem('pref_psw', psw);
                hideLoginScreen();
                
                if (res && res.clients) {
                    db = res.clients;
                    visitsDb = res.visits || [];
                    playbookDb = res.brain || [];
                    positivacoesDb = res.positivacoes || [];
                    userConfig = res.userConfig || { adress_start: '', adress_back: '' };
                } else {
                    db = res;
                    visitsDb = [];
                    playbookDb = [];
                    positivacoesDb = [];
                    userConfig = { adress_start: '', adress_back: '' };
                }
                
                localStorage.setItem('cached_db', JSON.stringify(db));
                localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
                localStorage.setItem('cached_playbook', JSON.stringify(playbookDb));
                localStorage.setItem('cached_positivacoes', JSON.stringify(positivacoesDb));
                localStorage.setItem('cached_user_config', JSON.stringify(userConfig));
                
                popularCidades();
                updateSemEnderecoBadge();
                render();
            }
        } catch (e) {
            console.error(e);
            document.getElementById('login-alert').innerText = `Erro: ${e.message}. Verifique a conexão, o console F12 ou se implantou como "Qualquer pessoa" (Anyone).`;
            document.getElementById('login-alert').style.display = 'block';

    // Carregar dados via Fetch API (com autenticação e suporte a cache local)
    async function load() {
        // Inicializar configurações padrão do mapa no localStorage se não existirem
        if (localStorage.getItem('map_start_type') === null) {
            localStorage.setItem('map_start_type', 'gps');
        }
        if (localStorage.getItem('map_back_type') === null) {
            localStorage.setItem('map_back_type', 'planilha');
        }
        if (localStorage.getItem('map_omit_whats') === null) {
            localStorage.setItem('map_omit_whats', 'true');
        }

        const user = localStorage.getItem('pref_user');
        const psw = localStorage.getItem('pref_psw');
        if (!user || !psw) {
            showLoginScreen();
            return;
        }
        
        const CACHE_VERSION = 'v2_safe_coords';
        if (localStorage.getItem('cache_version') !== CACHE_VERSION) {
            localStorage.removeItem('coords_cache');
            localStorage.removeItem('cached_db');
            localStorage.setItem('cache_version', CACHE_VERSION);
            console.log('[CACHE] Cache de coordenadas limpo — migração v2_safe_coords aplicada.');
        }
        
        // Carregamento instantâneo do cache se disponível
        const cachedDb = localStorage.getItem('cached_db');
        const cachedVisits = localStorage.getItem('cached_visits');
        const cachedPlaybook = localStorage.getItem('cached_playbook');
        const cachedPositivacoes = localStorage.getItem('cached_positivacoes');
        const cachedUserConfig = localStorage.getItem('cached_user_config');
        let cacheLoaded = false;
        if (cachedDb) {
            try {
                db = JSON.parse(cachedDb);
                visitsDb = cachedVisits ? JSON.parse(cachedVisits) : [];
                playbookDb = cachedPlaybook ? JSON.parse(cachedPlaybook) : [];
                positivacoesDb = cachedPositivacoes ? JSON.parse(cachedPositivacoes) : [];
                userConfig = cachedUserConfig ? JSON.parse(cachedUserConfig) : { adress_start: '', adress_back: '' };
                popularCidades();
                updateSemEnderecoBadge();
                render();
                cacheLoaded = true;
                hideLoginScreen();
            } catch (err) {
                console.error("Erro ao ler cache local:", err);
            }
        }
        
        // Se não tiver cache, exibe o spinner principal
        if (!cacheLoaded) {
            toggleLoader(true);
        }
        
        try {
            const resp = await fetch(`${API_URL}?user=${encodeURIComponent(user)}&psw=${encodeURIComponent(psw)}`);
            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch (err) {
                console.error("Resposta do servidor não-JSON no load:", text);
                throw new Error("Resposta inválida (não é JSON). Verifique a implantação.");
            }
            
            if (res && res.error === 'unauthorized') {
                localStorage.removeItem('pref_user');
                localStorage.removeItem('pref_psw');
                showLoginScreen("Sessão expirada ou senha alterada. Faça login novamente.");
                toggleLoader(false);
                return;
            }
            
            hideLoginScreen();
            
            if (res && res.clients) {
                db = res.clients;
                visitsDb = res.visits || [];
                playbookDb = res.brain || [];
                positivacoesDb = res.positivacoes || [];
                userConfig = res.userConfig || { adress_start: '', adress_back: '' };
            } else {
                db = res;
                visitsDb = [];
                playbookDb = [];
                positivacoesDb = [];
                userConfig = { adress_start: '', adress_back: '' };
            }
            
            // Salvar no cache local
            localStorage.setItem('cached_db', JSON.stringify(db));
            localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
            localStorage.setItem('cached_playbook', JSON.stringify(playbookDb));
            localStorage.setItem('cached_positivacoes', JSON.stringify(positivacoesDb));
            localStorage.setItem('cached_user_config', JSON.stringify(userConfig));
            
            popularCidades();
            updateSemEnderecoBadge();
            render();
            
            // Se estávamos com indicador de erro de rede, limpa
            updateConnectionBadge(true);
        } catch (e) { 
            console.error(e);
            if (cacheLoaded) {
                // Se já carregou o cache, não bloqueia o usuário com um alert incômodo,
                // apenas atualiza o badge para offline.
                updateConnectionBadge(false);
            } else {
                customAlert(`Erro ao conectar com o banco de dados: ${e.message}`); 
            }
        }
        toggleLoader(false);
    }

    // APIS: VIACEP E BRASILAPI/RECEITAWS (CNPJ)
    // ============================================
    // Helper para requisição JSONP para contornar CORS do ReceitaWS
    function fetchJSONP(url) {
        return new Promise((resolve, reject) => {
            const callbackName = 'receitaws_callback_' + Math.floor(Math.random() * 1000000);
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.onerror = function(err) {
                delete window[callbackName];
                if (script.parentNode) document.body.removeChild(script);
                reject(err);
            };
            document.body.appendChild(script);
            
            // Timeout de 5 segundos
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    if (script.parentNode) document.body.removeChild(script);
                    reject(new Error("Timeout de conexão"));
                }
            }, 5000);
        });
    }

    async function queryCNPJ(cnpjRaw, ignoreAlerts = false) {
        const cnpj = getCleanCnpj(cnpjRaw);
        if (cnpj.length !== 14 || cnpj === '00000000000000') {
            if (!ignoreAlerts) customAlert("CNPJ inválido. Verifique o número digitado.");
            return null;
        }
        toggleLoader(true);
        
        // 1. Tenta ReceitaWS via JSONP (limite: 3 req/min)
        try {
            const data = await fetchJSONP(`https://receitaws.com.br/v1/cnpj/${cnpj}`);
            if (!data || data.status === 'ERROR') {
                throw new Error(data ? data.message : "Erro na resposta do ReceitaWS");
            }
            return {
                source: 'receitaws',
                razao_social: data.nome,
                nome_fantasia: data.fantasia || data.nome,
                logradouro: data.logradouro,
                numero: data.numero,
                complemento: data.complemento,
                bairro: data.bairro,
                municipio: data.municipio,
                uf: data.uf,
                cep: data.cep ? data.cep.replace(/\D/g, '') : '',
                ddd_telefone_1: data.telefone ? data.telefone.split('/')[0].replace(/\D/g, '') : '',
                data_abertura: data.abertura,
                situacao: data.situacao,
                capital_social: data.capital_social,
                qsa: data.qsa ? data.qsa.map(s => ({ nome: s.nome, qual: s.qual })) : [],
                cnpj: data.cnpj ? data.cnpj.replace(/\D/g, '') : cnpj
            };
        } catch (e) {
            console.warn("Falha no ReceitaWS (ou limite excedido), tentando BrasilAPI...", e);
            // 2. Fallback para BrasilAPI
            try {
                const resp = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
                if (!resp.ok) throw new Error("CNPJ não encontrado no BrasilAPI.");
                const data = await resp.json();
                return {
                    source: 'brasilapi',
                    razao_social: data.razao_social,
                    nome_fantasia: data.nome_fantasia || data.razao_social,
                    descricao_tipo_de_logradouro: data.descricao_tipo_de_logradouro,
                    logradouro: data.logradouro,
                    numero: data.numero,
                    complemento: data.complemento,
                    bairro: data.bairro,
                    municipio: data.municipio,
                    uf: data.uf,
                    cep: data.cep ? data.cep.replace(/\D/g, '') : '',
                    ddd_telefone_1: data.ddd_telefone_1 || '',
                    data_abertura: data.data_abertura,
                    situacao: data.descricao_situacao_cadastral,
                    capital_social: data.capital_social,
                    qsa: data.qsa ? data.qsa.map(s => ({ nome: s.nome_socio || s.nome, qual: s.qualificacao_socio || s.qual })) : [],
                    cnpj: data.cnpj ? data.cnpj.replace(/\D/g, '') : cnpj
                };
            } catch (err) {
                if (!ignoreAlerts) customAlert("Erro ao buscar CNPJ (ReceitaWS e BrasilAPI falharam): " + err.message);
                return null;
            }
        } finally {
            toggleLoader(false);
        }
    }

    async function queryCEP(cepRaw) {
        const cep = String(cepRaw || '').replace(/\D/g, '');
        if (cep.length !== 8) {
            customAlert("CEP inválido. Digite 8 dígitos.");
            return null;
        }
        toggleLoader(true);
        try {
            const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            if (!resp.ok) throw new Error("CEP não encontrado.");
            const data = await resp.json();
            if (data.erro) {
                customAlert("CEP não localizado.");
                return null;
            }
            return data;
        } catch (e) {
            customAlert("Erro ao buscar CEP: " + e.message);
            return null;
        } finally {
            toggleLoader(false);
        }
    }
