<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Edimar Pro Roteiro</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Font: Outfit (Premium look) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #004d40; 
            --accent: #00796b; 
            --bg: #f4f6f8; 
            --whats: #25d366;
            --gradient: linear-gradient(135deg, #004d40 0%, #00796b 100%);
            --card-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body { 
            background-color: var(--bg); 
            font-family: 'Outfit', 'Segoe UI', Roboto, Helvetica, sans-serif; 
            padding-top: 145px; 
            padding-bottom: 90px; 
            overflow-x: hidden; 
            transition: padding-top 0.3s ease;
        }
        
        /* Cabeçalho App-Style */
        .app-header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            background: var(--gradient); 
            color: white; 
            z-index: 1050; 
            padding: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
        }
        
        .search-container { 
            position: fixed; 
            top: 60px; 
            left: 0; 
            right: 0; 
            background: var(--primary); 
            padding: 10px 15px; 
            z-index: 1040; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
        }
        
        .form-control-search { 
            border-radius: 25px; 
            border: none; 
            padding: 10px 20px; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.08); 
            font-size: 1rem; 
        }
        
        /* Filtros Rápidos Horizontal */
        .filter-row { 
            display: flex; 
            gap: 8px; 
            margin-top: 8px; 
            overflow-x: auto; 
            padding-bottom: 5px; 
            scrollbar-width: none; 
        }
        .filter-row::-webkit-scrollbar { display: none; }
        .filter-select { 
            background: rgba(255,255,255,0.15); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            font-size: 0.75rem; 
            padding: 6px 12px; 
            outline: none; 
            transition: var(--transition);
        }
        .filter-select:focus {
            background: rgba(255,255,255,0.25);
        }
        .filter-select option { color: #333; }
        
        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(65px + env(safe-area-inset-bottom, 0px));
            padding-bottom: env(safe-area-inset-bottom, 0px);
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #e2e8f0;
            box-shadow: 0 -3px 15px rgba(0,0,0,0.04);
            z-index: 1040;
        }
        .nav-item-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: #718096;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 5px;
            flex-grow: 1;
            transition: var(--transition);
            position: relative;
        }
        .nav-item-btn i {
            font-size: 1.25rem;
            margin-bottom: 2px;
            transition: var(--transition);
        }
        .nav-item-btn.active {
            color: var(--primary);
        }
        .nav-item-btn.active i {
            transform: translateY(-2px);
            color: var(--accent);
        }

        /* Card de Cliente Premium */
        .card-client { 
            border: none; 
            border-radius: 18px; 
            background: white; 
            margin-bottom: 15px; 
            box-shadow: var(--card-shadow); 
            position: relative; 
            transition: var(--transition); 
            border-left: 6px solid var(--accent); 
        }
        .card-client.visited-card {
            border-left: 6px solid #28a745 !important;
            background-color: #f7fbf8;
        }
        .card-client.absent-card {
            border-left: 6px solid #ffc107 !important;
            background-color: #fffdf5;
        }
        /* CORREÇÃO DO BUG: O card-client não escala mais ao clicar, evitando deslocamento de botões */
        .card-client:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        .card-body { padding: 15px; }
        
        .client-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .id-badge { font-size: 0.65rem; font-weight: 800; color: #718096; background: #edf2f7; padding: 3px 8px; border-radius: 5px; }
        .ordem-badge { background: #e0f2f1; color: var(--primary); font-weight: 800; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .ordem-whats { background: #fff8e1; color: #f57c00; }
        .visitado-badge { background: #d4edda; color: #155724; font-weight: 800; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; }
        .visitado-badge.absent-badge { background: #fff3cd; color: #856404; }

        .client-fantasia { font-size: 1.1rem; font-weight: 700; color: var(--primary); line-height: 1.2; }
        .client-razao { font-size: 0.8rem; color: #718096; margin-bottom: 10px; font-style: italic; display: block; }
        
        .info-box { background: #f8fafc; border-radius: 12px; padding: 12px; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border: 1px solid #edf2f7; }
        .info-item { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #2d3748; }
        .info-item i { color: var(--accent); font-size: 0.9rem; width: 16px; text-align: center; }
        .full-width { grid-column: span 2; }

        .obs-tag { background: #fffdf0; border-left: 3px solid #ffcc00; padding: 8px 12px; font-size: 0.8rem; border-radius: 6px; margin-top: 12px; color: #856404; font-weight: 500; }

        /* Ações Rápidas Mobile */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-circle { height: 48px; border-radius: 14px; border: none; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: var(--transition); color: white; }
        .btn-wa { background: var(--whats); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
        .btn-gps { background: #4285f4; box-shadow: 0 4px 12px rgba(66, 133, 244, 0.2); }
        .btn-copy { background: #4a5568; font-size: 1rem; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.15); }
        .btn-edit { background: #e2e8f0; color: var(--primary); font-size: 1.1rem; }
        
        /* Efeito de toque individual nos botões */
        .btn-circle:active { transform: scale(0.9); }
        .btn-circle.copied { background: var(--primary) !important; }

        /* Floating Button */
        .fab { position: fixed; bottom: calc(85px + env(safe-area-inset-bottom, 0px)); right: 25px; width: 60px; height: 60px; background: var(--gradient); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 6px 16px rgba(0,77,64,0.3); border: none; z-index: 1000; transition: var(--transition); }
        .fab:active { transform: scale(0.9); }
        
        /* Loader */
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.92); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        
        /* Modais Customizados */
        .modal-content-rounded { border-radius: 24px !important; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Checklist View Styles */
        .chk-card { border-left-color: #4a5568; }
        .chk-card.visited { border-left-color: #25d366; background-color: #f0fdf4; }
        .chk-card.absent { border-left-color: #ffc107; background-color: #fffdf5; }
        .chk-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; transition: var(--transition); background: none; }
        
        /* Dashboard View Styles */
        .dash-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 15px; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .dash-stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .dash-stat-box { background: white; padding: 12px 8px; border-radius: 14px; text-align: center; box-shadow: var(--card-shadow); border: 1px solid #edf2f7; }
        .dash-stat-num { font-size: 1.4rem; font-weight: 800; color: var(--primary); }
        .dash-stat-label { font-size: 0.65rem; color: #718096; text-transform: uppercase; font-weight: 700; margin-top: 2px; }
        .dash-list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #edf2f7; }
        .dash-list-item:last-child { border-bottom: none; }

        /* Estilo dos Badges Interativos para Checklist no Roteiro */
        .ordem-badge, .visitado-badge {
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .ordem-badge:hover {
            filter: brightness(0.9);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0, 77, 64, 0.1);
        }
        .visitado-badge:hover {
            filter: brightness(0.95);
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(37, 211, 102, 0.1);
        }
        .ordem-badge:active, .visitado-badge:active {
            transform: translateY(0) scale(0.97);
        }
    </style>
</head>
<body>

<!-- Loader Overlay -->
<div id="loader" class="loading-overlay">
    <div class="spinner-grow text-success" style="width: 3rem; height: 3rem;"></div>
    <div class="mt-3 fw-bold text-success">Carregando Roteiro...</div>
</div>

<!-- Tela de Login de Acesso Restrito -->
<div id="login-screen" class="position-fixed top-0 start-0 w-100 h-100 d-none align-items-center justify-content-center" style="background: var(--gradient); z-index: 9999;">
    <div class="card shadow-lg border-0 m-3 modal-content-rounded text-dark" style="max-width: 400px; width: 100%;">
        <div class="card-body p-4 text-center">
            <div class="mb-4">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 70px; height: 70px; background: rgba(0, 121, 107, 0.1);">
                    <i class="fas fa-lock text-success" style="font-size: 2rem;"></i>
                </div>
                <h4 class="fw-bold mb-1 text-primary">Acesso Restrito</h4>
                <p class="text-muted small">Roteiro Edimar Pro</p>
            </div>
            
            <div id="login-alert" class="alert alert-danger py-2 px-3 small rounded-pill mb-3" style="display: none;"></div>
            
            <form id="login-form" onsubmit="handleLoginSubmit(event)">
                <div class="mb-3 text-start">
                    <label class="form-label small text-muted fw-bold ps-2 mb-1">USUÁRIO</label>
                    <input type="text" id="login-username" class="form-control rounded-pill border-0 shadow-sm px-3" style="background: #f1f5f9; height: 45px;" required placeholder="Ex: edimar">
                </div>
                <div class="mb-4 text-start">
                    <label class="form-label small text-muted fw-bold ps-2 mb-1">SENHA DE ACESSO</label>
                    <input type="password" id="login-password" class="form-control rounded-pill border-0 shadow-sm px-3" style="background: #f1f5f9; height: 45px;" required placeholder="Digite sua senha...">
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2.5 fw-bold shadow-sm" style="height: 45px; background-color: var(--accent); border: none;">
                    <span id="login-btn-text">Entrar no Sistema</span>
                    <span id="login-btn-spinner" class="spinner-border spinner-border-sm ms-2" style="display: none;"></span>
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Cabeçalho Principal -->
<div class="app-header">
    <div class="d-flex justify-content-between align-items-center w-100">
        <h5 class="mb-0 fw-bold"><i class="fas fa-bolt me-2 text-warning"></i>ROTA EDIMAR</h5>
        <div class="d-flex align-items-center gap-2">
            <button class="btn btn-sm text-white p-1" onclick="resetPreferences()" title="Resetar Apps WhatsApp/GPS" id="btn-settings">
                <i class="fas fa-cog" style="font-size: 1.1rem;"></i>
            </button>
            <button class="btn btn-sm text-white p-1" onclick="logout()" title="Sair do Sistema" id="btn-logout">
                <i class="fas fa-sign-out-alt" style="font-size: 1.1rem;"></i>
            </button>
            <span id="counter" class="badge bg-white text-dark rounded-pill">...</span>
        </div>
    </div>
</div>

<!-- Filtros Rápidos (Apenas na aba Roteiro) -->
<div class="search-container shadow-sm" id="top-search-bar">
    <input type="text" id="search" class="form-control form-control-search shadow-sm" placeholder="Buscar Nome, Cód, Bairro ou CNPJ...">
    <div class="filter-row">
        <input type="date" id="roteiroDate" class="filter-select" style="min-width: 125px; color-scheme: dark;" title="Data da Visita">
        <select id="fVisita" class="filter-select"><option value="">Dia Visita</option><option value="SEG">SEG</option><option value="TER">TER</option><option value="QUA">QUA</option><option value="QUI">QUI</option><option value="SEX">SEX</option></select>
        <select id="fEntrega" class="filter-select"><option value="">Dia Entrega</option><option value="SEG">SEG</option><option value="TER">TER</option><option value="QUA">QUA</option><option value="QUI">QUI</option><option value="SEX">SEX</option></select>
        <select id="fCidade" class="filter-select"><option value="">Cidade</option></select>
    </div>
</div>

<!-- Container do Conteúdo Principal -->
<div class="container mt-2" id="lista"></div>

<!-- Botão Flutuante de Adicionar Cliente -->
<button class="fab" id="btn-fab" onclick="abrirForm()"><i class="fas fa-plus"></i></button>

<!-- BOTTOM NAVIGATION BAR -->
<div class="bottom-nav">
    <button class="nav-item-btn active" id="btn-tab-roteiro" onclick="switchTab('roteiro')">
        <i class="fas fa-route"></i>
        <span>Roteiro</span>
    </button>
    <button class="nav-item-btn" id="btn-tab-checklist" onclick="switchTab('checklist')">
        <i class="fas fa-tasks"></i>
        <span>Checklist</span>
    </button>
    <button class="nav-item-btn" id="btn-tab-dashboard" onclick="switchTab('dashboard')">
        <i class="fas fa-chart-pie"></i>
        <span>Indicadores</span>
    </button>
    <button class="nav-item-btn" id="btn-tab-endereco" onclick="switchTab('endereco')">
        <i class="fas fa-map-pin"></i>
        <span>Sem Endereço</span>
        <span class="badge bg-danger rounded-pill position-absolute" id="badge-sem-end" style="top: 5px; right: 15px; font-size: 0.65rem; display: none;">0</span>
    </button>
</div>

<!-- MODAL FORMULÁRIO CLIENTE -->
<div class="modal fade" id="modalForm" tabindex="-1">
  <div class="modal-dialog modal-fullscreen-sm-down modal-dialog-centered">
    <div class="modal-content modal-content-rounded">
      <div class="modal-header border-0 pb-0">
        <h6 class="fw-bold mb-0 text-success"><i class="fas fa-user-edit me-2"></i>DADOS DO CLIENTE</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-2">
        <form id="clienteForm">
          <div class="row g-2">
            <div class="col-4"><label class="small text-muted fw-bold">ID CLIENTE</label><input type="text" id="f-id" class="form-control rounded-3"></div>
            <div class="col-8"><label class="small text-muted fw-bold">FANTASIA</label><input type="text" id="f-fant" class="form-control rounded-3"></div>
            <div class="col-12"><label class="small text-muted fw-bold">RAZÃO SOCIAL</label><input type="text" id="f-cli" class="form-control rounded-3"></div>
            <div class="col-6"><label class="small text-muted fw-bold">COMPRADOR</label><input type="text" id="f-comp" class="form-control rounded-3"></div>
            <div class="col-6"><label class="small text-muted fw-bold">WHATSAPP</label><input type="text" id="f-whats" class="form-control rounded-3" placeholder="DDD + Número"></div>
            
            <div class="col-12 mt-2 pt-1 border-top">
              <label class="small text-success fw-bold"><i class="fas fa-search me-1"></i>AUTOCOMPLETAR ENDEREÇO</label>
            </div>
            <!-- Campo auxiliar de busca CEP no formulário -->
            <div class="col-12">
              <div class="input-group input-group-sm">
                <input type="text" id="f-cep-helper" class="form-control" placeholder="Buscar endereço pelo CEP...">
                <button class="btn btn-dark" type="button" onclick="buscarCEPForm()"><i class="fas fa-search"></i> Buscar CEP</button>
              </div>
            </div>
            
            <div class="col-12">
              <label class="small text-muted fw-bold">CNPJ</label>
              <div class="input-group input-group-sm">
                <input type="text" id="f-cnpj" class="form-control" placeholder="CNPJ apenas números">
                <button class="btn btn-dark" type="button" onclick="buscarCNPJForm()"><i class="fas fa-building"></i> Consultar CNPJ</button>
              </div>
            </div>

            <div class="col-12"><label class="small text-muted fw-bold">ENDEREÇO COMPLETO</label><input type="text" id="f-end" class="form-control rounded-3"></div>
            <div class="col-7"><label class="small text-muted fw-bold">CIDADE</label><input type="text" id="f-cid" class="form-control rounded-3"></div>
            <div class="col-5"><label class="small text-muted fw-bold">ORDEM ROTEIRO</label><input type="number" id="f-ord" class="form-control rounded-3"></div>
            <div class="col-6"><label class="small text-muted fw-bold">VISITA (Ex: TER, QUA)</label><input type="text" id="f-vis" class="form-control rounded-3"></div>
            <div class="col-6"><label class="small text-muted fw-bold">ENTREGA</label><input type="text" id="f-ent" class="form-control rounded-3"></div>
            <div class="col-6"><label class="small text-muted fw-bold">H. ABERTURA (Ex: 08:00-18:00)</label><input type="text" id="f-hab" class="form-control rounded-3" placeholder="Ex: 08:00 - 18:00"></div>
            <div class="col-6"><label class="small text-muted fw-bold">H. VISITA (Ex: 10:00-11:00)</label><input type="text" id="f-hvis" class="form-control rounded-3" placeholder="Ex: 10:00 - 11:00"></div>
            <div class="col-12"><label class="small text-muted fw-bold">OBSERVAÇÕES</label><textarea id="f-obs" class="form-control rounded-3" rows="2"></textarea></div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-0 p-3 flex-column">
        <button type="button" class="btn btn-success w-100 py-3 rounded-pill fw-bold mb-2 shadow-sm" onclick="salvar()">SALVAR NA PLANILHA</button>
        <button type="button" class="btn btn-outline-danger w-100 py-2 rounded-pill small border-0" onclick="excluir()">EXCLUIR CLIENTE</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CHOOSER WHATSAPP -->
<div class="modal fade" id="modalWhatsapp" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-content-rounded">
      <div class="modal-header border-0 pb-0">
        <h6 class="fw-bold mb-0 text-success"><i class="fab fa-whatsapp me-2" style="font-size: 1.3rem;"></i>COMO DESEJA ABRIR?</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center pt-3">
        <div id="wa-client-name" class="fw-bold text-dark mb-3"></div>
        <div class="d-grid gap-2 px-2">
          <button class="btn btn-success py-2 rounded-pill fw-bold shadow-sm" onclick="abrirWaOpcao('standard')">
            <i class="fab fa-whatsapp me-2"></i>WhatsApp Normal / Dual
          </button>
          <button class="btn btn-primary py-2 rounded-pill fw-bold shadow-sm" style="background-color: #0084ff; border: none;" onclick="abrirWaOpcao('business')">
            <i class="fab fa-whatsapp me-2"></i>WhatsApp Business
          </button>
          <button class="btn btn-secondary py-2 rounded-pill fw-bold" onclick="abrirWaOpcao('web')">
            <i class="fas fa-globe me-2"></i>WhatsApp Web (Navegador)
          </button>
        </div>
        <div class="form-check mt-3 d-flex justify-content-center">
          <input class="form-check-input me-2" type="checkbox" id="wa-remember">
          <label class="form-check-label small text-muted" for="wa-remember">Lembrar minha escolha</label>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CHOOSER GPS -->
<div class="modal fade" id="modalGps" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content modal-content-rounded">
      <div class="modal-header border-0 pb-0">
        <h6 class="fw-bold mb-0 text-primary"><i class="fas fa-location-arrow me-2"></i>ABRIR NAVEGADOR GPS</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center pt-3">
        <div id="gps-client-name" class="fw-bold text-dark mb-3" style="font-size: 0.95rem;"></div>
        <div class="d-grid gap-2 px-2">
          <button class="btn btn-primary py-2 rounded-pill fw-bold shadow-sm" style="background-color: #4285f4; border: none;" onclick="abrirGpsOpcao('maps')">
            <i class="fas fa-map-marked-alt me-2"></i>Google Maps
          </button>
          <button class="btn btn-warning py-2 rounded-pill fw-bold text-white shadow-sm" style="background-color: #f57c00; border: none;" onclick="abrirGpsOpcao('waze')">
            <i class="fab fa-waze me-2"></i>Waze
          </button>
          <button class="btn btn-secondary py-2 rounded-pill fw-bold shadow-sm" id="btn-apple-maps" style="display: none;" onclick="abrirGpsOpcao('apple')">
            <i class="fab fa-apple me-2"></i>Apple Maps
          </button>
        </div>
        <div class="form-check mt-3 d-flex justify-content-center">
          <input class="form-check-input me-2" type="checkbox" id="gps-remember">
          <label class="form-check-label small text-muted" for="gps-remember">Lembrar minha escolha</label>
        </div>
      </div>
    </div>
  </div>

    function toggleLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }

    // Limpa complementos do endereço para navegação (evitando quebrar o GPS)
    function cleanAddressForGps(address) {
        if (!address) return '';
        const parts = address.split('-');
        if (parts.length <= 2) return address;
        
        const cleanedParts = parts.filter((part, index) => {
            if (index === 0 || index === parts.length - 1) return true;
            const p = part.toLowerCase();
            if (p.includes('sala') || p.includes('loja') || p.includes('apto') || 
                p.includes('apt') || p.includes('bloc') || p.includes('andar') || 
                p.includes('fundo') || p.includes('casa') || p.includes('sl ') ||
                p.includes('lj ') || /^\s*\d+\s*$/.test(part)) { 
                return false;
            }
            return true;
        });
        return cleanedParts.map(p => p.trim()).join(' - ');
    }

    // Formatar CNPJ com máscara
    function formatCnpj(v) {
        if (!v) return '';
        v = v.toString().replace(/\D/g,"").replace(".0","");
        if(v.length == 14) v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
        return v;
    }

    // Formatar Telefone com máscara
    function formatPhone(v) {
        if (!v) return '';
        v = v.toString().replace(/\D/g,"");
        if (v.length === 11) {
            return `(${v.substring(0,2)}) ${v.substring(2,7)}-${v.substring(7)}`;
        } else if (v.length === 10) {
            return `(${v.substring(0,2)}) ${v.substring(2,6)}-${v.substring(6)}`;
        }
        return v;
    }

    // Retorna a abreviação do dia da semana em português
    function getTodayCode() {
        const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
        return days[new Date().getDay()];
    }

    // Nome completo do dia para exibição
    function getTodayFullString() {
        const days = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
        return days[new Date().getDay()];
    }

    // Parse de data robusto que aceita objetos Date, strings ISO e formato pt-BR
    function parseDate(dateInput) {
        if (!dateInput) return new Date(NaN);
        if (dateInput instanceof Date) return isNaN(dateInput.getTime()) ? new Date(NaN) : dateInput;
        
        let d = new Date(dateInput);
        if (!isNaN(d.getTime())) return d;
        
        const str = dateInput.toString().trim();
        // Tenta pt-BR "DD/MM/YYYY HH:MM:SS" ou "DD/MM/YYYY"
        const parts = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})(?:\s+(\d{1,2}):(\d{2}):?(\d{2})?)?/);
        if (parts) {
            const day = parseInt(parts[1], 10);
            const month = parseInt(parts[2], 10) - 1;
            const year = parseInt(parts[3], 10);
            const hour = parts[4] ? parseInt(parts[4], 10) : 0;
            const minute = parts[5] ? parseInt(parts[5], 10) : 0;
            const second = parts[6] ? parseInt(parts[6], 10) : 0;
            return new Date(year, month, day, hour, minute, second);
        }
        return new Date(NaN);
    }

    // Retorna o status da visita em uma data específica ('Visita', 'Não Encontrado' ou null)
    function getVisitStatusOnDate(clientId, dateStr) {
        if (!clientId) return null;
        if (!dateStr) dateStr = getLocalDateStr();
        const parts = dateStr.split('-');
        const targetDate = new Date(parts[0], parts[1] - 1, parts[2]);
        if (isNaN(targetDate.getTime())) return null;
        const targetDateStr = targetDate.toDateString();
        
        const dayVisits = visitsDb.filter(v => {
            if (!v || !v.ID || !v.Data) return false;
            const d = parseDate(v.Data);
            return v.ID.toString().trim() === clientId.toString().trim() && !isNaN(d.getTime()) && d.toDateString() === targetDateStr;
        });
        
        if (dayVisits.length === 0) return null;
        
        dayVisits.sort((a, b) => parseDate(b.Data) - parseDate(a.Data));
        return dayVisits[0].Status || 'Visita';
    }

    // Verifica se o cliente foi visitado hoje (com status 'Visita')
    function isVisitedToday(clientId) {
        return getVisitStatusOnDate(clientId, getLocalDateStr()) === 'Visita';
    }

    // Verifica se o cliente foi visitado ou marcado como não encontrado em uma data específica ('YYYY-MM-DD')
    function isVisitedOnDate(clientId, dateStr) {
        return getVisitStatusOnDate(clientId, dateStr) !== null;
    }

    // Retorna o código do dia ('SEG', 'TER', etc.) para uma data 'YYYY-MM-DD'
    function getDayCodeForDate(dateStr) {
        if (!dateStr) return '';
        const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SAB'];
        const parts = dateStr.split('-');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);

    }

        const parts = dateStr.split('-');
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        return days[d.getDay()];
    }

    // Normaliza hora escrita para formato comparável 'HH:MM'
    function normalizeTime(timeStr) {
        if (!timeStr) return "";
        const match = timeStr.toString().match(/(\d{1,2}):(\d{2})/);
        if (!match) return "";
        const h = match[1].padStart(2, '0');
        const m = match[2];
        return `${h}:${m}`;
    }

    // Alerta o usuário se o cliente estiver fora do horário de funcionamento ou se o horário da visita não chegou
    async function checkHoursAlert(client, actionName) {
        const now = new Date();
        const curHourStr = now.toTimeString().substring(0, 5); // "HH:MM"
        
        let warnings = [];
        
        // 1. Verificar HAbertura
        if (client.HAbertura && client.HAbertura.toString().trim()) {
            const hab = client.HAbertura.toString().trim();
            const parts = hab.split(/[-–—至às]/).map(p => p.trim());
            if (parts.length >= 1) {
                const openTime = normalizeTime(parts[0]);
                const closeTime = normalizeTime(parts[1]) || "23:59";
                
                if ((openTime && curHourStr < openTime) || (closeTime && curHourStr > closeTime)) {
                    warnings.push(`⚠️ O cliente pode estar FECHADO agora (Horário de funcionamento: ${hab}).`);
                }
            }
        }
        
        // 2. Verificar Hvisita
        if (client.Hvisita && client.Hvisita.toString().trim()) {
            const hvis = client.Hvisita.toString().trim();
            const parts = hvis.split(/[-–—至às]/).map(p => p.trim());
            if (parts.length >= 1) {
                const visitTime = normalizeTime(parts[0]);
                if (visitTime && curHourStr < visitTime) {
                    warnings.push(`⏳ O horário programado de visita ainda não chegou (Visita programada para: ${hvis}).`);
                }
            }
        }
        
        if (warnings.length > 0) {
            return await customConfirm(`${warnings.join('\n')}\n\nDeseja prosseguir com o ${actionName} mesmo assim?`, "Aviso de Horário");
        }
        
        return true;
    }

    // Retorna data da última visita formatada
    function getLastVisitDateStr(clientId) {
        if (!clientId) return 'Nunca visitado';
        const clientVisits = visitsDb
            .filter(v => v && v.ID && v.Data && v.ID.toString().trim() === clientId.toString().trim() && (!v.Status || v.Status === 'Visita'))
            .map(v => parseDate(v.Data))
            .filter(d => d && !isNaN(d.getTime()))
            .sort((a, b) => b - a);
        if (clientVisits.length === 0) return 'Nunca visitado';
        const last = clientVisits[0];
        try {
            return last.toLocaleDateString('pt-BR') + ' ' + last.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        } catch (e) {
            return 'Data inválida';
        }
    }

        const psw = document.getElementById('login-password').value.trim();

            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch (err) {
                console.error("Resposta do servidor não-JSON:", text);
                throw new Error("Resposta inválida (não é JSON). Verifique a implantação do Apps Script.");
            }
            
            if (res && res.error === 'unauthorized') {
                document.getElementById('login-alert').innerText = 'Usuário ou senha incorretos.';
                document.getElementById('login-alert').style.display = 'block';
            } else {
                localStorage.setItem('pref_user', user);

            if (!resp.ok) {
                throw new Error(`HTTP ${resp.status}`);
            }
            const text = await resp.text();
            let res;
            try {
                res = JSON.parse(text);
            } catch (err) {
                console.error("Resposta do servidor não-JSON no load:", text);
                throw new Error("Resposta inválida (não é JSON). Verifique a implantação.");
            }
            
            if (res && res.error === 'unauthorized') {
                localStorage.removeItem('pref_user');
                localStorage.removeItem('pref_psw');

    // ============================================
    // APIS: VIACEP E BRASILAPI/RECEITAWS (CNPJ)
    // ============================================
    // Helper para requisição JSONP para contornar CORS do ReceitaWS
    function fetchJSONP(url) {
        return new Promise((resolve, reject) => {
            const callbackName = 'receitaws_callback_' + Math.floor(Math.random() * 1000000);
            window[callbackName] = function(data) {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };
            const script = document.createElement('script');
            script.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + 'callback=' + callbackName;
            script.onerror = function(err) {
                delete window[callbackName];
                if (script.parentNode) document.body.removeChild(script);
                reject(err);
            };
            document.body.appendChild(script);
            
            // Timeout de 5 segundos
            setTimeout(() => {
                if (window[callbackName]) {
                    delete window[callbackName];
                    if (script.parentNode) document.body.removeChild(script);
                    reject(new Error("Timeout de conexão"));
                }
            }, 5000);
        });
    }

    async function queryCNPJ(cnpjRaw) {
        const cnpj = cnpjRaw.replace(/\D/g, '');
        if (cnpj.length !== 14) {
            customAlert("CNPJ inválido. Digite 14 dígitos.");
            return null;
        }
        toggleLoader(true);
        
        // 1. Tenta ReceitaWS via JSONP (limite: 3 req/min)
        try {
            const data = await fetchJSONP(`https://receitaws.com.br/v1/cnpj/${cnpj}`);
            if (!data || data.status === 'ERROR') {
                throw new Error(data ? data.message : "Erro na resposta do ReceitaWS");
            }
            return {
                source: 'receitaws',
                razao_social: data.nome,
                nome_fantasia: data.fantasia || data.nome,
                logradouro: data.logradouro,
                numero: data.numero,
                complemento: data.complemento,
                bairro: data.bairro,
                municipio: data.municipio,
                uf: data.uf,
                cep: data.cep ? data.cep.replace(/\D/g, '') : '',
                ddd_telefone_1: data.telefone ? data.telefone.split('/')[0].replace(/\D/g, '') : ''
            };
        } catch (e) {
            console.warn("Falha no ReceitaWS (ou limite excedido), tentando BrasilAPI...", e);
            // 2. Fallback para BrasilAPI
            try {
                const resp = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`);
                if (!resp.ok) throw new Error("CNPJ não encontrado no BrasilAPI.");
                const data = await resp.json();
                return {
                    source: 'brasilapi',
                    razao_social: data.razao_social,
                    nome_fantasia: data.nome_fantasia || data.razao_social,
                    descricao_tipo_de_logradouro: data.descricao_tipo_de_logradouro,
                    logradouro: data.logradouro,
                    numero: data.numero,
                    complemento: data.complemento,
                    bairro: data.bairro,
                    municipio: data.municipio,
                    uf: data.uf,
                    cep: data.cep ? data.cep.replace(/\D/g, '') : '',
                    ddd_telefone_1: data.ddd_telefone_1 || ''
                };
            } catch (err) {
                customAlert("Erro ao buscar CNPJ (ReceitaWS e BrasilAPI falharam): " + err.message);
                return null;
            }
        } finally {
            toggleLoader(false);
        }
    }

    async function queryCEP(cepRaw) {
        const cep = cepRaw.replace(/\D/g, '');
        if (cep.length !== 8) {
            customAlert("CEP inválido. Digite 8 dígitos.");
            return null;
        }
        toggleLoader(true);
        try {
            const resp = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            if (!resp.ok) throw new Error("CEP não encontrado.");
            const data = await resp.json();
            if (data.erro) {
                customAlert("CEP não localizado.");
                return null;
            }
            return data;
        } catch (e) {
            customAlert("Erro ao buscar CEP: " + e.message);
            return null;
        } finally {
            toggleLoader(false);
        }
    }

    function abrirGpsOpcao(option) {
        if (!currentGpsTarget) return;
        const address = currentGpsTarget.address;
        let url = '';
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if (option === 'maps') {
            if (isAndroid) {
                // Força abertura do Google Maps no Android em modo navegação
                url = `google.navigation:q=${encodeURIComponent(address)}`;
            } else {
                url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
            }
        } else if (option === 'waze') {
            if (isMobile) {
                // Abre o app do Waze diretamente
                url = `waze://?q=${encodeURIComponent(address)}&navigate=yes`;
            } else {
                url = `https://waze.com/ul?q=${encodeURIComponent(address)}&navigate=yes`;
            }
        } else if (option === 'apple') {
            url = `maps://?q=${encodeURIComponent(address)}`;
        }
        
        if (document.getElementById('gps-remember').checked) {
            localStorage.setItem('pref_gps', option);
        }
        
        // CORREÇÃO: Usar window.location.href para links nativos para não abrir abas em branco no celular
        if (url.startsWith('http')) {
            window.open(url, '_blank');
        } else {
            window.location.href = url;
        }
        gpsModal.hide();
    }

    // Registrar ou Remover Visita
    async function toggleVisita(id, event, customDateStr = null, targetStatus = 'Visita') {
        if (event) event.stopPropagation();
        
        const c = db.find(x => x.ID.toString().trim() === id.toString().trim());
        if (!c) return;
        
        const targetDate = customDateStr || document.getElementById('roteiroDate').value || getLocalDateStr();
        const visitStatus = getVisitStatusOnDate(id, targetDate);
        
        const parts = targetDate.split('-');
        const formattedDateForConfirm = `${parts[2]}/${parts[1]}/${parts[0]}`;
        
        if (targetStatus === 'delete') {
            const confirmed = await customConfirm(`Remover a marcação de visita/ausência de "${c.Fantasia || c.Cliente}" em ${formattedDateForConfirm}?`);
            if (confirmed) {
                toggleLoader(true);
                try {
                    await apiPost('delete_visit', { ID: id }, { date: targetDate });
                    
                    // Remove do banco de dados local
                    visitsDb = visitsDb.filter(v => {
                        if (!v || !v.ID || !v.Data) return true;
                        const d = parseDate(v.Data);
                        const targetParts = targetDate.split('-');
                        const targetDateObj = new Date(targetParts[0], targetParts[1] - 1, targetParts[2]);
                        const isMatch = v.ID.toString().trim() === id.toString().trim() && 
                                        !isNaN(d.getTime()) && 
                                        d.toDateString() === targetDateObj.toDateString();
                        return !isMatch;
                    });
                    
                    render();
                } catch (e) {
                    console.error(e);
                    customAlert("Erro ao excluir visita na planilha.");
                }
                toggleLoader(false);
            }
            return;
        }
        
        const msg = targetStatus === 'Não Encontrado' 
            ? `Confirmar que o cliente "${c.Fantasia || c.Cliente}" NÃO foi encontrado em ${formattedDateForConfirm}?`
            : `Confirmar que você visitou "${c.Fantasia || c.Cliente}" em ${formattedDateForConfirm}?`;
            
        const confirmed = await customConfirm(msg);
        if (confirmed) {
            toggleLoader(true);
            try {
                const now = new Date();
                const dateStr = `${parts[2]}/${parts[1]}/${parts[0]} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
                
                await apiPost('record_visit', { ID: id }, { date: dateStr, status: targetStatus });
                
                // Grava localmente para atualizar o estado em tempo real
                visitsDb.push({ ID: id, Data: dateStr, Status: targetStatus });
                render();
            } catch (e) {
                console.error(e);
                customAlert("Erro ao salvar visita na planilha.");
            }
            toggleLoader(false);
        }
    }

                else if (visitStatus === 'Não Encontrado') chkClass = 'absent';
                
                return `
                <div class="card card-client chk-card ${chkClass}" style="margin-bottom:10px;">
                    <div class="card-body py-3 d-flex justify-content-between align-items-center">
                        <div style="max-width: 70%;">
                            <div class="fw-bold text-dark" style="font-size:1.05rem;">${i.Fantasia || i.Cliente}</div>
                            <div class="small text-muted" style="font-size:0.75rem;">
                                Cód: #${i.ID} | Ordem: ${i.Ordem} | Cidade: ${i.Cidade}<br>
                                <i class="far fa-clock me-1 mt-1"></i>Última: ${lastVisit}
                                ${isAbsent ? '<br><b class="text-warning"><i class="fas fa-user-slash me-1"></i>Não Encontrado</b>' : ''}
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            ${visited ?
                                `<button class="chk-btn ${isAbsent ? 'btn-warning text-white border-warning' : 'btn-success text-white border-success'}" onclick="toggleVisita('${i.ID}', event, selectedChecklistDate, 'delete')" style="${isAbsent ? 'background-color: #ffc107;' : ''}">
                                    <i class="fas fa-trash-alt"></i>
                                 </button>` :
                                `<button class="chk-btn btn-outline-success border-success text-success" onclick="toggleVisita('${i.ID}', event, selectedChecklistDate, 'Visita')" title="Marcar Visita">
                                    <i class="fas fa-check"></i>
                                 </button>
                                 <button class="chk-btn btn-outline-warning border-warning text-warning" onclick="toggleVisita('${i.ID}', event, selectedChecklistDate, 'Não Encontrado')" title="Marcar como Ausente" style="color: #b58100; border-color: #ffc107;">
                                    <i class="fas fa-user-slash"></i>
                                 </button>`
                            }
                        </div>
                    </div>
                </div>`;
            }).join('') + '<div style="height: 100px;"></div>';
            
            container.innerHTML = html;
        }
        
        // --- 3. RENDER DASHBOARD / INDICADORES ---
        else if (activeTab === 'dashboard') {
            const todayCode = getTodayCode();
            
            // Total clientes visitados hoje
            const totalVisitedToday = db.filter(i => isVisitedToday(i.ID)).length;
            
            // Total clientes agendados para hoje
            const scheduledToday = db.filter(i => i.Visita.includes(todayCode));
            const visitedScheduledToday = scheduledToday.filter(i => isVisitedToday(i.ID)).length;
            
            // Ranking de Visitas
            const visitCounts = {};
            visitsDb.forEach(v => {
                const id = v.ID.toString().trim();
                visitCounts[id] = (visitCounts[id] || 0) + 1;
            });
            
            // Mais visitados
            const sortedByVisitsDesc = [...db].map(c => {
                return { ...c, count: visitCounts[c.ID.toString().trim()] || 0 };
            }).sort((a,b) => b.count - a.count);
            
            // Menos visitados
            const sortedByVisitsAsc = [...db].map(c => {
                return { ...c, count: visitCounts[c.ID.toString().trim()] || 0 };
            }).sort((a,b) => a.count - b.count);
            
            // Sugestões para Hoje: Agendados para hoje, não visitados hoje (ou marcados como ausentes), ordenados por menor número de visitas total ou data mais antiga
            const suggestions = scheduledToday
                .filter(i => !isVisitedToday(i.ID))
                .map(i => {
                    const status = getVisitStatusOnDate(i.ID, getLocalDateStr());
                    const clientVisits = visitsDb
                        .filter(v => v && v.ID && v.Data && v.ID.toString().trim() === i.ID.toString().trim())
                        .map(v => parseDate(v.Data))
                        .filter(d => d && !isNaN(d.getTime()))
                        .sort((a,b) => b - a);
                    return {
                        ...i,
                        todayStatus: status,
                        totalVisits: visitCounts[i.ID.toString().trim()] || 0,
                        lastVisitDate: clientVisits.length > 0 ? clientVisits[0] : new Date(0)
                    };
                })
                .sort((a,b) => a.totalVisits - b.totalVisits || a.lastVisitDate - b.lastVisitDate)
                .slice(0, 5); // Sugere os 5 mais prioritários
                
            let html = `
            <h5 class="fw-bold text-success mb-3"><i class="fas fa-chart-line me-2"></i>INDICADORES</h5>
            
            <!-- Grid de Estatísticas Rápidas -->
            <div class="dash-stat-grid">
                <div class="dash-stat-box">
                    <div class="dash-stat-num">${db.length}</div>
                    <div class="dash-stat-label">Clientes</div>
                </div>
                <div class="dash-stat-box">
                    <div class="dash-stat-num">${totalVisitedToday}</div>
                    <div class="dash-stat-label">Visitas Hoje</div>
                </div>
                <div class="dash-stat-box">
                    <div class="dash-stat-num">${scheduledToday.length > 0 ? Math.round((visitedScheduledToday/scheduledToday.length)*100) : 0}%</div>
                    <div class="dash-stat-label">Meta Hoje</div>
                </div>
            </div>
            
            <!-- Sugestões de Visitas para Hoje -->
            <div class="dash-card">
                <h6 class="fw-bold text-warning mb-3"><i class="fas fa-lightbulb me-2"></i>SUGESTÕES PARA HOJE (${todayCode})</h6>
                <p class="small text-muted">Clientes programados para hoje que ainda não foram visitados:</p>
                ${suggestions.length === 0 ? `
                <div class="text-center text-muted small py-2"><i class="fas fa-check-circle me-1 text-success"></i>Tudo em dia! Nenhuma sugestão pendente para hoje.</div>
                ` : suggestions.map(i => {
                    const lastVisitStr = i.totalVisits > 0 ? i.lastVisitDate.toLocaleDateString('pt-BR') : 'Nunca visitado';
                    const isAbsentToday = i.todayStatus === 'Não Encontrado';
                    return `
                    <div class="dash-list-item" style="${isAbsentToday ? 'background: #fffdf5; border-left: 4px solid #ffc107; padding-left: 8px;' : ''}">
                        <div>
                            <span class="fw-bold">${i.Fantasia || i.Cliente}</span>
                            ${isAbsentToday ? ' <span class="badge bg-warning text-dark ms-1" style="font-size:0.65rem;"><i class="fas fa-user-slash me-1"></i>Ausente hoje</span>' : ''}<br>
                            <span class="small text-muted">Última visita: ${lastVisitStr} (${i.totalVisits} visitas no total)</span>
                        </div>
                        <button class="btn btn-sm btn-outline-success rounded-pill px-3" onclick="toggleVisita('${i.ID}', event)">
                            <i class="fas fa-check me-1"></i>Visitar
                        </button>
                    </div>`;
                }).join('')}
            </div>

            <!-- Mais Visitados -->
            <div class="dash-card">
                <h6 class="fw-bold text-success mb-3"><i class="fas fa-star me-2"></i>MAIS VISITADOS</h6>
                ${sortedByVisitsDesc.slice(0, 5).map(i => `
                    <div class="dash-list-item">
                        <span>${i.Fantasia || i.Cliente}</span>
                        <span class="badge bg-success rounded-pill">${i.count} visitas</span>
                    </div>
                `).join('')}
            </div>

            <!-- Menos Visitados (Prioridade de Visita) -->
            <div class="dash-card">
                <h6 class="fw-bold text-danger mb-3"><i class="fas fa-clock me-2"></i>MENOS VISITADOS / NUNCA VISITADOS</h6>
                ${sortedByVisitsAsc.slice(0, 5).map(i => {
                    const lastVisit = getLastVisitDateStr(i.ID);
                    return `
                    <div class="dash-list-item">
                        <div>
                            <span>${i.Fantasia || i.Cliente}</span><br>
                            <span class="small text-muted">Última: ${lastVisit.split(' ')[0]}</span>
                        </div>
                        <span class="badge bg-secondary rounded-pill">${i.count} visitas</span>
                    </div>`;
                }).join('')}
            </div>
            ` + '<div style="height: 100px;"></div>';
            container.innerHTML = html;
        }
        
        // --- 4. RENDER SEM ENDEREÇO ---
        else if (activeTab === 'endereco') {
            const missingAddress = db.filter(i => !i.Endereco || i.Endereco.trim().length < 5);
            
            let html = `
            <div class="dash-card text-center mb-3 py-3" style="background:#fff5f5; border: 1px solid #feb2b2;">
                <h5 class="fw-bold text-danger mb-1"><i class="fas fa-map-pin me-2"></i>SEM ENDEREÇO CADASTRADO</h5>
                <p class="small text-muted mb-0">Total: ${missingAddress.length} clientes sem endereço ou CEP.</p>
            </div>
            `;
            
            if (missingAddress.length === 0) {
                html += `<div class="text-center text-success py-5"><i class="fas fa-check-circle fa-3x mb-3"></i><br>Excelente! Todos os clientes possuem endereço cadastrado.</div>`;
                container.innerHTML = html;
                return;
            }
            
            html += missingAddress.map(i => {
                return `
                <div class="card card-client" style="border-left-color: #e53e3e;">
                    <div class="card-body">
                        <div class="client-header">
                            <span class="id-badge">#${i.ID}</span>
                            <span class="badge bg-danger rounded-pill">Sem Endereço</span>
                        </div>
                        <div class="client-fantasia text-danger">${i.Fantasia || i.Cliente}</div>
                        <span class="client-razao">${i.Cliente}</span>
                        
                        <div class="info-box mb-3">
                            <div class="info-item"><i class="fas fa-fingerprint"></i> CNPJ: ${i.CNPJ || 'Não cadastrado'}</div>
                            <div class="info-item"><i class="fas fa-city"></i> Cidade: ${i.Cidade || 'Não informada'}</div>
                        </div>
                        
                        <div class="row g-2">
                            ${i.CNPJ ? `
                            <div class="col-6">
                                <button class="btn btn-sm btn-outline-primary w-100 py-2 rounded-pill fw-bold" onclick="buscarCNPJRapido('${i.ID}', '${i.CNPJ}')">
                                    <i class="fas fa-building me-1"></i>Buscar CNPJ
                                </button>
                            </div>` : ''}
                            <div class="col-${i.CNPJ ? '6' : '12'}">
                                <button class="btn btn-sm btn-outline-secondary w-100 py-2 rounded-pill fw-bold" onclick="buscarCEPRapido('${i.ID}')">
                                    <i class="fas fa-search me-1"></i>Inserir CEP
                                </button>
                            </div>
                            <div class="col-12 mt-2">
                                <button class="btn btn-sm btn-outline-dark w-100 py-2 rounded-pill small" onclick="abrirForm('${i.ID}')">
                                    <i class="fas fa-edit me-1"></i>Editar Completo
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('') + '<div style="height: 100px;"></div>';
            
            container.innerHTML = html;
        }
    }

    // ============================================
    // ABRIR FORMULÁRIO (INSERIR/EDITAR)
    // ============================================
    function abrirForm(id = null) {
        document.getElementById('clienteForm').reset();
        document.getElementById('f-cep-helper').value = '';
        
        if(id) {
            const c = db.find(x => x.ID.toString().trim() === id.toString().trim());
            document.getElementById('f-id').value = c.ID;
            document.getElementById('f-fant').value = c.Fantasia;
            document.getElementById('f-cli').value = c.Cliente;
            document.getElementById('f-comp').value = c.Comprador;
            document.getElementById('f-whats').value = c.WhatsApp;
            document.getElementById('f-end').value = c.Endereco;
            document.getElementById('f-cid').value = c.Cidade;
            document.getElementById('f-vis').value = c.Visita;
            document.getElementById('f-ent').value = c.Entrega;
            document.getElementById('f-ord').value = c.Ordem;
            document.getElementById('f-cnpj').value = c.CNPJ;
            document.getElementById('f-obs').value = c.Obs;
            document.getElementById('f-hab').value = c.HAbertura || '';
            document.getElementById('f-hvis').value = c.Hvisita || '';
        }
        modal.show();
    }

    async function salvar() {
        const data = {
            ID: document.getElementById('f-id').value,
            Cliente: document.getElementById('f-cli').value,
            Fantasia: document.getElementById('f-fant').value,
            Comprador: document.getElementById('f-comp').value,
            WhatsApp: document.getElementById('f-whats').value,
            Endereco: document.getElementById('f-end').value,
            Cidade: document.getElementById('f-cid').value,
            Visita: document.getElementById('f-vis').value,
            Entrega: document.getElementById('f-ent').value,
            Ordem: document.getElementById('f-ord').value,
            CNPJ: document.getElementById('f-cnpj').value,
            Obs: document.getElementById('f-obs').value,
            HAbertura: document.getElementById('f-hab').value,
            Hvisita: document.getElementById('f-hvis').value
        };
        toggleLoader(true);
        try {
            await apiPost('save', data);
            modal.hide();
            await load();
        } catch (e) {
            customAlert("Erro ao salvar cliente.");
        }
        toggleLoader(false);
    }

    async function excluir() {
        const confirmed = await customConfirm("Tem certeza que deseja apagar este cliente?");
        if(!confirmed) return;
        toggleLoader(true);
        try {
            await apiPost('delete', {ID: document.getElementById('f-id').value});
            modal.hide();
            await load();
        } catch (e) {
            customAlert("Erro ao excluir cliente.");
        }
        toggleLoader(false);
    }

    // Configuração dos Event Listeners dos Filtros
    ['search','fVisita','fEntrega','fCidade','roteiroDate'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener(id === 'search' ? 'input' : 'change', render);
        }
    });

    // Iniciar data do roteiro com o dia de hoje
    const roteiroDateEl = document.getElementById('roteiroDate');
    if (roteiroDateEl) {
        roteiroDateEl.value = getLocalDateStr();
    }

    window.onload = load;
</script>
</body>
</html>
