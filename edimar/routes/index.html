    window.startBatchEnrichment = async function() {
        if (isBatchRunning) return;
        
        const mode = document.querySelector('input[name="batch-select-mode"]:checked').value;
        const fillBairro = document.getElementById('chk-fill-bairro').checked;
        const fillCep = document.getElementById('chk-fill-cep').checked;
        const fillEnd = document.getElementById('chk-fill-end').checked;
        const fillPlaybook = document.getElementById('chk-fill-playbook').checked;
        
        if (!fillBairro && !fillCep && !fillEnd && !fillPlaybook) {
            return customAlert("Selecione pelo menos um item para preencher.");
        }
        
        let targetList = [];
        if (mode === 'all') {
            targetList = db.filter(c => {
                const clean = getCleanCnpj(c.CNPJ);
                return clean.length === 14 && clean !== '00000000000000';
            });
        } else {
            targetList = db.filter(c => {
                const clean = getCleanCnpj(c.CNPJ);
                return (!c.Endereco || String(c.Endereco).trim().length < 5) && clean.length === 14 && clean !== '00000000000000';
            });
        }
        
        if (targetList.length === 0) {
            return customAlert("Nenhum cliente elegível com CNPJ válido encontrado para enriquecer.");
        }
        
        const confirmed = await customConfirm(`Deseja iniciar o enriquecimento em lote para ${targetList.length} clientes?\n\nEste processo faz requisições às APIs públicas e respeita os intervalos de rate limit (1 chamada/s).`, "Iniciar Lote");
        if (!confirmed) return;
        
        isBatchRunning = true;
        document.getElementById('btn-start-batch').style.display = 'none';
        document.getElementById('btn-stop-batch').style.display = 'block';
        
        const statsBox = document.getElementById('batch-stats-box');
        statsBox.style.display = 'block';
        
        const progText = document.getElementById('batch-progress-text');
        const progBar = document.getElementById('batch-progress-bar');
        const statSuccess = document.getElementById('batch-stat-success');
        const statNoCnpj = document.getElementById('batch-stat-nocnpj');
        const statError = document.getElementById('batch-stat-error');
        
        statSuccess.innerText = '0';
        statNoCnpj.innerText = '0';
        statError.innerText = '0';
        
        let successCount = 0;
        let nocnpjCount = 0;
        let errorCount = 0;
        let totalCount = targetList.length;
        
        progText.innerText = `0 / ${totalCount}`;
        progBar.style.width = '0%';
        progBar.classList.add('progress-bar-striped', 'progress-bar-animated');
        
        for (let idx = 0; idx < totalCount; idx++) {
            if (!isBatchRunning) break;
            
            const client = targetList[idx];
            const clientName = client.Cliente || client.Fantasia || `ID ${client.ID}`;
            const currentClientEl = document.getElementById('batch-current-client');
            if (currentClientEl) {
                currentClientEl.innerText = `Preenchendo (${idx + 1}/${totalCount}): ${clientName}`;
            }
            
            const cleanCnpj = getCleanCnpj(client.CNPJ);
            
            if (!cleanCnpj || cleanCnpj.length !== 14) {
                nocnpjCount++;
                statNoCnpj.innerText = nocnpjCount;
                updateProgressUI(idx + 1, totalCount);
                continue;
            }
            
            try {
                const data = await queryCNPJ(cleanCnpj, true); // ignoreAlerts = true
                if (data) {
                    let updated = false;
                    
                    if (fillBairro && data.bairro && (!client.Bairro || !client.Bairro.trim())) {
                        client.Bairro = data.bairro.toUpperCase();
                        updated = true;
                    }
                    if (fillCep && data.cep && (!client.CEP || !client.CEP.trim())) {
                        client.CEP = data.cep.replace(/\D/g, '');
                        updated = true;
                    }
                    if (fillEnd && (!client.Endereco || client.Endereco.trim().length < 5)) {
                        let logradouroCompleto = (data.logradouro || '').trim();
                        if (data.source === 'brasilapi' && data.descricao_tipo_de_logradouro) {
                            const tipo = data.descricao_tipo_de_logradouro.trim();
                            if (tipo && !logradouroCompleto.toUpperCase().startsWith(tipo.toUpperCase())) {
                                logradouroCompleto = `${tipo} ${logradouroCompleto}`;
                            }
                        }
                        let end = `${logradouroCompleto}, ${data.numero || 'S/N'}`;
                        if (data.complemento && data.complemento.trim()) end += ` - ${data.complemento.trim()}`;
                        if (data.bairro && data.bairro.trim()) end += ` - ${data.bairro.trim()}`;
                        end += `, ${data.municipio || ''}, ${data.uf || ''}`;
                        client.Endereco = end.toUpperCase();
                        client.Cidade = (data.municipio || '').toUpperCase();
                        updated = true;
                    }
                    
                    if (updated) {
                        await apiPost('save', client);
                    }
                    
                    if (fillPlaybook) {
                        let brainNotes = `CNPJ: ${data.cnpj || cleanCnpj}`;
                        if (data.data_abertura) brainNotes += ` | Abertura: ${data.data_abertura}`;
                        if (data.capital_social) brainNotes += ` | Capital: R$ ${parseFloat(data.capital_social).toLocaleString('pt-BR')}`;
                        if (data.situacao) brainNotes += ` | Situação: ${data.situacao}`;
                        if (data.qsa && data.qsa.length > 0) {
                            brainNotes += `\n\nSócios: ${data.qsa.map(s => `${s.nome} (${s.qual || 'Sócio'})`).join(', ')}`;
                        }
                        
                        let pbRecord = playbookDb.find(p => p.ID.toString().trim() === client.ID.toString().trim());
                        if (pbRecord) {
                            if (!pbRecord.Notas) {
                                pbRecord.Notas = brainNotes;
                                await apiPost('save_brain_auto', { ID: client.ID, Notas: brainNotes });
                            }
                        } else {
                            pbRecord = { ID: client.ID, Notas: brainNotes };
                            playbookDb.push(pbRecord);
                            await apiPost('save_brain_auto', { ID: client.ID, Notas: brainNotes });
                        }
                    }
                    
                    successCount++;
                    statSuccess.innerText = successCount;
                } else {
                    errorCount++;
                    statError.innerText = errorCount;
                }
            } catch (err) {
                console.error(`Erro ao processar lote para ID ${client.ID}:`, err);
                errorCount++;
                statError.innerText = errorCount;
            }
            
            updateProgressUI(idx + 1, totalCount);
            if ((idx + 1) % 10 === 0) {
                localStorage.setItem('cached_db', JSON.stringify(db));
                localStorage.setItem('cached_playbook', JSON.stringify(playbookDb));
            }
            await sleep(1000);
        }
        
        isBatchRunning = false;
        document.getElementById('btn-start-batch').style.display = 'block';
        document.getElementById('btn-stop-batch').style.display = 'none';
        progBar.classList.remove('progress-bar-striped', 'progress-bar-animated');
        
        const currentClientEl = document.getElementById('batch-current-client');
        if (currentClientEl) {
            currentClientEl.innerText = 'Lote finalizado com sucesso!';
        }
        
        localStorage.setItem('cached_db', JSON.stringify(db));
        localStorage.setItem('cached_playbook', JSON.stringify(playbookDb));
        popularCidades();
        updateSemEnderecoBadge();
        render();
        customAlert("Enriquecimento em lote concluído!");
    };

    function updateProgressUI(current, total) {
        const progText = document.getElementById('batch-progress-text');

        if (progText) progText.innerText = `${current} / ${total}`;
        if (progBar) {
            const pct = Math.round((current / total) * 100);
            progBar.style.width = `${pct}%`;
        }
    }

    async function executeWhatsappSend(option) {
        if (!currentWaTarget) return;
        
        const phone = currentWaTarget.phone;
        const msg = document.getElementById('wa-message-text').value;
        const encodedMsg = encodeURIComponent(msg);
        
        let url = '';
        const isAndroid = /Android/i.test(navigator.userAgent);
        
        if (option === 'standard') {
            url = `whatsapp://send?phone=55${phone}${msg ? '&text=' + encodedMsg : ''}`;
        } else if (option === 'business') {
            if (isAndroid) {
                url = `intent://send?phone=55${phone}${msg ? '&text=' + encodedMsg : ''}#Intent;scheme=whatsapp;package=com.whatsapp.w4b;end`;
            } else {
                url = `whatsapp://send?phone=55${phone}${msg ? '&text=' + encodedMsg : ''}`;
            }
        } else {
            url = `https://api.whatsapp.com/send?phone=55${phone}${msg ? '&text=' + encodedMsg : ''}`;
        }
        
        // Registra o contato no histórico da planilha
        try {

        } catch (e) {
            console.error("Falha ao registrar contato por WhatsApp:", e);
        }

        if (url.startsWith('http')) {

        } else {
            window.location.href = url;
        }
    }

    function abrirGpsOpcao(option) {
        if (!currentGpsTarget) return;
        const address = currentGpsTarget.address;
        let url = '';
        const isAndroid = /Android/i.test(navigator.userAgent);
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if (option === 'maps') {
            if (isAndroid) {
                // Força abertura do Google Maps no Android em modo navegação
                url = `google.navigation:q=${encodeURIComponent(address)}`;
            } else {
                url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
            }
        } else if (option === 'waze') {
            if (isMobile) {
                // Abre o app do Waze diretamente
                url = `waze://?q=${encodeURIComponent(address)}&navigate=yes`;
            } else {
                url = `https://waze.com/ul?q=${encodeURIComponent(address)}&navigate=yes`;
            }
        } else if (option === 'apple') {
            url = `maps://?q=${encodeURIComponent(address)}`;
        }
        
        if (document.getElementById('gps-remember').checked) {
            localStorage.setItem('pref_gps', option);
        }
        
        // CORREÇÃO: Usar window.location.href para links nativos para não abrir abas em branco no celular
        if (url.startsWith('http')) {
            window.open(url, '_blank');
        } else {
            window.location.href = url;
        }
        gpsModal.hide();
    }

    // Registrar ou Remover Visita
    async function toggleVisita(id, event, customDateStr = null, targetStatus = 'Visita') {
        if (event) event.stopPropagation();
        
        const c = db.find(x => x.ID.toString().trim() === id.toString().trim());
        if (!c) return;
        
        const targetDate = customDateStr || selectedDate || getLocalDateStr();
        const parts = targetDate.split('-');
        const formattedDateForConfirm = `${parts[2]}/${parts[1]}/${parts[0]}`;
        
        if (targetStatus === 'delete') {
            const confirmed = await customConfirm(`Remover a marcação de visita/ausência de "${c.Fantasia || c.Cliente}" em ${formattedDateForConfirm}?`);
            if (confirmed) {
                // Remove do banco de dados local imediatamente
                visitsDb = visitsDb.filter(v => {
                    if (!v || !v.ID || !v.Data) return true;
                    const d = parseDate(v.Data);
                    const targetParts = targetDate.split('-');
                    const targetDateObj = new Date(targetParts[0], targetParts[1] - 1, targetParts[2]);
                    const isMatch = v.ID.toString().trim() === id.toString().trim() && 
                                    !isNaN(d.getTime()) && 
                                    d.toDateString() === targetDateObj.toDateString();
                    return !isMatch;
                });
                
                // Salva cache local
                localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
                
                render();
 
                // Envia para o backend em background
                apiPost('delete_visit', { ID: id }, { date: targetDate }).catch(e => console.error("Erro ao deletar visita em background:", e));
            }
            return;
        }
        
        const msg = targetStatus === 'Não Encontrado' 
            ? `Confirmar que o cliente "${c.Fantasia || c.Cliente}" NÃO foi encontrado em ${formattedDateForConfirm}?`
            : `Confirmar que você visitou "${c.Fantasia || c.Cliente}" em ${formattedDateForConfirm}?`;
            
        const confirmed = await customConfirm(msg);
        if (confirmed) {
            const dateStr = `${parts[2]}/${parts[1]}/${parts[0]}`;
            const dayCode = getDayCodeForDate(targetDate);
            
            // Grava localmente imediatamente
            visitsDb.push({ ID: id, Data: dateStr, Status: targetStatus, Dia_Visita: dayCode });
            localStorage.setItem('cached_visits', JSON.stringify(visitsDb));
            
            // Animação visual no botão/card clicado
            let btn = null;
            if (event && event.target) {
                btn = event.target.closest('button') || event.target;
            }
            
            if (btn) {
                btn.classList.add(targetStatus === 'Não Encontrado' ? 'absent-confirmed' : 'visit-confirmed');
                
                // Modifica o texto do botão provisoriamente
                if (targetStatus === 'Não Encontrado') {
                    btn.innerHTML = '<i class="fas fa-user-slash me-1"></i>Ausente ✓';
                    btn.className = 'btn btn-sm btn-warning rounded-pill px-3 py-1 fw-bold text-dark';
                } else {
                    btn.innerHTML = '<i class="fas fa-check-double me-1"></i>Visitado ✓';
                    btn.className = 'btn btn-sm btn-success rounded-pill px-3 py-1 fw-bold text-white';
                }
                
                // Aguarda o tempo da animação de pulse (600ms)
                await new Promise(resolve => setTimeout(resolve, 600));
            }
            
            render();
            
            // Envia para o backend em background (sem bloquear tela)
            apiPost('record_visit', { ID: id }, { date: dateStr, status: targetStatus }).catch(e => console.error("Erro ao salvar visita em background:", e));
        }
    }

    // RENDER PRINCIPAL CONFORME A ABA ATIVA

    function render() {
        const container = document.getElementById('lista');
        
        // --- 1. RENDER ROTEIRO ---
        if (activeTab === 'roteiro') {
            const s = document.getElementById('search').value.toLowerCase();
            const v = document.getElementById('fVisita').value;
            const e = document.getElementById('fEntrega').value;
            const c = document.getElementById('fCidade').value;
            const b = document.getElementById('fBairro') ? document.getElementById('fBairro').value : '';
            
            let filtered = db.filter(i => {
                const matchS = [i.ID, i.Cliente, i.Fantasia, i.Comprador, i.WhatsApp, i.CNPJ, i.Endereco, i.Bairro].map(v => String(v || '').trim()).join(' ').toLowerCase().includes(s);
                return matchS && (!v || (i.Visita && i.Visita.includes(v))) && (!e || (i.Entrega && i.Entrega.includes(e))) && (!c || i.Cidade === c) && (!b || i.Bairro === b);
            });

            filtered.sort((a, b) => {
                const dayA = getMinDayOrder(a.Visita);
                const dayB = getMinDayOrder(b.Visita);
                if (dayA !== dayB) return dayA - dayB;
                const ordA = parseInt(a.Ordem) || 0;
                const ordB = parseInt(b.Ordem) || 0;
                return ordA - ordB;

            // Indexar positivações por ID do cliente para busca rápida

            // Indexar visitas por ID do cliente para busca rápida
            const visitsByClientMap = {};
            visitsDb.forEach(v => {

            // Total clientes visitados na data selecionada (Apenas visitas reais)
            const totalVisitedOnDate = db.filter(i => visitStatusMap[i.ID] === 'Visita').length;
            
            // Total clientes agendados para a data selecionada
            const scheduledOnDate = db.filter(i => i.Visita && i.Visita.includes(targetDateCode));
            const visitedScheduledOnDate = scheduledOnDate.filter(i => visitStatusMap[i.ID] === 'Visita').length;
            
            // Clientes positivados há mais de 15 dias sem pedido
            const latePositives = db.filter(c => {

            // Taxa de positivação semanal (clientes visitados há >= 7 dias que compraram na semana seguinte)
            let totalVisitsForRate = 0;
            let visitsWithPurchase = 0;
            const refDateObj = parseDate(targetDate);
            const todayObj = isNaN(refDateObj.getTime()) ? new Date() : refDateObj;
            
            visitsDb.forEach(v => {
                if (v && (!v.Status || v.Status === 'Visita') && v.Data) {
                    const visitDateObj = parseDate(v.Data);
                    if (!isNaN(visitDateObj.getTime())) {
                        const diffDays = (todayObj - visitDateObj) / (1000 * 60 * 60 * 24);
                        if (diffDays >= 7) {
                            totalVisitsForRate++;
                            const clientPos = clientPosRecordsMap[v.ID.toString().trim()] || [];
                            let boughtInWeek = false;
                            clientPos.forEach(p => {
                                if (p.Datas_Pedidos) {
                                    p.Datas_Pedidos.toString().split(',').forEach(dStr => {
                                        const purchaseDateObj = parseDate(dStr);
                                        if (!isNaN(purchaseDateObj.getTime())) {
                                            const pDiffDays = (purchaseDateObj - visitDateObj) / (1000 * 60 * 60 * 24);
                                            if (pDiffDays >= 0 && pDiffDays <= 7) {
                                                boughtInWeek = true;
                                            }
                                        }
                                    });
                                }
                            });
                            if (boughtInWeek) {
                                visitsWithPurchase++;
                            }
                        }
                    }
                }
            });
            const weeklyPosRate = totalVisitsForRate > 0 ? Math.round((visitsWithPurchase / totalVisitsForRate) * 100) : 0;

            // Resumo de Frequências (Baseado no Ano-Mês selecionado)
            const partsMonth = targetDate.split('-');
            const targetMonthStr = `${partsMonth[0]}-${partsMonth[1]}`;
            
            const getClientFrequencyLabel = (clientId) => {
                const clientPosList = clientPosRecordsMap[clientId.toString().trim()] || [];
                const rec = clientPosList.find(p => p.Ano_Mes === targetMonthStr);
                const count = rec ? (parseInt(rec.Count_Pedidos) || 0) : 0;
                if (count >= 3) return 'Semanal 🗓️';
                if (count === 2) return 'Quinzenal 🌓';
                if (count === 1) return 'Mensal 🌑';
                
                const statusData = clientPosStatusMap[clientId];
                if (statusData && statusData.daysSince <= 60) return 'Bimestral ⏳';
                return 'Esporádico ❓';
            };
            
            const freqCounts = { semanal: 0, quinzenal: 0, mensal: 0, bimestral: 0, esporadico: 0 };
            db.forEach(c => {
                const label = getClientFrequencyLabel(c.ID);
                if (label.startsWith('Semanal')) freqCounts.semanal++;
                else if (label.startsWith('Quinzenal')) freqCounts.quinzenal++;
                else if (label.startsWith('Mensal')) freqCounts.mensal++;
                else if (label.startsWith('Bimestral')) freqCounts.bimestral++;
                else freqCounts.esporadico++;

            // Ranking por menor % de meses positivados (clientes difíceis)
            const uniqueMonthsInSystem = [...new Set(positivacoesDb.map(p => p.Ano_Mes))].filter(m => m);

            document.getElementById('f-web').value = c.website || '';
            document.getElementById('f-insta').value = c.instagram || '';
            document.getElementById('f-fb').value = c.facebook || '';
            document.getElementById('f-gmaps-url').value = c.gmaps_url || '';
            document.getElementById('f-hours').value = c.horarios_completos || '';
            
            if (btnExcluir) btnExcluir.style.display = 'block';

            document.getElementById('f-tel-extra').value = '';
            document.getElementById('f-web').value = '';
            document.getElementById('f-insta').value = '';
            document.getElementById('f-fb').value = '';
            document.getElementById('f-gmaps-url').value = '';
            document.getElementById('f-hours').value = '';
            
            // Auto-gera o ID do novo cliente (Max ID + 1)
            const maxId = db.reduce((max, item) => {
                const num = parseInt(item.ID);
                return isNaN(num) ? max : Math.max(max, num);

            if (btnExcluir) btnExcluir.style.display = 'none';
        }
        modal.show();

    // PLAYBOOK DO CLIENTE: Funções do Dossiê (Clientes_Brain)
    function selectPlaybookClient(id) {
        pbSelectedClientId = id;
        
        // Remove a classe active de todos os cards
        const cards = document.querySelectorAll('.pb-client-card');
        cards.forEach(card => {
            card.classList.remove('active');
        });
        
        // Adiciona classe active no card clicado (se houver event)
        if (window.event && window.event.currentTarget) {
            window.event.currentTarget.classList.add('active');
        }
        
        loadPlaybookForSelectedClient();
    }

    function loadPlaybookForSelectedClient() {
        const id = pbSelectedClientId;
        const detailsContainer = document.getElementById('playbook-details-container');
        const emptyState = document.getElementById('playbook-empty-state');
        
        if (!id) {
            detailsContainer.style.display = 'none';
            emptyState.style.display = 'block';

        }
        
        const c = db.find(x => x.ID.toString().trim() === id.toString().trim());

        document.getElementById('pb-client-name').innerText = c.Fantasia || c.Cliente;
        document.getElementById('pb-client-id').innerText = `#${c.ID}`;

        document.getElementById('pb-curva-a').value = pb.Curva_A || pb.curva_a || '';
        document.getElementById('pb-inimizades').value = pb.Inimizades || pb.inimizades || '';

        document.getElementById('pb-calda-base-substituir').value = pb.Calda_Base_Substituir || '';
        document.getElementById('pb-campos-custom1').value = pb.Campos_Custom1 || '';
        document.getElementById('pb-campos-custom2').value = pb.Campos_Custom2 || '';
        
        document.getElementById('pb-saborizantes-usa').value = pb.Saborizantes_Usa || '';
        document.getElementById('pb-saborizantes-substituir').value = pb.Saborizantes_Substituir || '';
        
        document.getElementById('pb-itens-mescla').value = pb.Itens_Mescla || '';
        document.getElementById('pb-itens-pista').value = pb.Itens_Pista || '';
        document.getElementById('pb-feedbacks-tecnicos').value = pb.Feedbacks_Tecnicos || '';
        document.getElementById('pb-estrategias-troca').value = pb.Estrategias_Troca || '';
        
        document.getElementById('pb-notas').value = pb.Notas || pb.notas || '';
        
        emptyState.style.display = 'none';
        detailsContainer.style.display = 'block';

    async function savePlaybook() {
        const id = pbSelectedClientId;
        if (!id) return;
        
        const data = {
            ID: id.toString(),
            Dossie: document.getElementById('pb-dossie').value,
            Curva_A: document.getElementById('pb-curva-a').value,
            Inimizades: document.getElementById('pb-inimizades').value,
            Calda_Base_Usa: document.getElementById('pb-calda-base-usa').value,
            Calda_Base_Substituir: document.getElementById('pb-calda-base-substituir').value,
            Campos_Custom1: document.getElementById('pb-campos-custom1').value,
            Campos_Custom2: document.getElementById('pb-campos-custom2').value,
            Saborizantes_Usa: document.getElementById('pb-saborizantes-usa').value,
            Saborizantes_Substituir: document.getElementById('pb-saborizantes-substituir').value,
            Itens_Mescla: document.getElementById('pb-itens-mescla').value,
            Itens_Pista: document.getElementById('pb-itens-pista').value,
            Feedbacks_Tecnicos: document.getElementById('pb-feedbacks-tecnicos').value,
            Estrategias_Troca: document.getElementById('pb-estrategias-troca').value,
            Notas: document.getElementById('pb-notas').value
        };
        
        // Atualiza localmente e salva no cache
        const idx = playbookDb.findIndex(x => x.ID.toString().trim() === id.toString().trim());
        if (idx !== -1) {
            playbookDb[idx] = data;
        } else {
            playbookDb.push(data);
        }
        localStorage.setItem('cached_playbook', JSON.stringify(playbookDb));
        
        // Atualiza a lista de cards de forma a mostrar "Preenchido" sem resetar inputs
        filterPlaybookClients();
        
        toggleLoader(true);
        try {
            await apiPost('save_brain', data);
            customAlert("Dossiê do cliente salvo com sucesso na nuvem!", "Playbook");
        } catch (e) {
            console.error(e);
            customAlert("Erro ao salvar Playbook.");
        }
        toggleLoader(false);
    }

    function filterPlaybookClients() {
        const sInput = document.getElementById('pb-search-input');
        const dInput = document.getElementById('pb-day-filter');
        const fInput = document.getElementById('pb-field-filter');
        
        if (sInput) pbSearchQuery = sInput.value;
        if (dInput) pbDayFilterVal = dInput.value;
        if (fInput) pbFieldFilterVal = fInput.value;
        
        const listContainer = document.getElementById('pb-client-list');
        if (!listContainer) return;
        
        const s = pbSearchQuery.toLowerCase();
        const d = pbDayFilterVal;
        const fFilter = pbFieldFilterVal;
        
        let filteredClients = [...db];
        
        // Filtro palavra-chave em TODOS os campos
        if (s) {
            filteredClients = filteredClients.filter(c => {
                const pb = playbookDb.find(x => x.ID.toString().trim() === c.ID.toString().trim()) || {};
                const allFields = [
                    c.ID, c.Cliente, c.Fantasia, c.CNPJ, c.Endereco, c.Cidade, c.Comprador, c.Visita,
                    pb.Dossie, pb.Curva_A, pb.Inimizades, pb.Notas,
                    pb.Calda_Base_Usa, pb.Calda_Base_Substituir,
                    pb.Saborizantes_Usa, pb.Saborizantes_Substituir,
                    pb.Itens_Mescla, pb.Itens_Pista,
                    pb.Feedbacks_Tecnicos, pb.Estrategias_Troca,
                    pb.Campos_Custom1, pb.Campos_Custom2
                ].filter(Boolean).map(val => val.toString().toLowerCase());
                return allFields.some(val => val.includes(s));
            });
        }
        
        if (d) {
            filteredClients = filteredClients.filter(c => c.Visita && c.Visita.includes(d));
        }
        
        if (fFilter) {
            filteredClients = filteredClients.filter(c => {
                const pb = playbookDb.find(x => x.ID.toString().trim() === c.ID.toString().trim()) || {};
                const hasDossie = !!(pb.Dossie || pb.dossie || '').trim();
                const hasCurvaA = !!(pb.Curva_A || pb.curva_a || '').trim();
                const hasInimizades = !!(pb.Inimizades || pb.inimizades || '').trim();
                const hasNotas = !!(pb.Notas || pb.notas || '').trim();
                const hasCalda = !!((pb.Calda_Base_Usa || '').trim() || (pb.Calda_Base_Substituir || '').trim() || (pb.Campos_Custom1 || '').trim() || (pb.Campos_Custom2 || '').trim());
                const hasSabor = !!((pb.Saborizantes_Usa || '').trim() || (pb.Saborizantes_Substituir || '').trim());
                const hasMescla = !!(pb.Itens_Mescla || '').trim();
                const hasPista = !!(pb.Itens_Pista || '').trim();
                const hasFeedback = !!(pb.Feedbacks_Tecnicos || '').trim();
                const hasEstrategia = !!(pb.Estrategias_Troca || '').trim();
                
                const isAnyFilled = hasDossie || hasCurvaA || hasInimizades || hasNotas || hasCalda || hasSabor || hasMescla || hasPista || hasFeedback || hasEstrategia;
                
                if (fFilter === 'any_filled') return isAnyFilled;
                if (fFilter === 'empty') return !isAnyFilled;
                if (fFilter === 'Dossie') return hasDossie;
                if (fFilter === 'Curva_A') return hasCurvaA;
                if (fFilter === 'Inimizades') return hasInimizades;
                if (fFilter === 'Calda_Base') return hasCalda;
                if (fFilter === 'Saborizantes') return hasSabor;
                if (fFilter === 'Itens_Mescla') return hasMescla;
                if (fFilter === 'Itens_Pista') return hasPista;
                if (fFilter === 'Feedbacks_Tecnicos') return hasFeedback;
                if (fFilter === 'Estrategias_Troca') return hasEstrategia;
                return true;
            });
        }
        
        filteredClients.sort((a, b) => (a.Fantasia || a.Cliente).localeCompare(b.Fantasia || b.Cliente));
        
        const clientCardsHtml = filteredClients.map(c => {
            const isSelected = pbSelectedClientId.toString() === c.ID.toString();
            const pb = playbookDb.find(x => x.ID.toString().trim() === c.ID.toString().trim()) || {};
            
            const hasDossie = !!(pb.Dossie || pb.dossie || '').trim();
            const hasCurvaA = !!(pb.Curva_A || pb.curva_a || '').trim();
            const hasInimizades = !!(pb.Inimizades || pb.inimizades || '').trim();
            const hasNotas = !!(pb.Notas || pb.notas || '').trim();
            const hasCalda = !!((pb.Calda_Base_Usa || '').trim() || (pb.Calda_Base_Substituir || '').trim() || (pb.Campos_Custom1 || '').trim() || (pb.Campos_Custom2 || '').trim());
            const hasSabor = !!((pb.Saborizantes_Usa || '').trim() || (pb.Saborizantes_Substituir || '').trim());
            const hasMescla = !!(pb.Itens_Mescla || '').trim();
            const hasPista = !!(pb.Itens_Pista || '').trim();
            const hasFeedback = !!(pb.Feedbacks_Tecnicos || '').trim();
            const hasEstrategia = !!(pb.Estrategias_Troca || '').trim();
            
            const isAnyFilled = hasDossie || hasCurvaA || hasInimizades || hasNotas || hasCalda || hasSabor || hasMescla || hasPista || hasFeedback || hasEstrategia;
            
            let statusBadge = '';
            if (isAnyFilled) {
                statusBadge = `<span class="badge bg-success"><i class="fas fa-check-circle me-1"></i>Preenchido</span>`;
            } else {
                statusBadge = `<span class="badge bg-secondary"><i class="far fa-circle me-1"></i>Vazio</span>`;
            }
            
            return `
            <div class="pb-client-card ${isSelected ? 'active' : ''}" onclick="selectPlaybookClient('${c.ID}')" style="cursor: pointer; padding: 10px; border-bottom: 1px solid #edf2f7; transition: var(--transition); border-radius: 8px; margin-bottom: 4px;">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="fw-bold pb-card-name" style="font-size: 0.9rem;">${c.Fantasia || c.Cliente}</div>
                    ${statusBadge}
                </div>
                <div class="text-muted small pb-card-meta" style="font-size: 0.72rem; margin-top: 2px;">
                    #${c.ID} · ${c.Cidade || 'PIRACICABA'} · ${c.Visita || 'SEM DIA'}
                </div>
            </div>
            `;
        }).join('');
        
        listContainer.innerHTML = clientCardsHtml 
            ? clientCardsHtml 
            : `<div class="text-center text-muted py-4 small">Nenhum cliente encontrado com os filtros atuais.</div>`;
    }

            facebook: document.getElementById('f-fb').value,
            gmaps_url: document.getElementById('f-gmaps-url').value,
            horarios_completos: document.getElementById('f-hours').value
        };
        
        const oldClient = db.find(x => x.ID.toString().trim() === data.ID.toString().trim());
        let updatedData = oldClient ? { ...oldClient, ...data } : data;
        
        if (oldClient) {
            if (oldClient.Endereco === data.Endereco) {
                updatedData.lat = oldClient.lat || '';
                updatedData.long = oldClient.long || '';
            } else {
                updatedData.lat = '';
                updatedData.long = '';
            }
        } else {
            updatedData.lat = '';
            updatedData.long = '';
        }
        
        // Atualiza a memória local (db) imediatamente
        const idx = db.findIndex(x => x.ID.toString().trim() === data.ID.toString().trim());
        if (idx !== -1) {
            db[idx] = updatedData;
        } else {
            db.push(updatedData);
        }
        
        // Salva cache local
        localStorage.setItem('cached_db', JSON.stringify(db));
        
        // Atualiza visual imediatamente
        popularCidades();
        updateSemEnderecoBadge();
        render();
        modal.hide();
 
        // Envia para o backend em background
        apiPost('save', updatedData).catch(e => console.error("Erro ao salvar cliente em background:", e));
    }

    async function excluir() {
        const confirmed = await customConfirm("Tem certeza que deseja apagar este cliente?");
        if(!confirmed) return;
        
        const id = document.getElementById('f-id').value;
        
        // Atualiza a memória local (db) imediatamente
        db = db.filter(x => x.ID.toString().trim() !== id.toString().trim());
        
        // Salva cache local
        localStorage.setItem('cached_db', JSON.stringify(db));
        
        // Atualiza visual imediatamente
        popularCidades();
        updateSemEnderecoBadge();
        render();
        modal.hide();

        // Envia para o backend em background
        apiPost('delete', {ID: id}).catch(e => console.error("Erro ao excluir cliente em background:", e));
    }

    // Configuração dos Event Listeners dos Filtros
    ['search','fVisita','fEntrega','fBairro'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            el.addEventListener(id === 'search' ? 'input' : 'change', render);
        }
    });

    const fCidadeEl = document.getElementById('fCidade');
    if (fCidadeEl) {
        fCidadeEl.addEventListener('change', function() {
            popularBairros();
            const fBairroEl = document.getElementById('fBairro');
            if (fBairroEl) fBairroEl.value = '';
            render();
        });
    }

    const roteiroDateEl = document.getElementById('roteiroDate');
    if (roteiroDateEl) {
        roteiroDateEl.addEventListener('change', function() {
            updateSelectedDate(this.value, true);
        });
    }

    // Iniciar data do roteiro com o dia de hoje e sincronizar
    updateSelectedDate(getLocalDateStr(), true);

    const fCnpjEl = document.getElementById('f-cnpj');
    if (fCnpjEl) {
        fCnpjEl.addEventListener('blur', function() {
            this.value = formatCnpj(this.value);
        });
    }

    window.onload = function() {
        initTheme();
        
        if (window.self !== window.top) {
            const warnEl = document.getElementById('iframe-warning');
            if (warnEl) warnEl.style.display = 'block';
        }
        
        // Inicializa status de conexão
        updateConnectionBadge(navigator.onLine);
        if (navigator.onLine) {
            syncOfflineQueue();
        }
        
        load();
        
        // Ajusta padding inicial e adiciona listener de redimensionamento
        setTimeout(adjustBodyPadding, 200);
        window.addEventListener('resize', adjustBodyPadding);
    };
</script>
</body>
</html>
