<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 Kit Manager Pro</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',Arial,sans-serif;background:#f0f4f0;color:#222;font-size:13px}

/* OVERLAY */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:flex;align-items:center;justify-content:center}
#overlay.hide{display:none}
.ov-box{background:#fff;border-radius:12px;padding:28px 36px;text-align:center;min-width:300px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.ov-box h2{color:#1b5e20;margin-bottom:6px;font-size:17px}
.ov-box p{color:#666;font-size:12px;margin-bottom:12px}
.prog-bar{width:100%;height:7px;background:#e0e0e0;border-radius:4px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:#2e7d32;border-radius:4px;transition:width .3s;width:0%}
#ov-st{font-size:11px;color:#888}
#ov-err{color:#c62828;font-size:11px;margin-top:6px;min-height:14px}
.ov-btns{margin-top:10px;display:flex;gap:8px;justify-content:center}

/* NAV */
.nav{background:#1b5e20;display:flex;align-items:center;padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.brand{color:#fff;font-size:15px;font-weight:700;padding:10px 0;margin-right:14px;white-space:nowrap}
.tab-btn{padding:10px 18px;border:none;background:transparent;color:rgba(255,255,255,.6);cursor:pointer;font-size:12px;font-weight:700;border-bottom:3px solid transparent;transition:all .2s}
.tab-btn.active{color:#fff;border-bottom-color:#a5d6a7}
.tab-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#db-badge{font-size:11px;padding:3px 8px;border-radius:10px;cursor:pointer;font-weight:700}
#db-badge.ok{background:#a5d6a7;color:#1b5e20}
#db-badge.ld{background:#fff9c4;color:#f57f17}
#db-badge.er{background:#ffcdd2;color:#c62828}

/* TABS */
.tab{display:none;padding:14px 16px}
.tab.active{display:block}

/* BUTTONS */
.btn{padding:6px 13px;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s;white-space:nowrap}
.bg{background:#2e7d32;color:#fff}.bg:hover{background:#1b5e20}
.bb{background:#1565c0;color:#fff}.bb:hover{background:#0d47a1}
.bo{background:#e65100;color:#fff}.bo:hover{background:#bf360c}
.br{background:#c62828;color:#fff}.br:hover{background:#b71c1c}
.bgr{background:#546e7a;color:#fff}.bgr:hover{background:#37474f}

/* ===== LISTA ===== */
/* Kit tab bar */
.kit-tabs-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px;background:#fff;padding:8px 12px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.ktab{padding:6px 14px;border:2px solid #c8e6c9;background:#fff;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;color:#2e7d32;transition:all .2s;white-space:nowrap}
.ktab.active{background:#2e7d32;color:#fff;border-color:#2e7d32}
.ktab:hover{border-color:#2e7d32}
.ktag{display:inline-block;margin-left:5px;background:rgba(0,0,0,.12);border-radius:8px;padding:1px 5px;font-size:10px}

/* Kit panel */
.kit-panel{display:none}
.kit-panel.active{display:block}
.kp-toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;background:#fff;padding:9px 12px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:10px}
.kp-toolbar label{font-weight:700;color:#1b5e20;font-size:12px}
.kp-toolbar input[type=text]{padding:5px 9px;border:2px solid #c8e6c9;border-radius:6px;font-size:13px;width:200px;font-family:inherit}
.kp-toolbar input[type=text]:focus{outline:none;border-color:#2e7d32}

.scan-bar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;background:#e8f5e9;padding:9px 12px;border-radius:8px;border-left:4px solid #2e7d32;margin-bottom:10px}
.scan-bar label{font-weight:700;color:#1b5e20;font-size:12px}
.scan-input{padding:7px 11px;border:2px solid #2e7d32;border-radius:6px;font-size:14px;width:185px;letter-spacing:1px;font-family:monospace}
.scan-input:focus{outline:none;box-shadow:0 0 0 3px rgba(46,125,50,.2)}
.scan-msg{font-size:11px;color:#555;margin-left:4px}

/* Table */
.tbl-wrap{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.1)}
table{width:100%;border-collapse:collapse}
th{background:#2e7d32;color:#fff;padding:7px 8px;font-size:11px;font-weight:700;text-align:left}
td{padding:5px 7px;border-bottom:1px solid #eee;vertical-align:middle}
tr:hover td{background:#f1f8e9}
.tc{text-align:center}.tr{text-align:right}
td input{width:100%;padding:3px 5px;border:1px solid #ddd;border-radius:4px;font-size:11px;background:transparent;font-family:inherit}
td input:focus{outline:none;border-color:#2e7d32;background:#f1f8e9}
td input.iqty{width:50px;text-align:center}
td input.iprice{width:75px;text-align:right}
.tfoot-tot td{background:#e8f5e9;font-weight:700;font-size:12px;border-top:2px solid #2e7d32}
.bdg{display:inline-block;padding:1px 4px;border-radius:7px;font-size:9px;font-weight:700;margin-left:2px}
.bfound{background:#c8e6c9;color:#1b5e20}
.bnf{background:#ffcdd2;color:#c62828}

/* Summary bar */
.kit-summary{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;padding:8px 12px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ks-chip{padding:4px 10px;background:#f1f8e9;border:1px solid #c8e6c9;border-radius:12px;font-size:11px;font-weight:600;color:#1b5e20}

/* ===== IMPRESSÃO ===== */
.section-tb{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:10px 0;margin-bottom:12px;border-bottom:2px solid #e0e0e0}
.section-tb span{font-size:12px;color:#666}

.imp-page{width:210mm;margin:0 auto;background:#fff;padding:5mm 4mm;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.imp-title{text-align:center;font-size:13pt;font-weight:700;color:#1b5e20;text-transform:uppercase;letter-spacing:2px;border-bottom:2px solid #1b5e20;padding-bottom:3px;margin-bottom:4px}
.imp-meta{font-size:7.5pt;color:#888;text-align:center;margin-bottom:6px}

/* Main grid: 4 kit columns */
.imp-grid{width:100%;border-collapse:collapse;table-layout:fixed;font-size:7.5pt;margin-bottom:4mm}
.imp-grid th,.imp-grid td{border:1px solid #555;padding:1px 2px;overflow:hidden;vertical-align:top}
.imp-grid th{background:#2e7d32;color:#fff;text-align:center;font-weight:700;font-size:7pt}
.col-x{width:10px;text-align:center!important;background:#f5f5f5!important;padding:1px!important}
.col-qtd{width:22px;text-align:center!important}
.col-ean{text-align:left!important;padding:1px 3px!important}
.kit-hdr{background:#e8f5e9!important;color:#1b5e20!important;font-weight:700!important}
.kit-hdr-empty{background:#fafafa!important;color:#bbb!important}
.row-item{height:auto!important}
.row-item:nth-child(even) td{background:#fafff8}
.row-total td{background:#e8f5e9!important;font-weight:700;font-size:7pt;text-align:center!important;padding:2px!important}
.blk-sep{height:3mm}

/* Barcode SVG in print */
.bc-svg{display:block;max-width:100%;height:20px}
.bc-svg-sm{display:block;max-width:100%;height:18px}
.bc-label{font-size:6pt;color:#333;display:block;line-height:1.2;word-break:break-word;margin-top:1px}
.imp-footer{margin-top:6mm;font-size:6.5pt;color:#bbb;text-align:center;border-top:1px solid #eee;padding-top:3px}

/* ===== ETIQUETA ===== */
.et-sheet{
  width:210mm;min-height:297mm;margin:0 auto;background:#fff;
  padding:13mm 6.35mm;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
  display:grid;
  grid-template-columns:repeat(3,66.1mm);
  grid-auto-rows:33.875mm;
  gap:0;
}
.et-label{
  width:66.1mm;height:33.875mm;
  border:1px dashed #bbb;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3px 5px;text-align:center;overflow:hidden;
}
.et-nome{font-size:10.5pt;font-weight:700;color:#1b5e20;line-height:1.2;word-break:break-word}
.et-preco{font-size:15pt;font-weight:700;color:#222;margin-top:3px}
.et-empty{border:1px dashed #e0e0e0;background:#fafafa}

/* ===== PRINT ===== */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  #overlay,.nav,.section-tb,.kp-toolbar,.scan-bar,.kit-tabs-bar,
  .kit-summary,.tbl-wrap,#tab-lista,.et-toolbar,
  button:not(.no-hide){display:none!important}
  body{background:#fff;font-size:8pt}
  .tab{display:none!important;padding:0}
  .tab.print-target{display:block!important}
  .imp-page{box-shadow:none;margin:0;width:100%;padding:4mm 3mm;max-width:none}
  .et-sheet{box-shadow:none;margin:0;padding:13mm 6.35mm;width:210mm}
  .et-label,.et-empty{border:1px dashed #ccc}
  @page{size:A4 portrait;margin:0}
}
</style>
</head>
<body>

<!-- OVERLAY -->
<div id="overlay">
  <div class="ov-box">
    <h2>🌸 Kit Manager Pro</h2>
    <p>Conectando ao banco de produtos...</p>
    <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
    <div id="ov-st">Iniciando...</div>
    <div id="ov-err"></div>
    <div class="ov-btns">
      <button class="btn bgr" id="b-skip" onclick="skipLoad()" style="display:none">Usar sem banco</button>
      <button class="btn bg" id="b-retry" onclick="loadDB()" style="display:none">🔄 Tentar novamente</button>
    </div>
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <span class="brand">🌸 Kit Manager Pro</span>
  <button class="tab-btn active" onclick="showTab('lista',this)">📋 LISTA</button>
  <button class="tab-btn" onclick="showTab('impressao',this)">🖨️ IMPRESSÃO</button>
  <button class="tab-btn" onclick="showTab('etiqueta',this)">🏷️ ETIQUETA</button>
  <div class="nav-right">
    <span id="db-badge" class="ld" onclick="loadDB()" title="Clique para recarregar">⏳ BD...</span>
    <span style="color:rgba(255,255,255,.4);font-size:11px"><kbd style="background:rgba(255,255,255,.15);padding:1px 4px;border-radius:3px">F2</kbd> scanner</span>
  </div>
</div>

<!-- ===== LISTA ===== -->
<div id="tab-lista" class="tab active">
  <div class="kit-tabs-bar" id="kit-tabs-bar"></div>
  <div id="kit-panels"></div>
  <div class="kit-summary" id="kit-summary"></div>
</div>

<!-- ===== IMPRESSÃO ===== -->
<div id="tab-impressao" class="tab">
  <div class="section-tb">
    <button class="btn bb" onclick="doPrint()">🖨️ Imprimir</button>
    <button class="btn bg" onclick="buildAll()">🔄 Atualizar</button>
    <span>4 kits lado a lado · Bloco 1: 5 itens · Bloco 2: 4 itens · <strong>Sem valores</strong></span>
  </div>
  <div class="imp-page" id="imp-page"><p style="color:#ccc;text-align:center;padding:20px">Clique em 🔄 Atualizar</p></div>
</div>

<!-- ===== ETIQUETA ===== -->
<div id="tab-etiqueta" class="tab">
  <div class="section-tb et-toolbar">
    <button class="btn bg" onclick="doPrint()">🖨️ Imprimir</button>
    <button class="btn bg" onclick="buildAll()">🔄 Atualizar</button>
    <span>A4 · 3×8 = 24 slots · <strong>1 etiqueta por kit</strong> · 66×33,9mm</span>
  </div>
  <div class="et-sheet" id="et-sheet"></div>
</div>

<script>
// ============ CONFIG ============
const SHEET_ID = '1Ji3RdtmzOPYJKw6mlDcWfKbnTKmKstbrHKLYc4-U0Zg';
const API_KEY  = 'AIzaSyChiZPUY-G3oyZN2NGY_vlgRXUzry9Pkeo';
const TAB_NAME = 'PRODUTOS1';
const CACHE_KEY= 'kitpro_db_v2';
const CACHE_TTL= 3*3600*1000;

// ============ STATE ============
let DB = new Map();
// Each kit: { id, nome, items:[{id,ean,desc,qty,preco,status}], rid }
let kits = [mkKit(1,'KIT 1')];
let activeIdx = 0;

function mkKit(id, nome){ return {id, nome, items:[], rid:0}; }

// ============ UTILS ============
const fmtR = v => 'R$ '+Number(v||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const parseN = s => parseFloat(String(s||0).replace(',','.').replace(/[^\d.]/g,''))||0;
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const kitTotal = k => k.items.reduce((s,i)=>s+parseN(i.qty)*parseN(i.preco),0);

// ============ DB LOAD ============
async function loadDB(){
  const badge=document.getElementById('db-badge');
  const st=document.getElementById('ov-st');
  const er=document.getElementById('ov-err');
  const p=document.getElementById('prog');
  er.textContent='';
  document.getElementById('b-retry').style.display='none';
  document.getElementById('b-skip').style.display='none';
  badge.className='ld'; badge.textContent='⏳ BD...';
  st.textContent='Verificando cache...'; p.style.width='5%';
  document.getElementById('overlay').classList.remove('hide');

  try{
    const c=sessionStorage.getItem(CACHE_KEY);
    if(c){
      const {ts,rows}=JSON.parse(c);
      if(Date.now()-ts<CACHE_TTL){
        buildMap(rows); p.style.width='100%';
        st.textContent=`✓ Cache: ${DB.size.toLocaleString('pt-BR')} produtos`;
        badge.className='ok'; badge.textContent=`✅ ${DB.size.toLocaleString('pt-BR')} produtos`;
        setTimeout(()=>document.getElementById('overlay').classList.add('hide'),600);
        return;
      }
    }
  }catch(e){}

  st.textContent='Baixando planilha (~10s)...'; p.style.width='12%';
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${TAB_NAME}!A:B?key=${API_KEY}&majorDimension=ROWS`;
  try{
    const r=await fetch(url);
    p.style.width='60%';
    if(!r.ok){const t=await r.text();throw new Error(`HTTP ${r.status} — ${t.slice(0,100)}`);}
    const j=await r.json();
    p.style.width='85%';
    const rows=(j.values||[]).slice(1);
    buildMap(rows);
    try{sessionStorage.setItem(CACHE_KEY,JSON.stringify({ts:Date.now(),rows}));}catch(e){}
    p.style.width='100%';
    st.textContent=`✓ ${DB.size.toLocaleString('pt-BR')} produtos carregados`;
    badge.className='ok'; badge.textContent=`✅ ${DB.size.toLocaleString('pt-BR')} produtos`;
    setTimeout(()=>document.getElementById('overlay').classList.add('hide'),700);
  }catch(e){
    er.textContent='Erro: '+e.message;
    st.textContent='Falha ao conectar.';
    p.style.width='100%'; p.style.background='#c62828';
    badge.className='er'; badge.textContent='❌ Erro BD';
    document.getElementById('b-retry').style.display='inline-block';
    document.getElementById('b-skip').style.display='inline-block';
  }
}

function buildMap(rows){
  DB.clear();
  for(const r of rows){
    const ean=String(r[0]||'').trim();
    const desc=String(r[1]||'').trim();
    if(ean) DB.set(ean, desc);
  }
}
function skipLoad(){
  document.getElementById('overlay').classList.add('hide');
  const b=document.getElementById('db-badge');
  b.className='er'; b.textContent='⚠️ Sem BD';
}

// ============ TABS ============
function showTab(t,btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  btn.classList.add('active');
  if(t!=='lista') buildAll();
}

// ============ KIT MANAGEMENT ============
function addKit(){
  if(kits.length>=4){alert('Máximo 4 kits por impressão.');return;}
  const id=Date.now();
  kits.push(mkKit(id,`KIT ${kits.length+1}`));
  activeIdx=kits.length-1;
  renderLista();
}
function removeKit(idx){
  if(kits.length<=1){alert('Deve ter ao menos 1 kit.');return;}
  if(!confirm(`Remover "${kits[idx].nome}"?`)) return;
  kits.splice(idx,1);
  activeIdx=Math.min(activeIdx,kits.length-1);
  renderLista();
}
function switchKit(idx){
  activeIdx=idx;
  renderKitTabs();
  renderKitPanels();
}

// ============ RENDER LISTA ============
function renderLista(){
  renderKitTabs();
  renderKitPanels();
  renderSummary();
}

function renderKitTabs(){
  const bar=document.getElementById('kit-tabs-bar');
  let h='';
  kits.forEach((k,i)=>{
    const a=i===activeIdx?'active':'';
    const cnt=k.items.filter(it=>it.ean||it.desc).length;
    const tot=kitTotal(k);
    h+=`<button class="ktab ${a}" onclick="switchKit(${i})">${esc(k.nome)}<span class="ktag">${cnt} · ${fmtR(tot)}</span></button>`;
  });
  if(kits.length<4) h+=`<button class="btn bg" style="margin-left:4px" onclick="addKit()">+ Novo Kit</button>`;
  if(kits.length>1) h+=`<button class="btn br" style="margin-left:2px" onclick="removeKit(${activeIdx})">✕ Remover Kit</button>`;
  h+=`<span style="margin-left:auto;display:flex;gap:6px">`;
  h+=`<button class="btn bb" onclick="goPrint('impressao')">🖨️ Imprimir Lista</button>`;
  h+=`<button class="btn bg" onclick="goPrint('etiqueta')">🏷️ Imprimir Etiquetas</button>`;
  h+=`<button class="btn bgr" onclick="saveLoc()">💾</button>`;
  h+=`<button class="btn bgr" onclick="loadLoc()">📂</button>`;
  h+=`</span>`;
  bar.innerHTML=h;
}

function renderKitPanels(){
  const cont=document.getElementById('kit-panels');
  cont.innerHTML='';
  kits.forEach((kit,i)=>{
    const a=i===activeIdx?'active':'';
    const div=document.createElement('div');
    div.className=`kit-panel ${a}`;
    div.id=`kp-${i}`;
    div.innerHTML=`
<div class="kp-toolbar">
  <label>🌺 Nome:</label>
  <input type="text" value="${esc(kit.nome)}" onchange="kits[${i}].nome=this.value;renderKitTabs();renderSummary()">
  <button class="btn bg" onclick="addRowM(${i})">➕ Add Item</button>
  <button class="btn bo" onclick="clearKit(${i})">🗑️ Limpar</button>
</div>
<div class="scan-bar">
  <label>🔍 EAN:</label>
  <input class="scan-input" id="scan-${i}" placeholder="Escaneie ou digite o EAN…"
         onkeydown="if(event.key==='Enter'){scanEAN(${i});event.preventDefault()}" autocomplete="off"
         ${i===activeIdx?'autofocus':''}>
  <button class="btn bg" onclick="scanEAN(${i})">Adicionar ↵</button>
  <span class="scan-msg" id="smsg-${i}">Scanner pronto</span>
</div>
<div class="tbl-wrap">
  <table>
    <thead><tr>
      <th style="width:32px" class="tc">#</th>
      <th style="width:130px">EAN</th>
      <th>DESCRIÇÃO</th>
      <th style="width:55px" class="tc">QTD</th>
      <th style="width:95px" class="tr">PREÇO UN</th>
      <th style="width:105px" class="tr">TOTAL</th>
      <th style="width:34px"></th>
    </tr></thead>
    <tbody id="tb-${i}"></tbody>
    <tfoot><tr class="tfoot-tot">
      <td colspan="4"></td>
      <td class="tr">TOTAL:</td>
      <td class="tr" id="gtot-${i}" style="font-size:12px">R$ 0,00</td>
      <td></td>
    </tr></tfoot>
  </table>
</div>`;
    cont.appendChild(div);
    renderKitTable(i);
  });
}

function renderKitTable(ki){
  const kit=kits[ki];
  const tb=document.getElementById('tb-'+ki);
  if(!tb) return;
  tb.innerHTML='';
  let g=0;
  kit.items.forEach((it,idx)=>{
    const tot=parseN(it.qty)*parseN(it.preco); g+=tot;
    const bdg=it.status==='found'?'<span class="bdg bfound">BD</span>':
              it.status==='nf'?'<span class="bdg bnf">!EAN</span>':'';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td class="tc">${idx+1}${bdg}</td>
      <td><input value="${esc(it.ean)}" onchange="updIt(${ki},${it.id},'ean',this.value)"
          placeholder="EAN…" style="font-family:monospace;font-size:10px"></td>
      <td><input value="${esc(it.desc)}" id="d-${ki}-${it.id}"
          onchange="updIt(${ki},${it.id},'desc',this.value)" placeholder="Descrição…"></td>
      <td class="tc"><input class="iqty" type="number" value="${it.qty}" min="1"
          oninput="updIt(${ki},${it.id},'qty',this.value);rcKit(${ki},${it.id})"></td>
      <td class="tr"><input class="iprice" value="${it.preco>0?it.preco.toFixed(2).replace('.',','):''}"
          placeholder="0,00" oninput="updP(${ki},${it.id},this.value);rcKit(${ki},${it.id})"></td>
      <td class="tr" id="t-${ki}-${it.id}" style="font-weight:700;color:#1b5e20">${tot>0?fmtR(tot):'—'}</td>
      <td class="tc"><button class="btn br" style="padding:2px 6px;font-size:10px"
          onclick="rmIt(${ki},${it.id})">✕</button></td>`;
    tb.appendChild(tr);
  });
  const gtEl=document.getElementById('gtot-'+ki);
  if(gtEl) gtEl.textContent=fmtR(g);
}

function renderSummary(){
  const s=document.getElementById('kit-summary');
  s.innerHTML=kits.map(k=>`<span class="ks-chip">🌺 ${esc(k.nome)}: ${fmtR(kitTotal(k))}</span>`).join('');
}

// ============ KIT ITEM OPS ============
function scanEAN(ki){
  const inp=document.getElementById('scan-'+ki);
  const raw=inp.value.trim();
  if(!raw) return;
  const ean=raw.replace(/\D/g,'')||raw;
  const lookKey=ean||raw;
  const desc=DB.get(lookKey)||DB.get(raw)||'';
  addRowToKit(ki, lookKey, desc, desc?'found':'nf');
  inp.value=''; inp.focus();
  const msg=document.getElementById('smsg-'+ki);
  if(msg){
    msg.style.color=desc?'#2e7d32':'#c62828';
    msg.textContent=desc?`✅ "${desc.slice(0,35)}" adicionado`:`⚠️ ${lookKey} não encontrado`;
    setTimeout(()=>{msg.style.color='#555';msg.textContent='Scanner pronto';},3500);
  }
}
function addRowM(ki){ addRowToKit(ki,'','','manual'); }
function addRowToKit(ki,ean,desc,status){
  const kit=kits[ki];
  kit.rid++;
  kit.items.push({id:kit.rid,ean,desc,qty:1,preco:0,status});
  renderKitTable(ki);
  renderSummary();
  setTimeout(()=>{
    const f=document.getElementById(`d-${ki}-${kit.rid}`);
    if(!desc&&f) f.focus();
  },60);
}
function updIt(ki,id,f,v){const it=kits[ki].items.find(i=>i.id===id);if(it)it[f]=v;}
function updP(ki,id,v){const it=kits[ki].items.find(i=>i.id===id);if(it)it.preco=parseN(v);}
function rcKit(ki,id){
  const kit=kits[ki];
  const it=kit.items.find(i=>i.id===id);if(!it)return;
  const tot=parseN(it.qty)*parseN(it.preco);
  const el=document.getElementById(`t-${ki}-${id}`);if(el)el.textContent=tot>0?fmtR(tot):'—';
  const gtEl=document.getElementById('gtot-'+ki);
  if(gtEl)gtEl.textContent=fmtR(kitTotal(kit));
  renderSummary();
}
function rmIt(ki,id){kits[ki].items=kits[ki].items.filter(i=>i.id!==id);renderKitTable(ki);renderSummary();}
function clearKit(ki){if(confirm(`Limpar "${kits[ki].nome}"?`)){kits[ki].items=[];kits[ki].rid=0;renderKitTable(ki);renderSummary();}}

// ============ BARCODE ============
function renderBarcodes(){
  if(typeof JsBarcode==='undefined') return;
  document.querySelectorAll('svg[data-ean]').forEach(svg=>{
    const raw=svg.getAttribute('data-ean')||'';
    const ean=raw.replace(/\D/g,'');
    if(!ean) return;
    let fmt='CODE128';
    if(ean.length===8) fmt='EAN8';
    else if(ean.length===13) fmt='EAN13';
    try{
      JsBarcode(svg, ean, {
        format:fmt, height:18, fontSize:6, margin:1,
        displayValue:true, textMargin:0,
        lineColor:'#000', background:'transparent',
        valid: v=>{ if(!v) svg.innerHTML=`<text x="0" y="12" font-size="8" fill="#555">${esc(raw)}</text>`; }
      });
    }catch(e){
      svg.innerHTML=`<text x="0" y="12" font-size="8" fill="#555">${esc(raw)}</text>`;
    }
  });
}

// ============ BUILD IMPRESSÃO ============
function buildImpressao(){
  const now=new Date();
  // For each kit, get valid items
  const kitItems=kits.map(k=>k.items.filter(i=>i.ean||i.desc));
  const maxLen=Math.max(...kitItems.map(a=>a.length),1);
  const numPages=Math.ceil(maxLen/9)||1;

  let html=`<div class="imp-title">${kits.map(k=>esc(k.nome)).join(' · ')}</div>
<div class="imp-meta">Data: ${now.toLocaleDateString('pt-BR')} &nbsp;·&nbsp; ${kits.map(k=>`${esc(k.nome)}: ${kitItems[kits.indexOf(k)].length} item(s)`).join(' | ')} &nbsp;·&nbsp; <em>Sem valores — ficha de montagem</em></div>`;

  for(let pg=0;pg<numPages;pg++){
    if(pg>0) html+=`<div style="page-break-before:always;height:2mm"></div>`;

    // Each kit: get items for this page
    const pageItems=kitItems.map(arr=>arr.slice(pg*9,pg*9+9));

    // Block 1: 5 rows
    html+=buildBlock(pageItems,5,true);
    html+=`<div class="blk-sep"></div>`;
    // Block 2: 4 rows
    html+=buildBlock(pageItems,4,false);
  }

  html+=`<div class="imp-footer">Kit Manager Pro · Gerado em ${now.toLocaleString('pt-BR')}</div>`;
  document.getElementById('imp-page').innerHTML=html;
  setTimeout(renderBarcodes,80);
}

function buildBlock(pageItems,nRows,showKitName){
  // pageItems[k] = items for kit k on this page
  // We show rows 0..nRows-1 for block1, rows 5..5+nRows-1 for block2
  const offset=showKitName?0:5;

  // Headers
  let hCols=`<th class="col-x">x</th>`;
  kits.forEach((k,ki)=>{
    const lbl=showKitName?esc(k.nome):'';
    hCols+=`<th class="col-qtd">QTD</th><th class="col-ean ${showKitName?'kit-hdr':'kit-hdr-empty'}">${lbl}</th>`;
  });
  // Pad empty kit columns if kits < 4
  for(let x=kits.length;x<4;x++){
    hCols+=`<th class="col-qtd"></th><th class="col-ean kit-hdr-empty">${showKitName?'—':''}</th>`;
  }

  let html=`<table class="imp-grid"><thead><tr>${hCols}</tr></thead><tbody>`;

  for(let r=0;r<nRows;r++){
    const itemIdx=offset+r;
    html+=`<tr class="row-item"><td class="col-x">x</td>`;
    // 4 kit columns
    for(let k=0;k<4;k++){
      const it=(k<kits.length&&pageItems[k])?pageItems[k][itemIdx]:null;
      if(it){
        const bc=it.ean?`<svg data-ean="${esc(it.ean)}" class="bc-svg"></svg>`:'';
        const nm=`<span class="bc-label">${esc(it.desc?it.desc.slice(0,32):it.ean)}</span>`;
        html+=`<td class="col-qtd" style="font-weight:700">${it.qty||1}</td><td class="col-ean">${bc}${nm}</td>`;
      } else {
        html+=`<td class="col-qtd"></td><td class="col-ean"></td>`;
      }
    }
    html+=`</tr>`;
  }

  html+=`</tbody><tfoot><tr class="row-total"><td></td>`;
  for(let k=0;k<4;k++){
    html+=`<td colspan="2" class="tc">TOTAL</td>`;
  }
  html+=`</tr></tfoot></table>`;
  return html;
}

// ============ BUILD ETIQUETAS ============
function buildEtiquetas(){
  const sheet=document.getElementById('et-sheet');
  if(!sheet) return;
  sheet.innerHTML='';
  // 1 label per kit, fill remaining 24 slots as empty
  for(let i=0;i<24;i++){
    const div=document.createElement('div');
    if(i<kits.length){
      div.className='et-label';
      const k=kits[i];
      div.innerHTML=`<div class="et-nome">${esc(k.nome)}</div><div class="et-preco">${fmtR(kitTotal(k))}</div>`;
    } else {
      div.className='et-empty et-label';
    }
    sheet.appendChild(div);
  }
}

function buildAll(){buildImpressao();buildEtiquetas();}

// ============ PRINT ============
function goPrint(t){
  buildAll();
  document.querySelectorAll('.tab').forEach(x=>{x.classList.remove('active','print-target');});
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  const el=document.getElementById('tab-'+t);
  el.classList.add('active','print-target');
  const idx=t==='impressao'?1:2;
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  setTimeout(()=>window.print(),300);
}
function doPrint(){buildAll();setTimeout(()=>window.print(),200);}

// ============ SAVE/LOAD ============
function saveLoc(){
  localStorage.setItem('kitpro_v4',JSON.stringify({kits,activeIdx}));
  alert('✅ Salvo!');
}
function loadLoc(){
  const s=localStorage.getItem('kitpro_v4');
  if(!s){alert('Nenhum dado salvo.');return;}
  if(!confirm('Carregar dados salvos?')) return;
  const d=JSON.parse(s);
  kits=d.kits||kits; activeIdx=d.activeIdx||0;
  renderLista();
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded',()=>{
  document.addEventListener('keydown',e=>{
    if(e.key==='F2'){
      const inp=document.getElementById('scan-'+activeIdx);
      if(inp){inp.focus();e.preventDefault();}
    }
  });
  const saved=localStorage.getItem('kitpro_v4');
  if(saved){
    try{
      const d=JSON.parse(saved);
      if(d.kits&&d.kits.length>0&&confirm('📂 Dados salvos encontrados. Carregar?')){
        kits=d.kits; activeIdx=d.activeIdx||0;
      }
    }catch(e){}
  }
  renderLista();
  buildEtiquetas();
  loadDB();
});
