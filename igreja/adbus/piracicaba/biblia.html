<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bíblia Sagrada · ADBUS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f0f0f0;
            --border-color: #999;
            --text-color: #222;
            --brand: #4318FF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ─── TOPO (TÍTULO E GRID DE LIVROS) ─── */
        .header {
            background-color: #e5e5e5;
            border: 1px solid var(--border-color);
            padding: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
        }

        .btn-return {
            position: absolute;
            left: 10px;
            background: var(--brand);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-return:hover {
            opacity: 0.8;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 2px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            padding: 2px;
            margin-bottom: 15px;
        }

        .btn-book {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1.5;
            color: white;
            border: none;
            cursor: pointer;
            padding: 4px;
            transition: all 0.1s ease;
            user-select: none;
        }

        .btn-book:hover {
            filter: brightness(1.2);
            transform: scale(0.98);
        }

        .btn-book.selected {
            box-shadow: inset 0 0 0 4px rgba(0, 0, 0, 0.4);
            filter: brightness(0.85);
        }

        .btn-book .abbr {
            font-size: 26px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .btn-book .name {
            font-size: 10px;
            line-height: 1;
            text-align: center;
            opacity: 0.95;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* ─── PAINEIS INFERIORES (CAPÍTULOS E VERSÍCULOS) ─── */
        .bottom-panels {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .panel {
            background: #fff;
            border: 1px solid var(--border-color);
            padding: 4px;
            min-height: 300px;
        }
        
        .panel.capitulos-wrapper { flex: 9; }
        .panel.versiculos-wrapper { flex: 7; }

        .items-grid {
            display: grid;
            gap: 2px;
        }

        .items-grid.cols-9 { grid-template-columns: repeat(9, 1fr); }
        .items-grid.cols-7 { grid-template-columns: repeat(7, 1fr); }

        .btn-num {
            background-color: #a06b43; 
            color: #fff;
            border: none;
            cursor: pointer;
            aspect-ratio: 1;
            font-size: 28px;
            font-weight: 700;
            transition: all 0.1s;
        }

        .btn-num:hover {
            background-color: #b57a4d;
        }

        .btn-num.selected {
            background-color: #4a301f;
            box-shadow: inset 0 0 0 3px #1cfb59; /* Destaque leve verde para evidenciar multi-seleção */
        }
        
        .btn-num.hidden {
            visibility: hidden;
        }

        /* ─── MODAL DE LEITURA ─── */
        .modal-overlay {
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: translateY(20px);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #666;
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
            font-size: 22px;
            line-height: 1.6;
            color: #222;
        }

        .verse-num {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            vertical-align: super;
            margin-right: 4px;
            user-select: none;
        }
        
        #loadingMsg {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
            font-style: italic;
        }

        /* =========================================
           TELA DE PROJEÇÃO DE CULTO (FULLSCREEN)
        ========================================= */
        #projecaoOverlay {
            display: none; position: fixed; inset: 0; z-index: 99999;
            background: #000;
            font-family: 'Inter', Georgia, serif;
            flex-direction: column;
            overflow: hidden;
        }
        #projecaoOverlay.open { display: flex; }
        #projBg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            transition: background-image 0.8s ease;
        }
        #projBg::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.72) 100%);
        }
        #projContent {
            position: relative; z-index: 2;
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 60px 80px; text-align: center;
        }
        #projLabel {
            font-size: 13px; font-weight: 700; letter-spacing: 4px;
            color: rgba(255,255,255,0.55); text-transform: uppercase;
            margin-bottom: 24px;
        }
        #projText {
            font-size: clamp(28px, 4.5vw, 64px);
            font-weight: 700; color: #fff;
            line-height: 1.35; text-shadow: 0 4px 24px rgba(0,0,0,0.5);
            max-width: 900px;
            animation: projFadeIn 0.7s ease;
        }
        #projRef {
            margin-top: 28px; font-size: clamp(14px, 2vw, 22px);
            color: rgba(255,255,255,0.7); font-style: italic; font-weight: 500;
        }
        @keyframes projFadeIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

        .proj-nav-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            z-index: 4; background: rgba(0,0,0,0.18); color: rgba(255,255,255,0.25);
            border: none; border-radius: 50%; width: 52px; height: 52px;
            font-size: 22px; cursor: pointer; display: grid; place-items: center;
            transition: all 0.3s ease; backdrop-filter: blur(4px);
            opacity: 0.15;
        }
        #projNavPrev { left: 18px; }
        #projNavNext { right: 18px; }
        #projecaoOverlay:hover .proj-nav-btn { opacity: 0.5; }
        .proj-nav-btn:hover { opacity: 1 !important; background: rgba(255,255,255,0.2); color: #fff; transform: translateY(-50%) scale(1.12); }

        .info-ctrl {
            font-size: 11px;
            color: #666;
            margin-left: 10px;
            font-weight: normal;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="btn-return" onclick="window.location.href='../igreja-adbus.html#culto'">← Voltar para Painel Culto</button>
        <span>❤ Versículos <span class="info-ctrl">(Dica: Segure CTRL para selecionar múltiplos versos e projetar na tela)</span></span>
    </div>

    <!-- Grid dos 66 Livros -->
    <div class="books-grid" id="booksGrid"></div>

    <!-- Paineis de Capítulos e Versículos -->
    <div class="bottom-panels">
        <!-- Capítulos -->
        <div class="panel capitulos-wrapper">
            <div class="items-grid cols-9" id="capsGrid">
                <!-- Preenchido via JS -->
            </div>
        </div>

        <!-- Versículos -->
        <div class="panel versiculos-wrapper">
            <div class="items-grid cols-7" id="versGrid">
                 <!-- Preenchido via JS -->
            </div>
        </div>
    </div>
</div>

<!-- Modal para Exibição de Leitura Ocasional -->
<div class="modal-overlay" id="readModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Gênesis 1</h2>
            <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" id="modalBody">
            <div id="loadingMsg" style="display:none;">Carregando Palavra de Deus...</div>
            <div id="modalText"></div>
        </div>
    </div>
</div>

<!-- OVERLAY DE PROJEÇÃO FULLSCREEN -->
<div id="projecaoOverlay">
    <div id="projBg"></div>
    <button class="proj-nav-btn" id="projNavPrev" onclick="prevProj()" title="Versículo anterior (←)">&#8592;</button>
    <button class="proj-nav-btn" id="projNavNext" onclick="nextProj()"  title="Próximo versículo (→)">&#8594;</button>

    <div id="projContent">
        <div id="projLabel">ADBUS · Igreja Assembléia de Deus</div>
        <div id="projText">Carregando Versículo...</div>
        <div id="projRef">Livro Cap:Ver</div>
    </div>
</div>

<script>
// URL base da API
const API_BASE = "https://bible-api.com/data/almeida";

// Dicionário de Cores Fiel ao Print
const colors = {
    p_dark:  '#311c12',
    p_light: '#915328',
    h_dark:  '#bf681c',
    h_light: '#da8a21',
    poet:    '#b41320',
    prof_ma: '#6e2978',
    prof_me: '#96236b',
    gospels: '#284f8d',
    acts:    '#00869a',
    pauline: '#0b8243',
    general: '#089d53',
    rev:     '#7fac1c'
};

const bgImagens = [
    'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80', // Céu
    'https://images.unsplash.com/photo-1499209974431-9dddcece7f88?w=1920&q=80', // Cruz
    'https://images.unsplash.com/photo-1504701954957-2010ec3bcec1?w=1920&q=80', // Luz
    'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=80', // Montanha
    'https://images.unsplash.com/photo-1468581264429-2548ef9eb732?w=1920&q=80'  // Água
];

const booksData = [
    { id: 'GEN', abbr: 'Gn', name: 'Gênesis', bg: colors.p_dark },
    { id: 'EXO', abbr: 'Ex', name: 'Êxodo', bg: colors.p_light },
    { id: 'LEV', abbr: 'Lv', name: 'Levítico', bg: colors.p_light },
    { id: 'NUM', abbr: 'Nm', name: 'Números', bg: colors.p_light },
    { id: 'DEU', abbr: 'Dt', name: 'Deuteronômio', bg: colors.p_light },
    { id: 'JOS', abbr: 'Js', name: 'Josué', bg: colors.h_light },
    { id: 'JDG', abbr: 'Jz', name: 'Juízes', bg: colors.h_light },
    { id: 'RUT', abbr: 'Rt', name: 'Rute', bg: colors.h_light },
    { id: '1SA', abbr: '1Sm', name: '1 Samuel', bg: colors.h_light },
    { id: '2SA', abbr: '2Sm', name: '2 Samuel', bg: colors.h_light },
    { id: '1KI', abbr: '1Rs', name: '1 Reis', bg: colors.h_light },
    { id: '2KI', abbr: '2Rs', name: '2 Reis', bg: colors.h_light },
    { id: '1CH', abbr: '1Cr', name: '1 Crônicas', bg: colors.h_light },
    { id: '2CH', abbr: '2Cr', name: '2 Crônicas', bg: colors.h_light },
    { id: 'EZR', abbr: 'Ed', name: 'Esdras', bg: colors.h_dark },
    { id: 'NEH', abbr: 'Ne', name: 'Neemias', bg: colors.h_light },
    { id: 'EST', abbr: 'Et', name: 'Ester', bg: colors.h_light },
    { id: 'JOB', abbr: 'Jó', name: 'Jó', bg: colors.poet },
    { id: 'PSA', abbr: 'Sl', name: 'Salmos', bg: colors.poet },
    { id: 'PRO', abbr: 'Pv', name: 'Provérbios', bg: colors.poet },
    { id: 'ECC', abbr: 'Ec', name: 'Eclesiastes', bg: colors.poet },
    { id: 'SNG', abbr: 'Ct', name: 'Cantares', bg: colors.poet },
    { id: 'ISA', abbr: 'Is', name: 'Isaías', bg: colors.prof_ma },
    { id: 'JER', abbr: 'Jr', name: 'Jeremias', bg: colors.prof_ma },
    { id: 'LAM', abbr: 'Lm', name: 'Lamentações', bg: colors.prof_ma },
    { id: 'EZK', abbr: 'Ez', name: 'Ezequiel', bg: colors.prof_ma },
    { id: 'DAN', abbr: 'Dn', name: 'Daniel', bg: colors.prof_ma },
    { id: 'HOS', abbr: 'Os', name: 'Oséias', bg: colors.prof_me },
    { id: 'JOL', abbr: 'Jl', name: 'Joel', bg: colors.prof_me },
    { id: 'AMO', abbr: 'Am', name: 'Amós', bg: colors.prof_me },
    { id: 'OBA', abbr: 'Ob', name: 'Obadias', bg: colors.prof_me },
    { id: 'JON', abbr: 'Jn', name: 'Jonas', bg: colors.prof_me },
    { id: 'MIC', abbr: 'Mq', name: 'Miquéias', bg: colors.prof_me },
    { id: 'NAM', abbr: 'Na', name: 'Naum', bg: colors.prof_me },
    { id: 'HAB', abbr: 'Hc', name: 'Habacuque', bg: colors.prof_me },
    { id: 'ZEP', abbr: 'Sf', name: 'Sofonias', bg: colors.prof_me },
    { id: 'HAG', abbr: 'Ag', name: 'Ageu', bg: colors.prof_me },
    { id: 'ZEC', abbr: 'Zc', name: 'Zacarias', bg: colors.prof_me },
    { id: 'MAL', abbr: 'Ml', name: 'Malaquias', bg: colors.prof_me },
    { id: 'MAT', abbr: 'Mt', name: 'Mateus', bg: colors.gospels },
    { id: 'MRK', abbr: 'Mc', name: 'Marcos', bg: colors.gospels },
    { id: 'LUK', abbr: 'Lc', name: 'Lucas', bg: colors.gospels },
    { id: 'JHN', abbr: 'Jo', name: 'João', bg: colors.gospels },
    { id: 'ACT', abbr: 'At', name: 'Atos', bg: colors.acts },
    { id: 'ROM', abbr: 'Rm', name: 'Romanos', bg: colors.general },
    { id: '1CO', abbr: '1Co', name: '1 Coríntios', bg: colors.general },
    { id: '2CO', abbr: '2Co', name: '2 Coríntios', bg: colors.general },
    { id: 'GAL', abbr: 'Gl', name: 'Gálatas', bg: colors.general },
    { id: 'EPH', abbr: 'Ef', name: 'Efésios', bg: colors.general },
    { id: 'PHP', abbr: 'Fp', name: 'Filipenses', bg: colors.general },
    { id: 'COL', abbr: 'Cl', name: 'Colossenses', bg: colors.general },
    { id: '1TH', abbr: '1Ts', name: '1 Tessalonicenses', bg: colors.general },
    { id: '2TH', abbr: '2Ts', name: '2 Tessalonicenses', bg: colors.general },
    { id: '1TI', abbr: '1Tm', name: '1 Timóteo', bg: colors.general },
    { id: '2TI', abbr: '2Tm', name: '2 Timóteo', bg: colors.general },
    { id: 'TIT', abbr: 'Tt', name: 'Tito', bg: colors.general },
    { id: 'PHM', abbr: 'Fm', name: 'Filemom', bg: colors.general },
    { id: 'HEB', abbr: 'Hb', name: 'Hebreus', bg: colors.general },
    { id: 'JAS', abbr: 'Tg', name: 'Tiago', bg: colors.general },
    { id: '1PE', abbr: '1Pe', name: '1 Pedro', bg: colors.pauline },
    { id: '2PE', abbr: '2Pe', name: '2 Pedro', bg: colors.pauline },
    { id: '1JN', abbr: '1Jo', name: '1 João', bg: colors.pauline },
    { id: '2JN', abbr: '2Jo', name: '2 João', bg: colors.pauline },
    { id: '3JN', abbr: '3Jo', name: '3 João', bg: colors.pauline },
    { id: 'JUD', abbr: 'Jd', name: 'Judas', bg: colors.pauline },
    { id: 'REV', abbr: 'Ap', name: 'Apocalipse', bg: colors.rev }
];

// Estado da Aplicação
let selBookId = null;
let selBookName = null;
let selChapter = null;
let currentChapterData = null;
let selVerses = new Set(); 

// Variáveis da Projeção Multi-versos
let isCtrlPressed = false;
let projectionActive = false;
let versosParaProjetar = [];
let idxProjecao = 0;

// Inicializa
function init() {
    renderBooks();
    if (booksData.length > 0) selectBook(booksData[0].id, booksData[0].name);

    document.getElementById('projBg').style.backgroundImage = `url('${bgImagens[0]}')`;
}

function renderBooks() {
    const grid = document.getElementById('booksGrid');
    booksData.forEach(b => {
        const btn = document.createElement('button');
        btn.className = 'btn-book';
        btn.id = `bk_${b.id}`;
        btn.style.backgroundColor = b.bg;
        btn.innerHTML = `<span class="abbr">${b.abbr}</span><span class="name">${b.name}</span>`;
        btn.onclick = () => selectBook(b.id, b.name);
        grid.appendChild(btn);
    });
}

function renderNumbers(containerId, count, clickHandler, activeSet) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    for (let i = 1; i <= count; i++) {
        const btn = document.createElement('button');
        btn.className = 'btn-num';
        btn.textContent = i;
        if (activeSet.has(i)) btn.classList.add('selected');
        
        btn.onclick = () => {
            if (activeSet.size === 1 && containerId === 'capsGrid') {
                Array.from(container.children).forEach(c => c.classList.remove('selected'));
                btn.classList.add('selected');
            }
            clickHandler(i, btn);
        };
        container.appendChild(btn);
    }
}

async function selectBook(bookId, bookName) {
    document.querySelectorAll('.btn-book').forEach(b => b.classList.remove('selected'));
    document.getElementById(`bk_${bookId}`).classList.add('selected');
    
    selBookId = bookId;
    selBookName = bookName;
    selChapter = null;
    selVerses.clear();
    
    document.getElementById('capsGrid').innerHTML = '<span style="grid-column: span 9; text-align: center; color: #666; padding: 20px; font-weight: bold; font-family: sans-serif;">Buscando Capítulos...</span>';
    document.getElementById('versGrid').innerHTML = '';

    try {
        const res = await fetch(`${API_BASE}/${bookId}`);
        const data = await res.json();
        if (!data.chapters) throw new Error("Sem capítulos");
        
        renderNumbers('capsGrid', data.chapters.length, (capNum) => selectChapter(capNum), new Set());
        if (data.chapters.length > 0) selectChapter(1);
    } catch (err) {
        document.getElementById('capsGrid').innerHTML = '<span style="grid-column: span 9; color: red;">Erro ao carregar capítulos. Tente recarregar.</span>';
    }
}

async function selectChapter(capNum) {
    selChapter = capNum;
    selVerses.clear();
    
    const capBtns = document.getElementById('capsGrid').children;
    Array.from(capBtns).forEach(b => {
        if(b.textContent == capNum) b.classList.add('selected');
        else b.classList.remove('selected');
    });

    document.getElementById('versGrid').innerHTML = '<span style="grid-column: span 7; text-align: center; color: #666; padding: 20px; font-weight: bold; font-family: sans-serif;">Buscando Versos...</span>';

    try {
        const res = await fetch(`${API_BASE}/${selBookId}/${capNum}`);
        const data = await res.json();
        if (!data.verses) throw new Error("Sem versículos");
        currentChapterData = data.verses;
        
        renderNumbers('versGrid', data.verses.length, (verseNum, btnEl) => toggleVerse(verseNum, btnEl), new Set());
    } catch (err) {
        document.getElementById('versGrid').innerHTML = '<span style="grid-column: span 7; color: red;">Erro ao carregar versículos.</span>';
    }
}

// ── FLUXO DE PROJEÇÃO (NOVO) ──

function toggleVerse(verseNum, btnEl) {
    if (isCtrlPressed) {
        // Multi-seleção para projeção agrupada
        if (selVerses.has(verseNum)) {
            selVerses.delete(verseNum);
            btnEl.classList.remove('selected');
        } else {
            selVerses.add(verseNum);
            btnEl.classList.add('selected');
        }
    } else {
        // Leitura Ocasional Individual (Modal Antigo)
        Array.from(document.getElementById('versGrid').children).forEach(b => b.classList.remove('selected'));
        selVerses.clear();
        btnEl.classList.add('selected');
        lerVersiculoSelecionado(verseNum);
    }
}

// Eventos de Teclado
document.addEventListener('keydown', (e) => {
    if (e.key === 'Control') {
        isCtrlPressed = true;
    }
    
    if (projectionActive) {
        if (e.key === 'ArrowRight') nextProj();
        if (e.key === 'ArrowLeft') prevProj();
        if (e.key === 'Escape') fecharProjecao();
    } else {
        if (e.key === 'Escape') closeModal();
    }
});

document.addEventListener('keyup', (e) => {
    if (e.key === 'Control') {
        isCtrlPressed = false;
        // Ao soltar o CTRL, se houvesse selecionado alguma coisa, projetamos o pacote.
        if (selVerses.size > 0 && !projectionActive) {
            iniciarProjecao();
        }
    }
});

function iniciarProjecao() {
    if (selVerses.size === 0) return;
    
    // Sort array by chapter chronologically
    const ordered = Array.from(selVerses).sort((a,b) => a - b);
    
    versosParaProjetar = ordered.map(v => {
        return currentChapterData.find(vd => vd.chapter === selChapter && vd.verse === v);
    }).filter(Boolean);

    if (versosParaProjetar.length === 0) return;
    
    idxProjecao = 0;
    projectionActive = true;
    
    // Sorteia um dos 5 backgrounds baseado no tamanho do array só pra variar levemente
    let bgSort = bgImagens[selVerses.size % bgImagens.length];
    document.getElementById('projBg').style.backgroundImage = `url('${bgSort}')`;
    
    document.getElementById('projecaoOverlay').classList.add('open');
    // Adiciona listener para fecar no clique do background 
    document.getElementById('projecaoOverlay').onclick = (ev) => {
        if(ev.target.id === 'projecaoOverlay' || ev.target.id === 'projBg') fecharProjecao();
    }
    
    renderProjVerse();
}

function renderProjVerse() {
    const v = versosParaProjetar[idxProjecao];
    if (!v) return;
    
    // Esmaece botões
    document.getElementById('projNavPrev').style.visibility = (idxProjecao > 0) ? 'visible' : 'hidden';
    document.getElementById('projNavNext').style.visibility = (idxProjecao < versosParaProjetar.length - 1) ? 'visible' : 'hidden';

    // Rerenderiza com animação CSS reiniciada
    const elmText = document.getElementById('projText');
    elmText.style.animation = 'none';
    elmText.offsetHeight; 
    elmText.style.animation = null; 
    
    elmText.innerHTML = v.text;
    document.getElementById('projRef').innerHTML = `${selBookName} ${selChapter}:${v.verse}`;
}

function nextProj() {
    if (idxProjecao < versosParaProjetar.length - 1) {
        idxProjecao++;
        renderProjVerse();
    }
}

function prevProj() {
    if (idxProjecao > 0) {
        idxProjecao--;
        renderProjVerse();
    }
}

function fecharProjecao() {
    projectionActive = false;
    document.getElementById('projecaoOverlay').classList.remove('open');
    
    // Clear selection
    selVerses.clear();
    const versBtns = document.getElementById('versGrid').children;
    Array.from(versBtns).forEach(b => b.classList.remove('selected'));
}

// ── LEITURA MODAL (SEM CTRL) ──
function lerVersiculoSelecionado(vNum) {
    if (!currentChapterData) return;
    
    const verseObj = currentChapterData.find(v => v.chapter === selChapter && v.verse === vNum);
    if (!verseObj) return;

    document.getElementById('modalTitle').textContent = `${selBookName} ${selChapter}:${vNum}`;
    document.getElementById('modalText').innerHTML = `
        <p><span class="verse-num">${verseObj.verse}</span> ${verseObj.text}</p>
    `;
    
    document.getElementById('readModal').classList.add('show');
}

function closeModal() {
    document.getElementById('readModal').classList.remove('show');
    const versBtns = document.getElementById('versGrid').children;
    Array.from(versBtns).forEach(b => b.classList.remove('selected'));
}

window.onload = init;

</script>

</body>
</html>
