<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Letra no Celular</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    :root { --active:#eeff00; --accent:#6366f1; --muted:#9ca3af; }
    *{ box-sizing:border-box; margin:0; padding:0; }
    body { background:linear-gradient(180deg,#08080d,#111827); color:#f3f4f6;
           font-family:Inter,system-ui,sans-serif; min-height:100dvh; }
    .wrap{ max-width:860px; margin:0 auto; padding:0 14px 80px; }
    .hero{ position:sticky; top:0; z-index:10;
           background:rgba(8,8,13,.94); backdrop-filter:blur(12px);
           border-bottom:1px solid rgba(255,255,255,.08); padding:12px 14px; margin:0 -14px 16px; }
    .church { font-size:.75rem; color:#ffd500; text-transform:uppercase; letter-spacing:.1em; font-weight:800; }
    .title  { font-size:1.15rem; font-weight:800; margin-top:4px; }
    .artist { font-size:.88rem; color:var(--muted); margin-top:2px; }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn{ border:none; border-radius:10px; padding:8px 14px; background:#1f2937; color:#fff;
          font-weight:700; font-size:.85rem; cursor:pointer; transition:background .18s; }
    .btn:hover{ background:#374151; }
    .btn.primary{ background:var(--accent); }
    .btn.primary:hover{ background:#4f46e5; }
    .status{ font-size:.78rem; color:var(--muted); margin-top:8px; min-height:1.1em; }
    /* ── SYNCED ── */
    .lyrics{ padding-top:4px; }
    .s-line{ display:flex; align-items:flex-start; gap:10px; padding:10px 12px;
             border-radius:12px; margin:4px 0; cursor:pointer;
             color:#fda4af; font-size:1.06rem; line-height:1.5;
             background:rgba(255,255,255,.02); transition:all .2s; }
    .s-line:active{ background:rgba(255,255,255,.06); }
    .s-line.active{ color:var(--active); background:rgba(255,255,255,.07);
                    font-weight:800; box-shadow:0 0 18px rgba(238,255,0,.13);
                    transform:scale(1.015); }
    .s-line .ts{ min-width:50px; color:#818cf8; font-size:.7rem;
                 font-variant-numeric:tabular-nums; flex-shrink:0; padding-top:3px; }
    /* ── PLAIN ── */
    .plain-block{ white-space:pre-wrap; line-height:1.75; font-size:1.05rem;
                  color:#e5e7eb; background:rgba(255,255,255,.03);
                  padding:16px; border-radius:14px; }
    .empty-msg{ color:var(--muted); text-align:center; padding:60px 20px; font-size:1rem; }
    .help{ font-size:.8rem; color:var(--muted); margin-top:18px;
           padding:12px; border-radius:10px; background:rgba(255,255,255,.03); line-height:1.5; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="church" id="church">Church Player</div>
    <div class="title"  id="title">Letra</div>
    <div class="artist" id="artist"></div>
    <div class="actions">
      <button class="btn primary" id="btnSync">&#9654; Sincronizar agora</button>
      <button class="btn" id="btnToggle">&#8645; Alternar modo</button>
      <button class="btn" onclick="location.reload()">&#8635;</button>
    </div>
    <div class="status" id="status">Preparando...</div>
  </div>
  <div id="lyricsArea" class="lyrics"></div>
  <div class="help">Toque em uma linha para alinhar manualmente.
   Aceita <code>#lz=</code> (LZString) e <code>#p=</code> (legado).</div>
</div>
<script>
(function(){
'use strict';

var elChurch  = document.getElementById('church');
var elTitle   = document.getElementById('title');
var elArtist  = document.getElementById('artist');
var elArea    = document.getElementById('lyricsArea');
var elStatus  = document.getElementById('status');
var btnSync   = document.getElementById('btnSync');
var btnToggle = document.getElementById('btnToggle');

function setStatus(msg){ elStatus.textContent = msg || ''; }

/* ── Decode ── */
function readPayload(){
  var rawHash = location.hash.startsWith('#') ? location.hash.slice(1) : location.hash;
  var params  = new URLSearchParams(rawHash || location.search);
  var lz = params.get('lz');
  if(lz){
    var json = window.LZString ? LZString.decompressFromEncodedURIComponent(lz) : decodeURIComponent(lz);
    if(!json) throw new Error('Falha ao descompactar payload.');
    return JSON.parse(json);
  }
  var p = params.get('p') || params.get('payload');
  if(p){
    var raw = (window.LZString && p.length > 200)
      ? LZString.decompressFromEncodedURIComponent(p) : decodeURIComponent(p);
    return JSON.parse(raw || decodeURIComponent(p));
  }
  return null;
}

/* ── LRC parser ── */
function parseLrc(lrc){
  var re = /^\[(\d{2}):(\d{2}\.\d{2,3})\]\s*(.*)/;
  return lrc.split('\n').map(function(line){
    var m = re.exec(line.trim());
    if(!m) return null;
    var t = parseInt(m[1],10)*60 + parseFloat(m[2]);
    return { t:t, text:(m[3]||'').trim() };
  }).filter(Boolean).sort(function(a,b){ return a.t - b.t; });
}
function fmt(s){
  var m = Math.floor(s/60), ss = Math.floor(s%60);
  return m+':'+(ss<10?'0':'')+ss;
}

/* ── State ── */
var _mode    = 'plain';
var _lines   = [];
var _tick    = null;
var _offset  = 0;
var _startAt = 0;

/* ── Render plain ── */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/\x3c/g,'&lt;').replace(/\x3e/g,'&gt;'); }
function renderPlain(text){
  elArea.innerHTML = '<div class="plain-block">'+esc(text).replace(/\n/g,'<br>')+'</div>';
}

/* ── Render synced ── */
function renderSynced(lrc){
  var parsed = parseLrc(lrc);
  if(!parsed.length){ renderPlain(lrc); setStatus('LRC vazio, exibindo texto.'); return; }
  _lines = parsed;
  elArea.innerHTML = '';
  _lines.forEach(function(item, idx){
    var div = document.createElement('div');
    div.className = 's-line';
    div.innerHTML = '<span class="ts">'+fmt(item.t)+'</span><span>'+esc(item.text)+'</span>';
    div.addEventListener('click', function(){
      _offset = item.t - ((Date.now() - _startAt) / 1000);
      setStatus('Alinhado em '+fmt(item.t));
    });
    item.el = div;
    elArea.appendChild(div);
  });
}

/* ── Tick ── */
function startTick(){
  if(_tick) clearInterval(_tick);
  _tick = setInterval(function(){
    var elapsed = (Date.now() - _startAt) / 1000 + _offset;
    var active = null;
    for(var i=_lines.length-1; i>=0; i--){
      if(elapsed >= _lines[i].t){ active = _lines[i]; break; }
    }
    _lines.forEach(function(item){ item.el.classList.toggle('active', item===active); });
    if(active && active.el) active.el.scrollIntoView({behavior:'smooth', block:'center'});
  }, 250);
}

/* ── Sync from startedAt ── */
function syncFromPayload(payload){
  _startAt = payload.t || Date.now();
  _offset  = 0;
  startTick();
  setStatus('Sincronizado. Posicao inicial: '+fmt(payload.pos||0)+'s');
}

/* ── Toggle ── */
function toggleMode(payload){
  if(_mode==='plain' && payload.lrc){
    _mode='synced';
    if(_tick) clearInterval(_tick);
    renderSynced(payload.lrc);
    syncFromPayload(payload);
    btnToggle.textContent='\u21C4 Ver texto';
  } else {
    _mode='plain';
    if(_tick){ clearInterval(_tick); _tick=null; }
    renderPlain(payload.plain || payload.lrc || 'Sem letra');
    btnToggle.textContent='\u2645 Alternar modo';
    setStatus('Modo texto');
  }
}

/* ── Boot ── */
try{
  var payload = readPayload();
  if(!payload){
    setStatus('Nenhuma letra recebida.');
    elArea.innerHTML='<div class="empty-msg">Abra pelo QR Code gerado no player.</div>';
    btnSync.style.display='none';
    btnToggle.style.display='none';
  } else {
    elChurch.textContent = payload.c || '';
    elTitle.textContent  = payload.ti || payload.title  || 'Letra';
    elArtist.textContent = payload.ar || payload.artist || '';

    var hasLrc = !!(payload.lrc && payload.lrc.trim());

    if(hasLrc && payload.m !== 'plain'){
      _mode = 'synced';
      renderSynced(payload.lrc);
      syncFromPayload(payload);
      btnToggle.textContent = '\u21C4 Ver texto';
    } else {
      _mode = 'plain';
      renderPlain(payload.plain || payload.lrc || 'Sem letra');
      if(!hasLrc) btnToggle.style.display='none';
      setStatus('Letra carregada.');
    }

    btnSync.addEventListener('click', function(){ syncFromPayload(payload); });
    btnToggle.addEventListener('click', function(){ toggleMode(payload); });
  }
} catch(err){
  console.error(err);
  setStatus('Erro: '+err.message);
  elArea.innerHTML='<div class="empty-msg">Nao foi possivel abrir esta letra.</div>';
}
})();
</script>
</body>
</html>
