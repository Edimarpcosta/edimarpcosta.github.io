<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letra no Celular</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    :root { --active: #eeff00; --accent: #6366f1; --muted: #9ca3af; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(180deg, #08080d 0%, #111827 100%);
      color: #f3f4f6;
      font-family: Inter, system-ui, sans-serif;
      min-height: 100dvh;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 0 16px 60px; }

    /* Sticky header */
    .hero {
      position: sticky; top: 0; z-index: 10;
      background: rgba(8,8,13,.93);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 14px 16px;
      margin: 0 -16px 20px;
    }
    .church  { font-size: .78rem; color: #ffd500; text-transform: uppercase; letter-spacing: .1em; font-weight: 800; }
    .title   { font-size: 1.2rem; font-weight: 800; margin-top: 4px; }
    .artist  { font-size: .9rem; color: var(--muted); margin-top: 2px; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .btn { border: none; border-radius: 12px; padding: 9px 16px; background: #1f2937; color: #fff; font-weight: 700; font-size: .88rem; cursor: pointer; transition: background .18s; }
    .btn:hover { background: #374151; }
    .btn.primary { background: var(--accent); }
    .btn.primary:hover { background: #4f46e5; }

    .status { font-size: .8rem; color: var(--muted); margin-top: 8px; min-height: 1.2em; }

    /* Lyrics — plain mode */
    .lyrics { padding-top: 4px; }
    .plain-block {
      white-space: pre-wrap; line-height: 1.75; font-size: 1.05rem;
      color: #e5e7eb; background: rgba(255,255,255,.03);
      padding: 16px; border-radius: 14px;
    }

    /* Lyrics — synced mode */
    .s-line {
      padding: 10px 14px; border-radius: 12px; margin: 5px 0;
      color: #fda4af; font-size: 1.06rem; line-height: 1.5;
      cursor: pointer; transition: all .2s; background: rgba(255,255,255,.02);
      display: flex; align-items: baseline; gap: 8px;
    }
    .s-line:hover { background: rgba(255,255,255,.05); }
    .s-line.active {
      color: var(--active); background: rgba(255,255,255,.08);
      transform: scale(1.02); font-weight: 800;
      box-shadow: 0 0 20px rgba(238,255,0,.15);
    }
    .s-line .ts {
      min-width: 58px; color: #818cf8; font-size: .72rem;
      font-variant-numeric: tabular-nums; flex-shrink: 0;
    }

    .help {
      font-size: .82rem; color: var(--muted); margin-top: 20px;
      padding: 12px; border-radius: 10px; background: rgba(255,255,255,.03);
      line-height: 1.5;
    }
    .empty-msg { color: var(--muted); font-size: 1rem; text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="church" id="church">Church Player</div>
      <div class="title"  id="title">Letra</div>
      <div class="artist" id="artist"></div>
      <div class="actions">
        <button class="btn primary" id="btnSync">&#9654; Sincronizar agora</button>
        <button class="btn"         id="btnToggle">&#8645; Alternar modo</button>
        <button class="btn"         id="btnRefresh" onclick="location.reload()">&#8635; Recarregar</button>
      </div>
      <div class="status" id="status">Preparando...</div>
    </div>
    <div id="lyricsArea" class="lyrics"></div>
    <div class="help">
      Abra esta página pelo QR Code gerado no player.<br>
      Em modo sincronizado, toque em uma linha para alinhar manualmente.<br>
      A página aceita payload no hash <code>#lz=</code> (comprimido) e no formato legado <code>#p=</code>.
    </div>
  </div>

<script>
(function() {
'use strict';

// ── DOM refs ───────────────────────────────────────────────────────
const elChurch  = document.getElementById('church');
const elTitle   = document.getElementById('title');
const elArtist  = document.getElementById('artist');
const elArea    = document.getElementById('lyricsArea');
const elStatus  = document.getElementById('status');
const btnSync   = document.getElementById('btnSync');
const btnToggle = document.getElementById('btnToggle');

function setStatus(msg) { elStatus.textContent = msg || ''; }

// ── Payload decoding ───────────────────────────────────────────────
function readPayload() {
  const rawHash = location.hash.startsWith('#') ? location.hash.slice(1) : location.hash;
  const params  = new URLSearchParams(rawHash || location.search);

  // Format v3+: #lz=<LZString compressed>
  const lz = params.get('lz');
  if (lz) {
    const json = (window.LZString)
      ? LZString.decompressFromEncodedURIComponent(lz)
      : decodeURIComponent(lz);
    if (!json) throw new Error('Falha ao descompactar payload (lz).');
    return JSON.parse(json);
  }

  // Legacy format: #p=<encoded JSON>
  const p = params.get('p') || params.get('payload');
  if (p) {
    const raw = (window.LZString && p.length > 200)
      ? LZString.decompressFromEncodedURIComponent(p)
      : decodeURIComponent(p);
    return JSON.parse(raw || decodeURIComponent(p));
  }
  return null;
}

// ── Rendering helpers ──────────────────────────────────────────────
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/\x3c/g,'&lt;').replace(/\x3e/g,'&gt;').replace(/\x22/g,'&quot;');
}

function parseLrc(lrc) {
  const re = /\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)/;
  return lrc.split('\n')
    .map(line => {
      const m = re.exec(line.trim());
      if (!m) return null;
      const t = parseInt(m[1]) * 60 + parseFloat(m[2] + '.' + m[3]);
      return { t, text: m[4].trim() };
    })
    .filter(Boolean)
    .sort((a,b) => a.t - b.t);
}

function fmt(s) {
  const m = Math.floor(s / 60), ss = Math.floor(s % 60);
  return m + ':' + String(ss).padStart(2,'0');
}

// ── State ──────────────────────────────────────────────────────────
let _mode     = 'plain';   // 'plain' | 'synced'
let _lines    = [];        // [{t, text, el}]
let _tick     = null;
let _offset   = 0;         // manual sync offset in seconds

// ── Render plain ───────────────────────────────────────────────────
function renderPlain(text) {
  const safe = esc(text).replace(/\n/g, '<br>');
  elArea.innerHTML = '<div class="plain-block">' + safe + '</div>';
}

// ── Render synced ─────────────────────────────────────────────────
function renderSynced(lrc) {
  const parsed = parseLrc(lrc);
  if (!parsed.length) { renderPlain(lrc); return; }
  _lines = parsed;
  elArea.innerHTML = '';
  _lines.forEach(function(item, idx) {
    const div = document.createElement('div');
    div.className = 's-line';
    div.innerHTML = '<span class="ts">' + fmt(item.t) + '</span><span>' + esc(item.text) + '</span>';
    div.addEventListener('click', function() {
      _offset = item.t;
      setStatus('Sincronizado em ' + fmt(item.t));
    });
    item.el = div;
    elArea.appendChild(div);
  });
}

// ── Auto-scroll tick ──────────────────────────────────────────────
function startTick(startedAt) {
  if (_tick) clearInterval(_tick);
  _tick = setInterval(function() {
    const elapsed = (Date.now() - startedAt) / 1000;
    const t = elapsed + _offset;
    let active = null;
    for (let i = _lines.length - 1; i >= 0; i--) {
      if (t >= _lines[i].t) { active = _lines[i]; break; }
    }
    _lines.forEach(function(item) {
      item.el.classList.toggle('active', item === active);
    });
    if (active && active.el) {
      active.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 300);
}

// ── Toggle mode ───────────────────────────────────────────────────
function toggleMode(payload) {
  if (_mode === 'plain' && payload.lrc) {
    _mode = 'synced';
    renderSynced(payload.lrc);
    btnToggle.textContent = '\u21C4 Ver texto simples';
    setStatus('Modo sincronizado');
  } else {
    _mode = 'plain';
    renderPlain(payload.plain || 'Sem letra');
    btnToggle.textContent = '\u2645 Alternar modo';
    setStatus('Modo texto');
  }
}

// ── Boot ──────────────────────────────────────────────────────────
try {
  const payload = readPayload();
  if (!payload) {
    setStatus('Nenhuma letra recebida.');
    elArea.innerHTML = '<div class="empty-msg">\uD83D\uDCF1 Abra esta p&aacute;gina pelo QR Code gerado no player.</div>';
    btnSync.style.display = 'none';
    btnToggle.style.display = 'none';
  } else {
    elChurch.textContent = payload.c  || payload.church || '';
    elTitle.textContent  = payload.ti || payload.title  || 'Letra';
    elArtist.textContent = payload.ar || payload.artist || '';

    const hasLrc = !!(payload.lrc || payload.l);
    const lrcSrc = payload.lrc || payload.l || '';

    if (hasLrc && payload.m !== 'plain') {
      _mode = 'synced';
      renderSynced(lrcSrc);
      btnToggle.textContent = '\u21C4 Ver texto simples';
      setStatus('Modo sincronizado');
      if (payload.t) startTick(payload.t);
      else { setStatus('Sincronizado — toque em uma linha para alinhar'); }
    } else {
      _mode = 'plain';
      renderPlain(payload.plain || payload.p || 'Sem letra');
      btnToggle.style.display = hasLrc ? '' : 'none';
      setStatus('Letra carregada.');
    }

    btnSync.addEventListener('click', function() {
      _offset = 0;
      if (payload.t) { startTick(payload.t); setStatus('Sincronizado com o inicio da musica.'); }
      else setStatus('Sem dado de tempo — toque em uma linha para alinhar.');
    });
    btnToggle.addEventListener('click', function() { toggleMode({plain: payload.plain || payload.p || lrcSrc, lrc: lrcSrc}); });
  }
} catch(err) {
  console.error(err);
  setStatus('Erro ao processar a letra: ' + err.message);
  elArea.innerHTML = '<div class="empty-msg">N\u00e3o foi poss\u00edvel abrir esta letra.</div>';
}

})();
</script>
</body>
</html>
